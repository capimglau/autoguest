<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>AutoGest Pro</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F2F2F7;color:#1C1C1E;-webkit-tap-highlight-color:transparent}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#C7C7CC;border-radius:3px}
input[type=file]{display:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const SB_URL = "https://jsyiriqtzpbuqvjrkwin.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpzeWlyaXF0enBidXF2anJrd2luIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMDEyNjksImV4cCI6MjA4ODU3NzI2OX0.BCeCKcwLGnrRhfaFryeTbbCRoGyt3wRPlZzfsxuV0mM";
const HDR = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };

const db = {
  async get(t, q) {
    q = q || "";
    try {
      const r = await fetch(SB_URL + "/rest/v1/" + t + "?order=id.desc" + (q ? "&" + q : ""), { headers: HDR });
      return r.ok ? r.json() : [];
    } catch(e) { return []; }
  },
  async post(t, d) {
    const r = await fetch(SB_URL + "/rest/v1/" + t, { method: "POST", headers: Object.assign({}, HDR, { Prefer: "return=representation" }), body: JSON.stringify(d) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Erro"); }
    const j = await r.json(); return Array.isArray(j) ? j[0] : j;
  },
  async patch(t, id, d) {
    const r = await fetch(SB_URL + "/rest/v1/" + t + "?id=eq." + id, { method: "PATCH", headers: Object.assign({}, HDR, { Prefer: "return=representation" }), body: JSON.stringify(d) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Erro"); }
    const j = await r.json(); return Array.isArray(j) ? j[0] : j;
  },
  async del(t, id) {
    await fetch(SB_URL + "/rest/v1/" + t + "?id=eq." + id, { method: "DELETE", headers: HDR });
  },
  async upload(path, file) {
    const r = await fetch(SB_URL + "/storage/v1/object/documentos/" + path, { method: "POST", headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": file.type, "x-upsert": "true" }, body: file });
    if (!r.ok) throw new Error("Upload falhou. Crie o bucket 'documentos' no Supabase Storage.");
    return SB_URL + "/storage/v1/object/public/documentos/" + path;
  }
};

const C = { bg: "#F2F2F7", card: "#FFF", border: "#E5E5EA", blue: "#007AFF", red: "#FF3B30", green: "#34C759", orange: "#FF9500", purple: "#AF52DE", teal: "#32ADE6", gray: "#8E8E93", sub: "#6D6D72" };
const FI = { width: "100%", padding: "11px 14px", borderRadius: 10, border: "1px solid #E5E5EA", fontSize: 15, outline: "none", background: "#F2F2F7", color: "#1C1C1E", boxSizing: "border-box" };
const CARD = { background: "#FFF", borderRadius: 16, padding: 18, boxShadow: "0 1px 4px rgba(0,0,0,.07)", border: "1px solid #E5E5EA" };

function Btn(bg, sm) { bg = bg || C.blue; return { background: bg, color: "#fff", border: "none", borderRadius: 10, padding: sm ? "8px 14px" : "11px 20px", fontSize: sm ? 13 : 15, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }; }
function Ghost(c) { c = c || C.blue; return { background: "transparent", color: c, border: "1.5px solid " + c, borderRadius: 10, padding: "8px 14px", fontSize: 14, fontWeight: 600, cursor: "pointer" }; }
function Badge(c) { return { background: c + "22", color: c, borderRadius: 20, padding: "3px 10px", fontSize: 12, fontWeight: 700, display: "inline-block", whiteSpace: "nowrap" }; }
function numCt(id) { return String(id).padStart(5, "0"); }

function useMobile() {
  const [m, setM] = useState(window.innerWidth < 768);
  useEffect(() => {
    const h = () => setM(window.innerWidth < 768);
    window.addEventListener("resize", h);
    return () => window.removeEventListener("resize", h);
  }, []);
  return m;
}

function Lbl({ label, children, flex }) {
  return (
    <div style={{ flex: flex, minWidth: 0 }}>
      <div style={{ fontSize: 13, fontWeight: 600, color: C.sub, marginBottom: 5 }}>{label}</div>
      {children}
    </div>
  );
}

function Toast({ msg, type }) {
  if (!msg) return null;
  return (
    <div style={{ position: "fixed", bottom: 90, left: "50%", transform: "translateX(-50%)", background: type === "error" ? C.red : C.green, color: "#fff", padding: "12px 24px", borderRadius: 14, fontWeight: 700, fontSize: 14, zIndex: 9999, boxShadow: "0 4px 20px rgba(0,0,0,.2)", pointerEvents: "none", maxWidth: "90vw", textAlign: "center" }}>
      {msg}
    </div>
  );
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return (
    <div onClick={onClose} style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.5)", zIndex: 1000, display: "flex", alignItems: "flex-end", justifyContent: "center" }}>
      <div onClick={e => e.stopPropagation()} style={{ background: "#FFF", borderRadius: "20px 20px 0 0", padding: 22, width: "100%", maxWidth: wide ? 720 : 560, maxHeight: "92vh", overflowY: "auto" }}>
        <div style={{ width: 36, height: 4, background: C.border, borderRadius: 2, margin: "0 auto 16px" }} />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
          <span style={{ fontSize: 17, fontWeight: 700 }}>{title}</span>
          <button onClick={onClose} style={{ background: C.border, border: "none", borderRadius: 50, width: 30, height: 30, cursor: "pointer", fontSize: 18, color: C.gray }}>x</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function Stat({ icon, label, val, color }) {
  color = color || C.blue;
  return (
    <div style={Object.assign({}, CARD, { flex: 1, minWidth: 130 })}>
      <div style={{ fontSize: 22 }}>{icon}</div>
      <div style={{ fontSize: 20, fontWeight: 800, color: color, lineHeight: 1.2, marginTop: 6 }}>{val}</div>
      <div style={{ fontSize: 12, color: C.sub, marginTop: 3 }}>{label}</div>
    </div>
  );
}

function UploadField({ label, value, onChange, accept, pasta, nome }) {
  const ref = useRef();
  const [uploading, setUploading] = useState(false);
  async function handle(e) {
    const file = e.target.files[0];
    if (!file) return;
    setUploading(true);
    try {
      const ext = file.name.split(".").pop();
      const url = await db.upload(pasta + "/" + nome + "_" + Date.now() + "." + ext, file);
      onChange(url);
    } catch(err) { alert("Erro no upload: " + err.message); }
    setUploading(false);
  }
  return (
    <div>
      <div style={{ fontSize: 13, fontWeight: 600, color: C.sub, marginBottom: 5 }}>{label}</div>
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        {value
          ? <a href={value} target="_blank" rel="noreferrer" style={{ color: C.blue, fontSize: 13, fontWeight: 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>Ver arquivo</a>
          : <span style={{ fontSize: 13, color: C.gray, flex: 1 }}>Nenhum arquivo</span>
        }
        <button type="button" style={Btn(value ? C.orange : C.blue, true)} onClick={() => ref.current.click()} disabled={uploading}>
          {uploading ? "Enviando..." : (value ? "Trocar" : "Enviar")}
        </button>
        {value && <button type="button" style={Btn(C.red, true)} onClick={() => onChange("")}>X</button>}
      </div>
      <input ref={ref} type="file" accept={accept || "image/*,.pdf"} onChange={handle} />
    </div>
  );
}

function buildHeader(emp) {
  var logo = (emp && emp.logo_url)
    ? '<img src="' + emp.logo_url + '" style="height:70px;max-width:200px;object-fit:contain"/>'
    : '<div style="font-size:22px;font-weight:800;color:#007AFF">' + (emp && emp.nome ? emp.nome : "AutoGest Pro") + '</div>';
  var info = "";
  if (emp) {
    if (emp.nome) info += '<div style="font-weight:700;font-size:14px">' + emp.nome + '</div>';
    if (emp.cnpj) info += "<div>CNPJ: " + emp.cnpj + "</div>";
    if (emp.endereco) info += "<div>" + emp.endereco + "</div>";
    if (emp.cidade || emp.estado) info += "<div>" + [emp.cidade, emp.estado].filter(Boolean).join(" - ") + "</div>";
    if (emp.telefone) info += "<div>Tel: " + emp.telefone + "</div>";
    if (emp.email) info += "<div>" + emp.email + "</div>";
  }
  return '<div style="display:flex;justify-content:space-between;align-items:center;padding-bottom:16px;border-bottom:3px solid #007AFF;margin-bottom:20px"><div>' + logo + '</div><div style="text-align:right;font-size:12px;color:#666;line-height:1.8">' + info + '</div></div>';
}

function printContrato(ct, cl, ve, emp) {
  cl = cl || {}; ve = ve || {}; emp = emp || {};
  var dias = 0;
  if (ct.data_inicio && ct.data_fim) dias = Math.max(1, Math.ceil((new Date(ct.data_fim) - new Date(ct.data_inicio)) / 86400000));
  var clausulas = emp.clausulas || "1. O locatario e responsavel por danos ao veiculo durante a locacao.\n2. O veiculo deve ser devolvido com o mesmo nivel de combustivel.\n3. E proibido o uso do veiculo para praticas ilegais.\n4. Multas ocorridas durante o periodo sao de responsabilidade do locatario.\n5. Em caso de sinistro, comunicar imediatamente a locadora.";
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Contrato ' + numCt(ct.id) + '</title><style>body{font-family:Arial,sans-serif;max-width:750px;margin:30px auto;font-size:13px}.s{margin:12px 0;border:1px solid #ddd;border-radius:8px;overflow:hidden}.st{background:#f5f5f7;padding:8px 14px;font-weight:700;font-size:11px;text-transform:uppercase}table{width:100%;border-collapse:collapse}td{padding:9px 14px;border-bottom:1px solid #eee}td:first-child{color:#666;width:40%}.vb{background:#f0fff4;padding:16px;text-align:center;font-size:28px;font-weight:800;color:#34C759}.cl{padding:14px;font-size:12px;line-height:2}.ass{display:flex;gap:40px;margin:20px 14px}.al{flex:1;border-top:2px solid #333;padding-top:8px;text-align:center;color:#666;font-size:12px}@media print{body{margin:0}}</style></head><body>';
  h += buildHeader(emp);
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:12px"><div style="font-size:18px;font-weight:800;color:#007AFF">CONTRATO No ' + numCt(ct.id) + '</div><div style="font-size:12px;color:#666">Emitido: ' + new Date().toLocaleDateString("pt-BR") + '</div></div>';
  h += '<div class="s"><div class="st">Locatario</div><table>';
  h += '<tr><td>Nome</td><td><b>' + (cl.nome || "--") + '</b></td></tr>';
  h += '<tr><td>CPF</td><td>' + (cl.cpf || "--") + '</td></tr>';
  h += '<tr><td>CNH / Cat.</td><td>' + (cl.cnh || "--") + (cl.categoria_cnh ? " (Cat. " + cl.categoria_cnh + ")" : "") + '</td></tr>';
  h += '<tr><td>Venc. CNH</td><td>' + (cl.vencimento_cnh || "--") + '</td></tr>';
  h += '<tr><td>Telefone</td><td>' + (cl.telefone || "--") + '</td></tr>';
  h += '<tr><td>Endereco</td><td>' + (cl.endereco || "--") + '</td></tr>';
  h += '</table></div>';
  h += '<div class="s"><div class="st">Veiculo</div><table>';
  h += '<tr><td>Placa</td><td><b>' + (ve.placa || "--") + '</b></td></tr>';
  h += '<tr><td>Veiculo</td><td>' + (ve.marca || "") + " " + (ve.modelo || "") + '</td></tr>';
  h += '<tr><td>Ano / Cor</td><td>' + (ve.ano || "--") + " / " + (ve.cor || "--") + '</td></tr>';
  h += '<tr><td>Renavam</td><td>' + (ve.renavam || "--") + '</td></tr>';
  h += '</table></div>';
  h += '<div class="s"><div class="st">Periodo</div><table>';
  h += '<tr><td>Retirada</td><td><b>' + (ct.data_inicio || "--") + '</b></td></tr>';
  h += '<tr><td>Devolucao</td><td><b>' + (ct.data_fim || "--") + '</b></td></tr>';
  h += '<tr><td>Dias</td><td>' + dias + '</td></tr>';
  h += '<tr><td>KM Saida/Retorno</td><td>' + (ct.km_inicial || "--") + " / " + (ct.km_final || "--") + '</td></tr>';
  h += '<tr><td>Diaria</td><td>R$ ' + parseFloat(ve.valor_diaria || 0).toFixed(2) + '</td></tr>';
  h += '</table></div>';
  h += '<div class="s"><div class="st">Valor Total</div><div class="vb">R$ ' + parseFloat(ct.valor_total || 0).toLocaleString("pt-BR", { minimumFractionDigits: 2 }) + '</div></div>';
  if (ct.observacoes) h += '<div class="s"><div class="st">Observacoes</div><div class="cl">' + ct.observacoes + '</div></div>';
  h += '<div class="s"><div class="st">Clausulas</div><div class="cl">' + clausulas.replace(/\n/g, "<br/>") + '</div></div>';
  h += '<div class="s"><div class="st">Assinaturas</div><div class="ass"><div class="al">' + (emp.nome || "Locadora") + '<br/>Responsavel</div><div class="al">' + (cl.nome || "Locatario") + '<br/>Locatario</div></div></div>';
  h += '<p style="text-align:center;font-size:10px;color:#aaa">AutoGest Pro - ' + new Date().toLocaleString("pt-BR") + '</p>';
  h += "<scr" + "ipt>window.print();</scr" + "ipt></body></html>";
  var w = window.open("", "_blank"); w.document.write(h); w.document.close();
}

function printFatura(ct, cl, ve, emp) {
  cl = cl || {}; ve = ve || {}; emp = emp || {};
  var dias = 0;
  if (ct.data_inicio && ct.data_fim) dias = Math.max(1, Math.ceil((new Date(ct.data_fim) - new Date(ct.data_inicio)) / 86400000));
  var vd = parseFloat(ve.valor_diaria || 0);
  var sub = dias * vd;
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Fatura ' + numCt(ct.id) + '</title><style>body{font-family:Arial,sans-serif;max-width:700px;margin:30px auto;font-size:13px}table{width:100%;border-collapse:collapse}th{background:#f5f5f7;padding:10px 14px;text-align:left;font-size:11px;text-transform:uppercase;border-bottom:2px solid #ddd}td{padding:10px 14px;border-bottom:1px solid #eee}.tot td{font-size:18px;font-weight:800;color:#34C759;border-top:2px solid #ddd;border-bottom:none}.ib{background:#f5f5f7;border-radius:8px;padding:14px;margin:12px 0;font-size:12px;line-height:2}@media print{body{margin:0}}</style></head><body>';
  h += buildHeader(emp);
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:16px"><div><div style="font-size:22px;font-weight:800">FATURA</div><div style="font-size:13px;color:#666">No ' + numCt(ct.id) + ' - Contrato #' + ct.id + '</div></div><div style="font-size:12px;color:#666">Emissao: ' + new Date().toLocaleDateString("pt-BR") + '</div></div>';
  h += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px">';
  h += '<div class="ib"><b>Cliente</b><br/>' + (cl.nome || "--") + '<br/>CPF: ' + (cl.cpf || "--") + '<br/>Tel: ' + (cl.telefone || "--") + '</div>';
  h += '<div class="ib"><b>Veiculo</b><br/>' + (ve.placa || "--") + ' - ' + (ve.marca || "") + " " + (ve.modelo || "") + '<br/>Periodo: ' + (ct.data_inicio || "--") + ' a ' + (ct.data_fim || "--") + '</div>';
  h += '</div>';
  h += '<table><tr><th>Descricao</th><th>Qtd</th><th>Unit.</th><th>Total</th></tr>';
  h += '<tr><td>Diaria - ' + (ve.marca || "") + " " + (ve.modelo || "") + '</td><td>' + dias + ' dia(s)</td><td>R$ ' + vd.toFixed(2) + '</td><td>R$ ' + sub.toFixed(2) + '</td></tr>';
  if (ct.observacoes) h += '<tr><td colspan="4" style="color:#666;font-size:12px">Obs: ' + ct.observacoes + '</td></tr>';
  h += '<tr class="tot"><td colspan="3"><b>TOTAL</b></td><td><b>R$ ' + parseFloat(ct.valor_total || sub).toLocaleString("pt-BR", { minimumFractionDigits: 2 }) + '</b></td></tr>';
  h += '</table>';
  h += '<p style="text-align:center;font-size:11px;color:#aaa;margin-top:20px">' + (emp.nome || "") + (emp.cnpj ? " - CNPJ " + emp.cnpj : "") + (emp.telefone ? " - Tel " + emp.telefone : "") + '<br/>AutoGest Pro - ' + new Date().toLocaleString("pt-BR") + '</p>';
  h += "<scr" + "ipt>window.print();</scr" + "ipt></body></html>";
  var w = window.open("", "_blank"); w.document.write(h); w.document.close();
}

// ── INICIO ─────────────────────────────────────────────────────────────────
function Inicio({ veiculos, clientes, contratos, multas, manutencoes }) {
  const disp = veiculos.filter(v => v.status === "disponivel").length;
  const ativos = contratos.filter(c => c.status === "ativo").length;
  const mPend = multas.filter(m => m.status === "pendente").length;
  const manAt = manutencoes.filter(m => m.status === "em_andamento").length;
  const receita = contratos.filter(c => c.status === "concluido").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  const custoMan = manutencoes.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div>
        <div style={{ fontSize: 24, fontWeight: 800 }}>AutoGest Pro</div>
        <div style={{ fontSize: 14, color: C.sub }}>Painel de Gestao</div>
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="🚗" label="Disponiveis" val={disp} color={C.green} />
        <Stat icon="📋" label="Ativos" val={ativos} color={C.blue} />
        <Stat icon="👤" label="Clientes" val={clientes.length} color={C.orange} />
        <Stat icon="🔧" label="Manutencao" val={manAt} color={C.purple} />
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <div style={Object.assign({}, CARD, { flex: 1, minWidth: 180 })}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, marginBottom: 6, textTransform: "uppercase" }}>Receita Total</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: C.green }}>R$ {receita.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</div>
        </div>
        <div style={Object.assign({}, CARD, { flex: 1, minWidth: 180 })}>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, marginBottom: 6, textTransform: "uppercase" }}>Custo Manutencao</div>
          <div style={{ fontSize: 26, fontWeight: 800, color: C.purple }}>R$ {custoMan.toLocaleString("pt-BR", { minimumFractionDigits: 2 })}</div>
        </div>
      </div>
      {mPend > 0 && (
        <div style={{ background: C.orange + "18", border: "1px solid " + C.orange, borderRadius: 12, padding: "12px 16px", color: C.orange, fontWeight: 600, fontSize: 14 }}>
          Atencao: {mPend} multa(s) pendente(s)
        </div>
      )}
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 10 }}>Contratos Recentes</div>
        {contratos.slice(0, 5).length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Nenhum contrato ainda</div>}
        {contratos.slice(0, 5).map((c, i) => (
          <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < 4 ? "1px solid " + C.border : "none" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>Contrato No {numCt(c.id)}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{c.data_inicio} a {c.data_fim}</div>
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontWeight: 700 }}>R$ {parseFloat(c.valor_total || 0).toFixed(2)}</span>
              <span style={Badge(c.status === "ativo" ? C.blue : c.status === "concluido" ? C.green : C.red)}>{c.status}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── FROTA ──────────────────────────────────────────────────────────────────
function Frota({ veiculos, setVeiculos, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(false);
  const SC = { disponivel: C.green, alugado: C.blue, manutencao: C.purple, inativo: C.red };
  const fil = veiculos.filter(v => ((v.placa || "") + " " + (v.modelo || "") + " " + (v.marca || "")).toLowerCase().includes(search.toLowerCase()));
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.placa || !form.modelo) return toast("Placa e Modelo obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) {
        const u = await db.patch("veiculos", edit, form);
        setVeiculos(p => p.map(v => v.id === edit ? Object.assign({}, v, u) : v));
        toast("Atualizado!");
      } else {
        const c = await db.post("veiculos", form);
        setVeiculos(p => [c].concat(p));
        toast("Cadastrado!");
      }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) {
    if (!confirm("Excluir?")) return;
    await db.del("veiculos", id);

      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 12 }}>
        {fil.map(v => (
          <div key={v.id} style={Object.assign({}, CARD, { display: "flex", flexDirection: "column", gap: 10 })}>

                <div style={{ fontWeight: 800, fontSize: 20, letterSpacing: 2, color: C.blue }}>{v.placa}</div>
              </div>
              <span style={Badge(SC[v.status] || C.gray)}>{v.status}</span>
            </div>
            <div style={{ fontSize: 12, color: C.sub, display: "flex", gap: 12, flexWrap: "wrap" }}>

            <div style={{ fontWeight: 700, color: C.green }}>R$ {parseFloat(v.valor_diaria || 0).toFixed(2)}<span style={{ fontWeight: 400, fontSize: 12, color: C.sub }}>/dia</span></div>
            {v.crv_url && <a href={v.crv_url} target="_blank" rel="noreferrer" style={{ fontSize: 13, color: C.teal, fontWeight: 600 }}>Ver CRV</a>}
            <div style={{ display: "flex", gap: 8 }}>
              <button style={Object.assign({}, Ghost(), { flex: 1 })} onClick={() => { setForm(Object.assign({}, v)); setEdit(v.id); setModal(true); }}>Editar</button>

        {fil.length === 0 && <div style={{ color: C.sub, gridColumn: "1/-1", textAlign: "center", padding: 30 }}>Nenhum veiculo</div>}
      </div>
      <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Veiculo" : "Novo Veiculo"}>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ display: "flex", gap: 10 }}>

          </div>
          <div style={{ display: "flex", gap: 10 }}>

          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Diaria (R$)" flex={1}><input style={FI} type="number" step="0.01" value={form.valor_diaria || ""} onChange={e => F("valor_diaria", e.target.value)} /></Lbl>

  );
}

// ── CONTRATOS ──────────────────────────────────────────────────────────────
function Contratos({ contratos, setContratos, veiculos, setVeiculos, clientes, empresa, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("todos");
  const fil = contratos.filter(c => filter === "todos" || c.status === filter);
  function getCl(id) { return clientes.find(c => c.id == id); }
  function getVe(id) { return veiculos.find(v => v.id == id); }
  function dias(fm) {
    if (!fm.data_inicio || !fm.data_fim) return 0;
    return Math.max(1, Math.ceil((new Date(fm.data_fim) - new Date(fm.data_inicio)) / 86400000));
  }
  function valor(fm) {
    var v = getVe(fm.veiculo_id);
    if (!v) return "0.00";
    return (dias(fm) * parseFloat(v.valor_diaria || 0)).toFixed(2);
  }
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.cliente_id || !form.veiculo_id) return toast("Cliente e Veiculo obrigatorios", "error");
    setLoading(true);
    try {
      const payload = Object.assign({}, form, { valor_total: valor(form) });
      if (edit) {
        const u = await db.patch("contratos", edit, payload);
        setContratos(p => p.map(c => c.id === edit ? Object.assign({}, c, u) : c));
        toast("Atualizado!");
      } else {
        const c = await db.post("contratos", payload);
        setContratos(p => [c].concat(p));
        await db.patch("veiculos", form.veiculo_id, { status: "alugado" });
        setVeiculos(p => p.map(v => v.id == form.veiculo_id ? Object.assign({}, v, { status: "alugado" }) : v));
        toast("Contrato No " + numCt(c.id) + " criado!");
      }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) {
    if (!confirm("Excluir?")) return;
    await db.del("contratos", id);
    setContratos(p => p.filter(c => c.id !== id));
    toast("Excluido!");
  }
  async function concluir(ct) {
    if (!confirm("Concluir e liberar veiculo?")) return;
    await db.patch("contratos", ct.id, { status: "concluido" });
    await db.patch("veiculos", ct.veiculo_id, { status: "disponivel" });
    setContratos(p => p.map(c => c.id === ct.id ? Object.assign({}, c, { status: "concluido" }) : c));
    setVeiculos(p => p.map(v => v.id == ct.veiculo_id ? Object.assign({}, v, { status: "disponivel" }) : v));
    toast("Concluido! Veiculo liberado");
  }
  const SC = { ativo: C.blue, concluido: C.green, cancelado: C.red };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 24, fontWeight: 800 }}>Contratos</div>
        <button style={Btn()} onClick={() => { setForm({ status: "ativo" }); setEdit(null); setModal(true); }}>+ Contrato</button>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        {["todos", "ativo", "concluido", "cancelado"].map(x => (
          <button key={x} onClick={() => setFilter(x)} style={Object.assign({}, Ghost(filter === x ? C.blue : C.gray), { background: filter === x ? C.blue : "transparent", color: filter === x ? "#fff" : C.gray, textTransform: "capitalize" })}>{x}</button>
        ))}
      </div>
      <div style={CARD}>
        {fil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhum contrato</div>}
        {fil.map((c, i) => {
          const cl = getCl(c.cliente_id);
          const ve = getVe(c.veiculo_id);
          return (
            <div key={c.id} style={{ padding: "13px 0", borderBottom: i < fil.length - 1 ? "1px solid " + C.border : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>Contrato No {numCt(c.id)}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>{cl && cl.nome || "--"} - {ve && ve.placa || "--"} {ve && ve.modelo || ""}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>{c.data_inicio} a {c.data_fim}</div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 800, fontSize: 16, color: C.green }}>R$ {parseFloat(c.valor_total || 0).toFixed(2)}</div>
                  <span style={Badge(SC[c.status] || C.gray)}>{c.status}</span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                {c.status === "ativo" && <button style={Btn(C.green, true)} onClick={() => concluir(c)}>Concluir</button>}
                <button style={Ghost()} onClick={() => { setForm(Object.assign({}, c)); setEdit(c.id); setModal(true); }}>Editar</button>
                <button style={Btn(C.blue, true)} onClick={() => printContrato(c, cl, ve, empresa)}>Contrato PDF</button>
                <button style={Btn(C.orange, true)} onClick={() => printFatura(c, cl, ve, empresa)}>Fatura PDF</button>
                <button style={Btn(C.red, true)} onClick={() => remove(c.id)}>X</button>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Contrato" : "Novo Contrato"} wide>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Lbl label="Cliente *">
            <select style={FI} value={form.cliente_id || ""} onChange={e => F("cliente_id", e.target.value)}>
              <option value="">Selecione...</option>
              {clientes.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}
            </select>
          </Lbl>
          <Lbl label="Veiculo *">
            <select style={FI} value={form.veiculo_id || ""} onChange={e => F("veiculo_id", e.target.value)}>
              <option value="">Selecione...</option>
              {veiculos.filter(v => v.status === "disponivel" || v.id == form.veiculo_id).map(v => (
                <option key={v.id} value={v.id}>{v.placa} - {v.marca} {v.modelo} - R$ {v.valor_diaria}/dia</option>
              ))}
            </select>
          </Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Retirada" flex={1}><input style={FI} type="date" value={form.data_inicio || ""} onChange={e => F("data_inicio", e.target.value)} /></Lbl>
            <Lbl label="Devolucao" flex={1}><input style={FI} type="date" value={form.data_fim || ""} onChange={e => F("data_fim", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="KM Saida" flex={1}><input style={FI} type="number" value={form.km_inicial || ""} onChange={e => F("km_inicial", e.target.value)} /></Lbl>
            <Lbl label="KM Retorno" flex={1}><input style={FI} type="number" value={form.km_final || ""} onChange={e => F("km_final", e.target.value)} /></Lbl>
          </div>
          <Lbl label="Status">
            <select style={FI} value={form.status || "ativo"} onChange={e => F("status", e.target.value)}>
              <option value="ativo">Ativo</option>
              <option value="concluido">Concluido</option>
              <option value="cancelado">Cancelado</option>
            </select>
          </Lbl>
          <Lbl label="Observacoes">
            <textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 60 })} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} />
          </Lbl>
          {form.veiculo_id && form.data_inicio && form.data_fim && (
            <div style={{ background: C.bg, borderRadius: 12, padding: "12px 16px", textAlign: "center" }}>
              <span style={{ fontSize: 12, color: C.sub }}>Estimativa: </span>
              <span style={{ fontWeight: 800, fontSize: 20, color: C.green }}>R$ {valor(form)}</span>
              <span style={{ fontSize: 12, color: C.sub }}> ({dias(form)} dias)</span>
            </div>
          )}
          <button style={Btn()} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar Contrato"}</button>
        </div>
      </Modal>
    </div>
  );
}

// ── MULTAS ─────────────────────────────────────────────────────────────────
function Multas({ multas, setMultas, contratos, clientes, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("todos");
  const fil = multas.filter(m => filter === "todos" || m.status === filter);
  function getCt(id) { return contratos.find(c => c.id == id); }
  function getCl(id) { return clientes.find(c => c.id == id); }
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.contrato_id || !form.tipo || !form.valor) return toast("Preencha os campos obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) {
        const u = await db.patch("multas", edit, form);
        setMultas(p => p.map(m => m.id === edit ? Object.assign({}, m, u) : m));
        toast("Atualizado!");
      } else {
        const c = await db.post("multas", form);
        setMultas(p => [c].concat(p));
        toast("Registrada!");
      }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) {
    if (!confirm("Excluir?")) return;
    await db.del("multas", id);
    setMultas(p => p.filter(m => m.id !== id));
    toast("Excluido!");
  }
  async function pagar(m) {
    await db.patch("multas", m.id, { status: "pago" });
    setMultas(p => p.map(x => x.id === m.id ? Object.assign({}, x, { status: "pago" }) : x));
    toast("Pago!");
  }
  const SC = { pendente: C.orange, pago: C.green, contestado: C.red };
  const total = fil.reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 24, fontWeight: 800 }}>Multas</div>
        <button style={Btn(C.red)} onClick={() => { setForm({ status: "pendente", data: new Date().toISOString().split("T")[0] }); setEdit(null); setModal(true); }}>+ Multa</button>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
        {["todos", "pendente", "pago", "contestado"].map(x => (
          <button key={x} onClick={() => setFilter(x)} style={Object.assign({}, Ghost(filter === x ? C.blue : C.gray), { background: filter === x ? C.blue : "transparent", color: filter === x ? "#fff" : C.gray, textTransform: "capitalize" })}>{x}</button>
        ))}
        <span style={{ marginLeft: "auto", fontWeight: 700, color: C.red }}>R$ {total.toFixed(2)}</span>
      </div>
      <div style={CARD}>
        {fil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma multa</div>}
        {fil.map((m, i) => {
          const ct = getCt(m.contrato_id);
          const cl = ct ? getCl(ct.cliente_id) : null;
          return (
            <div key={m.id} style={{ padding: "13px 0", borderBottom: i < fil.length - 1 ? "1px solid " + C.border : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{m.tipo}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>Contrato #{m.contrato_id} - {cl && cl.nome || "--"}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>{m.data}{m.local && " - " + m.local}</div>
                  <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                    {m.auto_infracao_url && <a href={m.auto_infracao_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>Auto Infracao</a>}
                    {m.cnh_condutor_url && <a href={m.cnh_condutor_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>CNH Condutor</a>}
                  </div>
                </div>
                <div style={{ textAlign: "right" }}>
                  <div style={{ fontWeight: 800, fontSize: 17, color: C.red }}>R$ {parseFloat(m.valor || 0).toFixed(2)}</div>
                  <span style={Badge(SC[m.status] || C.gray)}>{m.status}</span>
                  {m.pontos && <div style={{ fontSize: 11, color: C.sub }}>{m.pontos} pts</div>}
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                {m.status === "pendente" && <button style={Btn(C.green, true)} onClick={() => pagar(m)}>Pago</button>}
                <button style={Ghost()} onClick={() => { setForm(Object.assign({}, m)); setEdit(m.id); setModal(true); }}>Editar</button>
                <button style={Btn(C.red, true)} onClick={() => remove(m.id)}>X</button>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Multa" : "Nova Multa"} wide>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Lbl label="Contrato *">
            <select style={FI} value={form.contrato_id || ""} onChange={e => F("contrato_id", e.target.value)}>
              <option value="">Selecione...</option>
              {contratos.map(c => {
                const cl = clientes.find(x => x.id == c.cliente_id);
                return <option key={c.id} value={c.id}>#{numCt(c.id)} - {cl && cl.nome || "?"}</option>;
              })}
            </select>
          </Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Tipo *" flex={1}>
              <select style={FI} value={form.tipo || ""} onChange={e => F("tipo", e.target.value)}>
                <option value="">Selecione...</option>
                <option>Excesso de Velocidade</option>
                <option>Estacionamento Irregular</option>
                <option>Avanco de Sinal</option>
                <option>Uso de Celular</option>
                <option>Faixa de Pedestre</option>
                <option>Documentacao</option>
                <option>Outro</option>
              </select>
            </Lbl>
            <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Data *" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
            <Lbl label="Pontos" flex={1}><input style={FI} type="number" value={form.pontos || ""} onChange={e => F("pontos", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Local" flex={2}><input style={FI} value={form.local || ""} onChange={e => F("local", e.target.value)} /></Lbl>
            <Lbl label="Status" flex={1}>
              <select style={FI} value={form.status || "pendente"} onChange={e => F("status", e.target.value)}>
                <option value="pendente">Pendente</option>
                <option value="pago">Pago</option>
                <option value="contestado">Contestado</option>
              </select>
            </Lbl>
          </div>
          <Lbl label="Descricao"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} /></Lbl>
          <UploadField label="Auto de Infracao" value={form.auto_infracao_url || ""} onChange={v => F("auto_infracao_url", v)} pasta="multas" nome={"auto_" + (form.contrato_id || "0")} />
          <UploadField label="CNH do Condutor" value={form.cnh_condutor_url || ""} onChange={v => F("cnh_condutor_url", v)} pasta="cnh_infratores" nome={"cnh_" + (form.contrato_id || "0")} />
          <button style={Btn(C.red)} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </div>
      </Modal>
    </div>
  );
}

// ── MANUTENCAO ─────────────────────────────────────────────────────────────
function Manutencao({ manutencoes, setManutencoes, veiculos, setVeiculos, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("todos");
  const fil = manutencoes.filter(m => filter === "todos" || m.status === filter);
  function getVe(id) { return veiculos.find(v => v.id == id); }
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.veiculo_id || !form.tipo) return toast("Veiculo e Tipo obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) {
        const u = await db.patch("manutencao", edit, form);
        setManutencoes(p => p.map(m => m.id === edit ? Object.assign({}, m, u) : m));
        const ns = form.status === "em_andamento" ? "manutencao" : "disponivel";
        await db.patch("veiculos", form.veiculo_id, { status: ns });
        setVeiculos(p => p.map(v => v.id == form.veiculo_id ? Object.assign({}, v, { status: ns }) : v));
        toast("Atualizado!");
      } else {
        const c = await db.post("manutencao", form);
        setManutencoes(p => [c].concat(p));
        await db.patch("veiculos", form.veiculo_id, { status: "manutencao" });
        setVeiculos(p => p.map(v => v.id == form.veiculo_id ? Object.assign({}, v, { status: "manutencao" }) : v));
        toast("Registrada!");
      }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) {
    if (!confirm("Excluir?")) return;
    await db.del("manutencao", id);
    setManutencoes(p => p.filter(m => m.id !== id));
    toast("Excluido!");
  }
  async function concluir(m) {
    if (!confirm("Concluir e liberar veiculo?")) return;
    const hoje = new Date().toISOString().split("T")[0];
    await db.patch("manutencao", m.id, { status: "concluida", data_saida: hoje });
    await db.patch("veiculos", m.veiculo_id, { status: "disponivel" });
    setManutencoes(p => p.map(x => x.id === m.id ? Object.assign({}, x, { status: "concluida", data_saida: hoje }) : x));
    setVeiculos(p => p.map(v => v.id == m.veiculo_id ? Object.assign({}, v, { status: "disponivel" }) : v));
    toast("Concluida! Veiculo liberado");
  }
  const SC = { em_andamento: C.orange, concluida: C.green, aguardando: C.purple, cancelada: C.red };
  const total = fil.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 24, fontWeight: 800 }}>Manutencao</div>
        <button style={Btn(C.purple)} onClick={() => { setForm({ status: "em_andamento", data_entrada: new Date().toISOString().split("T")[0] }); setEdit(null); setModal(true); }}>+ Manutencao</button>
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
        {["todos", "em_andamento", "aguardando", "concluida", "cancelada"].map(x => (
          <button key={x} onClick={() => setFilter(x)} style={Object.assign({}, Ghost(filter === x ? C.purple : C.gray), { background: filter === x ? C.purple : "transparent", color: filter === x ? "#fff" : C.gray, fontSize: 13 })}>{x.replace("_", " ")}</button>
        ))}
        <span style={{ marginLeft: "auto", fontWeight: 700, color: C.purple }}>R$ {total.toFixed(2)}</span>
      </div>
      <div style={CARD}>
        {fil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma manutencao</div>}
        {fil.map((m, i) => {
          const ve = getVe(m.veiculo_id);
          return (
            <div key={m.id} style={{ padding: "13px 0", borderBottom: i < fil.length - 1 ? "1px solid " + C.border : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
                <div>
                  <div style={{ fontWeight: 700, fontSize: 15 }}>{m.tipo}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>{ve && ve.placa || "--"} {ve && ve.modelo || ""}</div>
                  <div style={{ fontSize: 12, color: C.sub }}>Entrada: {m.data_entrada || "--"}{m.data_saida && " - Saida: " + m.data_saida}</div>
                  {m.oficina && <div style={{ fontSize: 12, color: C.sub }}>{m.oficina}</div>}
                  {m.descricao && <div style={{ fontSize: 12, color: C.sub }}>{m.descricao}</div>}
                </div>
                <div style={{ textAlign: "right" }}>
                  {parseFloat(m.custo || 0) > 0 && <div style={{ fontWeight: 800, fontSize: 16, color: C.purple }}>R$ {parseFloat(m.custo || 0).toFixed(2)}</div>}
                  <span style={Badge(SC[m.status] || C.gray)}>{(m.status || "").replace("_", " ")}</span>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 10, flexWrap: "wrap" }}>
                {m.status === "em_andamento" && <button style={Btn(C.green, true)} onClick={() => concluir(m)}>Concluir</button>}
                <button style={Ghost(C.purple)} onClick={() => { setForm(Object.assign({}, m)); setEdit(m.id); setModal(true); }}>Editar</button>
                <button style={Btn(C.red, true)} onClick={() => remove(m.id)}>X</button>
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar" : "Nova Manutencao"} wide>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Lbl label="Veiculo *">
            <select style={FI} value={form.veiculo_id || ""} onChange={e => F("veiculo_id", e.target.value)}>
              <option value="">Selecione...</option>
              {veiculos.map(v => <option key={v.id} value={v.id}>{v.placa} - {v.marca} {v.modelo}</option>)}
            </select>
          </Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Tipo *" flex={1}>
              <select style={FI} value={form.tipo || ""} onChange={e => F("tipo", e.target.value)}>
                <option value="">Selecione...</option>
                <option>Revisao Geral</option><option>Troca de Oleo</option><option>Freios</option>
                <option>Pneus</option><option>Suspensao</option><option>Eletrica</option>
                <option>Funilaria/Pintura</option><option>Ar Condicionado</option><option>Outro</option>
              </select>
            </Lbl>
            <Lbl label="Status" flex={1}>
              <select style={FI} value={form.status || "em_andamento"} onChange={e => F("status", e.target.value)}>
                <option value="aguardando">Aguardando</option>
                <option value="em_andamento">Em Andamento</option>
                <option value="concluida">Concluida</option>
                <option value="cancelada">Cancelada</option>
              </select>
            </Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Entrada" flex={1}><input style={FI} type="date" value={form.data_entrada || ""} onChange={e => F("data_entrada", e.target.value)} /></Lbl>
            <Lbl label="Saida Prevista" flex={1}><input style={FI} type="date" value={form.data_saida || ""} onChange={e => F("data_saida", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Oficina" flex={2}><input style={FI} value={form.oficina || ""} onChange={e => F("oficina", e.target.value)} /></Lbl>
            <Lbl label="Custo (R$)" flex={1}><input style={FI} type="number" step="0.01" value={form.custo || ""} onChange={e => F("custo", e.target.value)} /></Lbl>
          </div>
          <Lbl label="Descricao / Pecas">
            <textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 80 })} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} />
          </Lbl>
          <button style={Btn(C.purple)} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </div>
      </Modal>
    </div>
  );
}

// ── RELATORIOS ─────────────────────────────────────────────────────────────
function Relatorios({ contratos, veiculos, clientes, multas, manutencoes, empresa }) {
  const receita = contratos.filter(c => c.status === "concluido").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  const receitaAtiva = contratos.filter(c => c.status === "ativo").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  const mTotal = multas.reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  const mPagas = multas.filter(m => m.status === "pago").reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  const custoMan = manutencoes.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  const lucro = receita - mTotal - custoMan;
  const porStatus = ["disponivel", "alugado", "manutencao", "inativo"].map(st => ({ label: st, count: veiculos.filter(v => v.status === st).length }));
  function imprimir() {
    var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio</title><style>body{font-family:Arial,sans-serif;max-width:850px;margin:30px auto;font-size:13px}h2{border-bottom:1px solid #ddd;padding-bottom:6px;margin:20px 0 10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #ddd}th{background:#f5f5f7}.g{color:#34C759;font-weight:800}.r{color:#FF3B30}@media print{body{margin:0}}</style></head><body>';
    h += buildHeader(empresa);
    h += '<h2>Financeiro</h2><table><tr><th>Indicador</th><th>Valor</th></tr>';
    h += '<tr><td>Receita total</td><td class="g">R$ ' + receita.toLocaleString("pt-BR", { minimumFractionDigits: 2 }) + '</td></tr>';
    h += '<tr><td>Em aberto</td><td>R$ ' + receitaAtiva.toFixed(2) + '</td></tr>';
    h += '<tr><td>Multas emitidas</td><td class="r">R$ ' + mTotal.toFixed(2) + '</td></tr>';
    h += '<tr><td>Multas pagas</td><td>R$ ' + mPagas.toFixed(2) + '</td></tr>';
    h += '<tr><td>Custo manutencao</td><td>R$ ' + custoMan.toFixed(2) + '</td></tr>';
    h += '<tr><td><b>Lucro estimado</b></td><td class="' + (lucro >= 0 ? "g" : "r") + '">R$ ' + lucro.toFixed(2) + '</td></tr></table>';
    h += '<h2>Contratos (' + contratos.length + ')</h2><table><tr><th>No</th><th>Cliente</th><th>Veiculo</th><th>Inicio</th><th>Fim</th><th>Valor</th><th>Status</th></tr>';
    contratos.forEach(function(c) {
      var cl = clientes.find(function(x) { return x.id == c.cliente_id; });
      var ve = veiculos.find(function(x) { return x.id == c.veiculo_id; });
      h += '<tr><td>' + numCt(c.id) + '</td><td>' + (cl && cl.nome || "--") + '</td><td>' + (ve && ve.placa || "--") + '</td><td>' + (c.data_inicio || "--") + '</td><td>' + (c.data_fim || "--") + '</td><td>R$ ' + parseFloat(c.valor_total || 0).toFixed(2) + '</td><td>' + c.status + '</td></tr>';
    });
    h += '</table><scr' + 'ipt>window.print();</scr' + 'ipt></body></html>';
    var w = window.open("", "_blank"); w.document.write(h); w.document.close();
  }
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ fontSize: 24, fontWeight: 800 }}>Relatorios</div>
        <button style={Btn(C.orange)} onClick={imprimir}>Imprimir</button>
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="💰" label="Receita" val={"R$ " + receita.toLocaleString("pt-BR", { minimumFractionDigits: 2 })} color={C.green} />
        <Stat icon="📋" label="Em aberto" val={"R$ " + receitaAtiva.toFixed(2)} color={C.blue} />
        <Stat icon="📈" label="Lucro" val={"R$ " + lucro.toFixed(2)} color={lucro >= 0 ? C.green : C.red} />
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="⚠️" label="Multas" val={"R$ " + mTotal.toFixed(2)} color={C.red} />
        <Stat icon="✅" label="Multas pagas" val={"R$ " + mPagas.toFixed(2)} color={C.green} />
        <Stat icon="🔧" label="Manutencao" val={"R$ " + custoMan.toFixed(2)} color={C.purple} />
      </div>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Frota por Status</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
          {porStatus.map(p => (
            <div key={p.label} style={{ textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 6px" }}>
              <div style={{ fontSize: 22, fontWeight: 800, color: C.blue }}>{p.count}</div>
              <div style={{ fontSize: 11, color: C.sub, marginTop: 3, textTransform: "capitalize" }}>{p.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── CONFIG ─────────────────────────────────────────────────────────────────
function Config({ empresa, setEmpresa, toast }) {
  const [form, setForm] = useState(Object.assign({}, empresa));
  const [loading, setLoading] = useState(false);
  const [configId, setConfigId] = useState(null);
  const [ok, setOk] = useState(false);
  async function carregar() {
    const d = await db.get("config", "limit=1");
    if (d && d[0]) { setForm(d[0]); setConfigId(d[0].id); setEmpresa(d[0]); }
  }
  useEffect(() => { carregar(); }, []);
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    setLoading(true); setOk(false);
    try {
      const p = { nome: form.nome || "", cnpj: form.cnpj || "", endereco: form.endereco || "", telefone: form.telefone || "", email: form.email || "", cidade: form.cidade || "", estado: form.estado || "", logo_url: form.logo_url || "", clausulas: form.clausulas || "" };
      if (configId) {
        await db.patch("config", configId, p);
      } else {
        const c = await db.post("config", p);
        if (c && c.id) setConfigId(c.id);
      }
      await carregar();
      setOk(true);
      toast("Salvo com sucesso!");
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  const CLAUSULAS_PADRAO = "1. O locatario e responsavel por danos ao veiculo durante a locacao.\n2. O veiculo deve ser devolvido com o mesmo nivel de combustivel.\n3. E proibido o uso do veiculo para praticas ilegais.\n4. Multas ocorridas durante o periodo sao de responsabilidade do locatario.\n5. Em caso de sinistro, comunicar imediatamente a locadora.\n6. O nao cumprimento do prazo implica cobranca de diaria adicional.";
  return (
<div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ fontSize: 24, fontWeight: 800 }}>Configuracoes</div>
      {ok && <div style={{ background: C.green + "22", border: "1px solid " + C.green, borderRadius: 12, padding: "12px 16px", color: C.green, fontWeight: 600 }}>Dados salvos!</div>}
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 14 }}>Dados da Empresa</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
          <Lbl label="Nome da Empresa"><input style={FI} value={form.nome || ""} onChange={e => F("nome", e.target.value)} placeholder="Ex: Estilo Rent a Car" /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="CNPJ" flex={1}><input style={FI} value={form.cnpj || ""} onChange={e => F("cnpj", e.target.value)} /></Lbl>
            <Lbl label="Telefone" flex={1}><input style={FI} value={form.telefone || ""} onChange={e => F("telefone", e.target.value)} /></Lbl>
          </div>
          <Lbl label="Email"><input style={FI} type="email" value={form.email || ""} onChange={e => F("email", e.target.value)} /></Lbl>
          <Lbl label="Endereco"><input style={FI} value={form.endereco || ""} onChange={e => F("endereco", e.target.value)} /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Cidade" flex={2}><input style={FI} value={form.cidade || ""} onChange={e => F("cidade", e.target.value)} /></Lbl>
            <Lbl label="UF" flex={1}><input style={FI} value={form.estado || ""} onChange={e => F("estado", e.target.value)} placeholder="SP" /></Lbl>
          </div>
        </div>
      </div>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Logo da Empresa</div>
        {form.logo_url && <img src={form.logo_url} alt="Logo" style={{ maxHeight: 80, maxWidth: 220, objectFit: "contain", marginBottom: 10, borderRadius: 8, border: "1px solid " + C.border }} />}
        <UploadField label="Enviar logo (PNG ou JPG)" value={form.logo_url || ""} onChange={v => F("logo_url", v)} accept="image/*" pasta="logo" nome="empresa_logo" />
        <div style={{ fontSize: 12, color: C.sub, marginTop: 8 }}>A logo aparece nos contratos e faturas impressos.</div>
      </div>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 8 }}>Clausulas do Contrato</div>
        <textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 160, fontSize: 13, lineHeight: 1.8 })} value={form.clausulas || ""} onChange={e => F("clausulas", e.target.value)} placeholder={CLAUSULAS_PADRAO} />
        <button style={Object.assign({}, Ghost(), { marginTop: 8, fontSize: 13 })} onClick={() => F("clausulas", CLAUSULAS_PADRAO)}>Restaurar padrao</button>
      </div>
      <button style={Btn()} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar Tudo"}</button>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 8 }}>Status</div>
        <div style={{ fontSize: 13, lineHeight: 2, color: C.sub }}>
          <div>Supabase conectado</div>
          <div>{configId ? "Config salvo (ID " + configId + ")" : "Ainda nao salvo"}</div>
        </div>
      </div>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 8 }}>Bucket para Uploads</div>
        <div style={{ fontSize: 13, color: C.sub, lineHeight: 1.8 }}>
          Supabase - Storage - New Bucket - Nome: <b style={{ color: C.blue }}>documentos</b> - marcar Public - Create
        </div>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
const TABS = [
  { id: "inicio", label: "Inicio" },
  { id: "frota", label: "Frota" },
  { id: "clientes", label: "Clientes" },
  { id: "contratos", label: "Contratos" },
  { id: "multas", label: "Multas" },
  { id: "manutencao", label: "Manutencao" },
  { id: "relatorios", label: "Relatorios" },
  { id: "config", label: "Config" }
];
const ICONS = { inicio: "⊙", frota: "🚗", clientes: "👤", contratos: "📋", multas: "⚠️", manutencao: "🔧", relatorios: "📊", config: "⚙️" };

function App() {
  const [tab, setTab] = useState("inicio");
  const [veiculos, setVeiculos] = useState([]);
  const [clientes, setClientes] = useState([]);
  const [contratos, setContratos] = useState([]);
  const [multas, setMultas] = useState([]);
  const [manutencoes, setManutencoes] = useState([]);
  const [empresa, setEmpresa] = useState({});
  const [toastState, setToastState] = useState({ msg: "", type: "ok" });
  const mobile = useMobile();

  function toast(msg, type) {
    type = type || "ok";
    setToastState({ msg: msg, type: type });
    setTimeout(() => setToastState({ msg: "", type: "ok" }), 3000);
  }

  useEffect(() => {
    db.get("veiculos").then(d => setVeiculos(d || []));
    db.get("clientes").then(d => setClientes(d || []));
    db.get("contratos").then(d => setContratos(d || []));
    db.get("multas").then(d => setMultas(d || []));
    db.get("manutencao").then(d => setManutencoes(d || []));
    db.get("config", "limit=1").then(d => { if (d && d[0]) setEmpresa(d[0]); });
  }, []);

  const props = { veiculos, setVeiculos, clientes, setClientes, contratos, setContratos, multas, setMultas, manutencoes, setManutencoes, empresa, toast };

  function page() {
    if (tab === "inicio") return <Inicio {...props} />;
    if (tab === "frota") return <Frota {...props} />;
    if (tab === "clientes") return <Clientes {...props} />;
    if (tab === "contratos") return <Contratos {...props} />;
    if (tab === "multas") return <Multas {...props} />;
    if (tab === "manutencao") return <Manutencao {...props} />;
    if (tab === "relatorios") return <Relatorios {...props} />;
    if (tab === "config") return <Config empresa={empresa} setEmpresa={setEmpresa} toast={toast} />;
    return null;
  }

  if (mobile) return (
    <div style={{ background: C.bg, minHeight: "100vh", paddingBottom: 82 }}>
      <div style={{ padding: "16px 16px 0" }}>{page()}</div>
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,255,255,.97)", backdropFilter: "blur(20px)", borderTop: "1px solid " + C.border, display: "flex", zIndex: 100 }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: 1, background: "none", border: "none", padding: "7px 2px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 2 }}>
            <span style={{ fontSize: 18 }}>{ICONS[t.id]}</span>
            <span style={{ fontSize: 8, fontWeight: 600, color: tab === t.id ? C.blue : C.gray }}>{t.label}</span>
          </button>
        ))}
      </nav>
      <Toast msg={toastState.msg} type={toastState.type} />
    </div>
  );

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: C.bg }}>
      <nav style={{ width: 210, background: "#FFF", borderRight: "1px solid " + C.border, padding: "26px 12px", display: "flex", flexDirection: "column", gap: 3, flexShrink: 0, position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: C.blue, marginBottom: 20, paddingLeft: 10 }}>AutoGest Pro</div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? C.blue + "18" : "transparent", color: tab === t.id ? C.blue : "#3C3C43", border: "none", borderRadius: 10, padding: "10px 12px", fontSize: 14, fontWeight: tab === t.id ? 700 : 500, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 16 }}>{ICONS[t.id]}</span>{t.label}
          </button>
        ))}
      </nav>
      <main style={{ flex: 1, padding: "28px 24px", overflowY: "auto", maxWidth: 960, minWidth: 0 }}>{page()}</main>
      <Toast msg={toastState.msg} type={toastState.type} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
