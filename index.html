const HDR = { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": "application/json" };

const db = {
  async get(t, q) {
    try {
      const r = await fetch(SB_URL + "/rest/v1/" + t + "?order=id.desc" + (q ? "&" + q : ""), { headers: HDR });
      return r.ok ? r.json() : [];
    } catch(e) { return []; }
  },
  async post(t, d) {
    const r = await fetch(SB_URL + "/rest/v1/" + t, { method: "POST", headers: Object.assign({}, HDR, { Prefer: "return=representation" }), body: JSON.stringify(d) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Erro"); }
    const j = await r.json(); return Array.isArray(j) ? j[0] : j;
  },
  async patch(t, id, d) {
    const r = await fetch(SB_URL + "/rest/v1/" + t + "?id=eq." + id, { method: "PATCH", headers: Object.assign({}, HDR, { Prefer: "return=representation" }), body: JSON.stringify(d) });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || "Erro"); }
    const j = await r.json(); return Array.isArray(j) ? j[0] : j;
  },
  async del(t, id) { await fetch(SB_URL + "/rest/v1/" + t + "?id=eq." + id, { method: "DELETE", headers: HDR }); },
  async upload(path, file) {
    const r = await fetch(SB_URL + "/storage/v1/object/documentos/" + path, { method: "POST", headers: { apikey: SB_KEY, Authorization: "Bearer " + SB_KEY, "Content-Type": file.type, "x-upsert": "true" }, body: file });
    if (!r.ok) throw new Error("Upload falhou. Verifique o bucket 'documentos' no Supabase Storage.");
    return SB_URL + "/storage/v1/object/public/documentos/" + path;
  }
};

function UploadField({ label, value, onChange, accept, pasta, nome }) {
  const ref = useRef();
  const [uploading, setUploading] = useState(false);
  async function handle(e) {
    const file = e.target.files[0]; if (!file) return;
    setUploading(true);
    try { const ext = file.name.split(".").pop(); const url = await db.upload(pasta + "/" + nome + "_" + Date.now() + "." + ext, file); onChange(url); }
    catch(err) { alert("Erro: " + err.message); }
    setUploading(false);
  }
  return <div>
    <div style={{ fontSize: 13, fontWeight: 600, color: C.sub, marginBottom: 5 }}>{label}</div>
    <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
      {value ? <a href={value} target="_blank" rel="noreferrer" style={{ color: C.blue, fontSize: 13, fontWeight: 600, flex: 1 }}>Ver arquivo</a> : <span style={{ fontSize: 13, color: C.gray, flex: 1 }}>Nenhum arquivo</span>}
      <button type="button" style={Btn(value ? C.orange : C.blue, true)} onClick={() => ref.current.click()} disabled={uploading}>{uploading ? "Enviando..." : value ? "Trocar" : "Enviar"}</button>
      {value && <button type="button" style={Btn(C.red, true)} onClick={() => onChange("")}>✕</button>}
    </div>
    <input ref={ref} type="file" accept={accept || "image/*,.pdf"} onChange={handle} />
  </div>;
}

  if (emp.cnpj) info += "<div>CNPJ: " + emp.cnpj + "</div>";
  if (emp.endereco) info += "<div>" + emp.endereco + "</div>";
  if (emp.cidade || emp.estado) info += "<div>" + [emp.cidade, emp.estado].filter(Boolean).join(" - ") + "</div>";

// ── INICIO ─────────────────────────────────────────────────────────────────
function Inicio({ veiculos, clientes, contratos, multas, manutencoes, despesas, receitas, contas }) {
  const hoje = new Date().toISOString().split("T")[0];
  const mesAtual = new Date().toISOString().slice(0, 7);
  const em7dias = new Date(); em7dias.setDate(em7dias.getDate() + 7); const str7 = em7dias.toISOString().split("T")[0];
  const em30dias = new Date(); em30dias.setDate(em30dias.getDate() + 30); const str30 = em30dias.toISOString().split("T")[0];
  const em3dias = new Date(); em3dias.setDate(em3dias.getDate() + 3); const str3 = em3dias.toISOString().split("T")[0];
  const nomeMes = new Date().toLocaleString("pt-BR", { month: "long", year: "numeric" });

  const disponiveis = veiculos.filter(v => v.status === "disponivel").length;
  const alugados = veiculos.filter(v => v.status === "alugado").length;
  const emManut = veiculos.filter(v => v.status === "manutencao").length;
  const totalFrota = veiculos.length;
  const taxaOcup = totalFrota > 0 ? Math.round((alugados / totalFrota) * 100) : 0;

  const ctsMes = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === mesAtual);
  const recMes = ctsMes.filter(c => c.status_pagamento === "pago").reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  const prevMes = ctsMes.reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  const pendMes = ctsMes.filter(c => c.status_pagamento !== "pago" && c.status_pagamento !== "isento").length;
  const pagosMes = ctsMes.filter(c => c.status_pagamento === "pago").length;

  const receitaContratos = contratos.filter(c => c.status === "concluido").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  const receitaManual = (receitas || []).reduce((s, r) => s + parseFloat(r.valor || 0), 0);
  const totalDesp = despesas.reduce((s, d) => s + parseFloat(d.valor || 0), 0);
  const lucro = receitaContratos + receitaManual - totalDesp;

  const contratosAtrasados = contratos.filter(c => c.status === "ativo" && (c.status_pagamento === "pendente" || !c.status_pagamento) && c.previsao_pagamento && c.previsao_pagamento < hoje);
  const contratosVencendo = contratos.filter(c => c.status === "ativo" && c.data_fim && c.data_fim >= hoje && c.data_fim <= str7);
  const cnhVencida = clientes.filter(c => c.vencimento_cnh && c.vencimento_cnh < hoje);
  const cnhVencendo = clientes.filter(c => c.vencimento_cnh && c.vencimento_cnh >= hoje && c.vencimento_cnh <= str30);
  const multasPend = multas.filter(m => m.status === "pendente");
  const contasVencidas = (contas || []).filter(c => c.status === "pendente" && c.vencimento && c.vencimento < hoje);
  const contasVencendo = (contas || []).filter(c => c.status === "pendente" && c.vencimento && c.vencimento >= hoje && c.vencimento <= str3);
  const manutProlongadas = manutencoes.filter(m => m.status === "em_andamento" && m.data_saida && m.data_saida < hoje);
  const totalAlertas = contratosAtrasados.length + cnhVencida.length + contasVencidas.length + manutProlongadas.length;

  function AlertBox({ cor, icon, titulo, items, sub }) {
    if (!items || items.length === 0) return null;
    return <div style={{ background: cor + "12", border: "1.5px solid " + cor, borderRadius: 14, padding: "12px 16px" }}>
      <div style={{ fontWeight: 700, color: cor, fontSize: 14, marginBottom: items.length > 1 ? 8 : 0 }}>{icon} {titulo}</div>
      {items.map((it, i) => <div key={i} style={{ fontSize: 13, color: "#333", paddingTop: 4, borderTop: i > 0 ? "1px solid " + cor + "30" : "none", marginTop: i > 0 ? 4 : 0 }}>{it}</div>)}
      {sub && <div style={{ fontSize: 12, color: cor, marginTop: 6, fontWeight: 600 }}>{sub}</div>}
    </div>;
  }

  return <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>

    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5 }}>AutoGest Pro</div>
        <div style={{ fontSize: 13, color: C.sub, marginTop: 1, textTransform: "capitalize" }}>{nomeMes}</div>
      </div>
      {totalAlertas > 0 && <div style={{ background: C.red, color: "#fff", borderRadius: 20, padding: "4px 14px", fontSize: 13, fontWeight: 700 }}>⚠️ {totalAlertas}</div>}
    </div>


    {/* Banner principal — 2 colunas: Previsão | Resultado Previsto */}
    <div style={{ background: "#fff", borderRadius: 20, padding: "14px 16px", border: "1px solid " + C.border }}>
      <div style={{ fontSize: 10, fontWeight: 600, color: C.sub, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>{nomeMes}</div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
        <div>
          <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 2 }}>Previsão</div>
          <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5, color: "#1C1C1E" }}>{fmtBRL(prevMes)}</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>faturamento</div>
        </div>
        {(() => {
          var despMesAtual = despesas.filter(d => (d.data||"").slice(0,7) === mesAtual).reduce((s,d)=>s+parseFloat(d.valor||0),0);
          var resultPrev = prevMes - despMesAtual;
          return (
            <div style={{ borderLeft: "1px solid " + C.border, paddingLeft: 12 }}>
              <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 2 }}>Resultado Prev.</div>
              <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5, color: resultPrev >= 0 ? C.green : C.red }}>{fmtBRL(resultPrev)}</div>
              <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>após despesas</div>
            </div>
          );
        })()}
      </div>
      <div style={{ display: "flex", gap: 0, marginTop: 12, paddingTop: 10, borderTop: "1px solid " + C.border }}>
        <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: C.sub, fontWeight: 600 }}>PAGOS</div><div style={{ fontSize: 15, fontWeight: 800, color: C.green }}>{pagosMes}</div></div>
        <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: C.sub, fontWeight: 600 }}>PENDENTES</div><div style={{ fontSize: 15, fontWeight: 800, color: pendMes > 0 ? C.orange : "#1C1C1E" }}>{pendMes}</div></div>
        <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: C.sub, fontWeight: 600 }}>ATRASADOS</div><div style={{ fontSize: 15, fontWeight: 800, color: contratosAtrasados.length > 0 ? C.red : "#1C1C1E" }}>{contratosAtrasados.length}</div></div>
      </div>
    </div>

    {/* Linha 1: A Receber | Recebido */}
    {(() => {
      var aRec = ctsMes.filter(c => c.status_pagamento !== "pago" && c.status_pagamento !== "isento").reduce((s,c)=>s+parseFloat(c.valor_total||0),0);
      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 16px 14px" }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>A Receber</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: aRec > 0 ? C.orange : C.green, marginTop: 4 }}>{fmtBRL(aRec)}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{ctsMes.filter(c => c.status_pagamento !== "pago" && c.status_pagamento !== "isento").length} contrato(s)</div>
          </div>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 16px 14px" }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Recebido</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.green, marginTop: 4 }}>{fmtBRL(recMes)}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{pagosMes} contrato(s)</div>
          </div>
        </div>
      );
    })()}

    {/* Linha 2: Resultado Parcial | Próx. Mês */}
    {(() => {
      var despMesAtual = despesas.filter(d => (d.data||"").slice(0,7) === mesAtual).reduce((s,d)=>s+parseFloat(d.valor||0),0);
      var resultParcial = recMes - despMesAtual;
      var proxMesStr = (() => { var d = new Date(); d.setMonth(d.getMonth()+1); return d.toISOString().slice(0,7); })();
      var proxVal = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === proxMesStr).reduce((s,c)=>s+parseFloat(c.valor_total||0),0);
      var proxQt = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === proxMesStr).length;
      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 16px 14px" }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Resultado Parcial</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: resultParcial >= 0 ? C.green : C.red, marginTop: 4 }}>{fmtBRL(resultParcial)}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>recebido - despesas</div>
          </div>
          <div style={{ background: "#fff", borderRadius: 16, padding: "16px 16px 14px" }}>
            <div style={{ fontSize: 11, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Próx. Mês</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.teal, marginTop: 4 }}>{fmtBRL(proxVal)}</div>
            <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{proxQt} contrato(s)</div>
          </div>
        </div>
      );
    })()}

    {(contratosAtrasados.length > 0 || contratosVencendo.length > 0 || cnhVencida.length > 0 || cnhVencendo.length > 0 || contasVencidas.length > 0 || contasVencendo.length > 0 || manutProlongadas.length > 0) && (
      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.5 }}>Central de Alertas</div>
        <AlertBox cor={C.red} icon="🚨" titulo={"Pagamentos atrasados (" + contratosAtrasados.length + ")"}
          items={contratosAtrasados.map(c => { var cl = clientes.find(x => x.id == c.cliente_id); return "Contrato #" + numCt(c.id) + " · " + (cl && cl.nome || "--") + " · " + fmtDate(c.previsao_pagamento); })}
          sub={"Total: " + fmtBRL(contratosAtrasados.reduce((s,c)=>s+parseFloat(c.valor_total||0),0))} />
        <AlertBox cor={C.orange} icon="⏰" titulo={"Contratos vencendo em 7 dias (" + contratosVencendo.length + ")"}
          items={contratosVencendo.map(c => { var cl = clientes.find(x => x.id == c.cliente_id); return "Contrato #" + numCt(c.id) + " · " + (cl && cl.nome || "--") + " · ate " + fmtDate(c.data_fim); })} />
        <AlertBox cor={C.red} icon="🪪" titulo={"CNH vencida (" + cnhVencida.length + ")"}
          items={cnhVencida.map(c => c.nome + " · " + fmtDate(c.vencimento_cnh))} />
        <AlertBox cor={C.orange} icon="🪪" titulo={"CNH vencendo em 30 dias (" + cnhVencendo.length + ")"}
          items={cnhVencendo.map(c => c.nome + " · " + fmtDate(c.vencimento_cnh))} />
        <AlertBox cor={C.red} icon="💸" titulo={"Contas vencidas (" + contasVencidas.length + ")"}
          items={contasVencidas.map(c => c.descricao + " · " + fmtBRL(c.valor) + " · " + fmtDate(c.vencimento))}
          sub={"Total: " + fmtBRL(contasVencidas.reduce((s,c)=>s+parseFloat(c.valor||0),0))} />
        <AlertBox cor={C.orange} icon="💰" titulo={"Contas vencendo em 3 dias (" + contasVencendo.length + ")"}
          items={contasVencendo.map(c => c.descricao + " · " + fmtBRL(c.valor) + " · " + fmtDate(c.vencimento))} />
        <AlertBox cor={C.purple} icon="🔧" titulo={"Manutencoes com prazo vencido (" + manutProlongadas.length + ")"}
          items={manutProlongadas.map(m => { var ve = veiculos.find(v => v.id == m.veiculo_id); return (ve && ve.placa || "--") + " · " + m.tipo + " · " + fmtDate(m.data_saida); })} />
      </div>
    )}

    <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 12 }}>Mês Vigente — Contratos</div>
      {(() => {
        var ctsMesLista = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === mesAtual);
        if (ctsMesLista.length === 0) return <div style={{ color: C.sub, textAlign: "center", padding: 20, fontSize: 14 }}>Nenhum contrato com pagamento neste mês</div>;
        return ctsMesLista.map((c, i) => {
          var cl = clientes.find(x => x.id == c.cliente_id); var ve = veiculos.find(x => x.id == c.veiculo_id);
          var pago = c.status_pagamento === "pago" || c.status_pagamento === "isento";
          var atrasado = !pago && c.previsao_pagamento && c.previsao_pagamento < hoje;
          var cor = pago ? C.green : atrasado ? C.red : C.orange;
          var label = pago ? "recebido" : atrasado ? "atrasado" : "pendente";
          return <div key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < ctsMesLista.length - 1 ? "1px solid " + C.border : "none" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 14 }}>No {numCt(c.id)}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{cl && cl.nome || "--"} · {ve && ve.placa || "--"}</div>
              <div style={{ fontSize: 12, color: C.sub }}>📆 {fmtDate(c.previsao_pagamento)}{c.forma_pagamento && " · " + c.forma_pagamento}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{fmtBRL(c.valor_total)}</div>
              <span style={Badge(cor)}>{label}</span>
            </div>
          </div>;
        });
      })()}
    </div>
  </div>;
}

// ── FROTA ──────────────────────────────────────────────────────────────────
function Frota({ veiculos, setVeiculos, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(false);
  const SC = { disponivel: C.green, alugado: C.blue, manutencao: C.purple, inativo: C.red };
  const fil = veiculos.filter(v => ((v.placa || "") + " " + (v.modelo || "") + " " + (v.marca || "")).toLowerCase().includes(search.toLowerCase()));
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.placa || !form.modelo) return toast("Placa e Modelo obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("veiculos", edit, form); setVeiculos(p => p.map(v => v.id === edit ? Object.assign({}, v, u) : v)); toast("Atualizado!"); }
      else { const c = await db.post("veiculos", form); setVeiculos(p => [c].concat(p)); toast("Cadastrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) { if (!confirm("Excluir?")) return; await db.del("veiculos", id); setVeiculos(p => p.filter(v => v.id !== id)); toast("Excluido!"); }
  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ fontSize: 24, fontWeight: 800 }}>Frota</div>
      <button style={Btn()} onClick={() => { setForm({ status: "disponivel" }); setEdit(null); setModal(true); }}>+ Veiculo</button>
    </div>
    <input style={FI} placeholder="Buscar placa, modelo..." value={search} onChange={e => setSearch(e.target.value)} />
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(260px,1fr))", gap: 12 }}>
      {fil.map(v => (
        <div key={v.id} style={Object.assign({}, CARD, { display: "flex", flexDirection: "column", gap: 10 })}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div><div style={{ fontWeight: 700, fontSize: 16 }}>{v.marca} {v.modelo}</div><div style={{ fontWeight: 800, fontSize: 20, letterSpacing: 2, color: C.blue }}>{v.placa}</div></div>
            <span style={Badge(SC[v.status] || C.gray)}>{v.status}</span>
          </div>
          <div style={{ fontSize: 12, color: C.sub, display: "flex", gap: 12, flexWrap: "wrap" }}>
            {v.ano && <span>{v.ano}</span>}{v.cor && <span>{v.cor}</span>}{v.km && <span>{Number(v.km).toLocaleString()} km</span>}
          </div>
          <div style={{ fontWeight: 700, color: C.green }}>{fmtBRL(v.valor_diaria)}<span style={{ fontWeight: 400, fontSize: 12, color: C.sub }}>/dia</span></div>
          {v.crv_url && <a href={v.crv_url} target="_blank" rel="noreferrer" style={{ fontSize: 13, color: C.teal, fontWeight: 600 }}>Ver CRV</a>}
          <div style={{ display: "flex", gap: 8 }}>
            <button style={Object.assign({}, Ghost(), { flex: 1 })} onClick={() => { setForm(Object.assign({}, v)); setEdit(v.id); setModal(true); }}>Editar</button>
            <button style={Object.assign({}, Btn(C.red), { flex: 1 })} onClick={() => remove(v.id)}>Excluir</button>
          </div>
        </div>
      ))}
      {fil.length === 0 && <div style={{ color: C.sub, gridColumn: "1/-1", textAlign: "center", padding: 30 }}>Nenhum veiculo</div>}
    </div>
    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Veiculo" : "Novo Veiculo"}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Placa *" flex={1}><input style={FI} value={form.placa || ""} onChange={e => F("placa", e.target.value.toUpperCase())} /></Lbl>
          <Lbl label="Ano" flex={1}><input style={FI} type="number" value={form.ano || ""} onChange={e => F("ano", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Marca" flex={1}><input style={FI} value={form.marca || ""} onChange={e => F("marca", e.target.value)} /></Lbl>
          <Lbl label="Modelo *" flex={1}><input style={FI} value={form.modelo || ""} onChange={e => F("modelo", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Cor" flex={1}><input style={FI} value={form.cor || ""} onChange={e => F("cor", e.target.value)} /></Lbl>
          <Lbl label="KM" flex={1}><input style={FI} type="number" value={form.km || ""} onChange={e => F("km", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Diaria (R$)" flex={1}><input style={FI} type="number" step="0.01" value={form.valor_diaria || ""} onChange={e => F("valor_diaria", e.target.value)} /></Lbl>
          <Lbl label="Status" flex={1}><select style={FI} value={form.status || "disponivel"} onChange={e => F("status", e.target.value)}><option value="disponivel">Disponivel</option><option value="alugado">Alugado</option><option value="manutencao">Manutencao</option><option value="inativo">Inativo</option></select></Lbl>
        </div>
        <Lbl label="Renavam"><input style={FI} value={form.renavam || ""} onChange={e => F("renavam", e.target.value)} /></Lbl>
        <UploadField label="CRV/CRLV" value={form.crv_url || ""} onChange={v => F("crv_url", v)} pasta="crv" nome={form.placa || "veiculo"} />
        <button style={Btn()} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
  </div>;
}

// ── CLIENTES ───────────────────────────────────────────────────────────────
function Clientes({ clientes, setClientes, contratos, toast }) {
  const [modal, setModal] = useState(false);
  const [histModal, setHistModal] = useState(false);
  const [histCliente, setHistCliente] = useState(null);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [search, setSearch] = useState("");
  const [loading, setLoading] = useState(false);
  const hoje = new Date().toISOString().split("T")[0];
  const fil = clientes.filter(c => ((c.nome || "") + " " + (c.cpf || "") + " " + (c.telefone || "")).toLowerCase().includes(search.toLowerCase()));
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.nome) return toast("Nome obrigatorio", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("clientes", edit, form); setClientes(p => p.map(c => c.id === edit ? Object.assign({}, c, u) : c)); toast("Atualizado!"); }
      else { const c = await db.post("clientes", form); setClientes(p => [c].concat(p)); toast("Cadastrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) { if (!confirm("Excluir?")) return; await db.del("clientes", id); setClientes(p => p.filter(c => c.id !== id)); toast("Excluido!"); }
  async function toggleBloquear(c) {
    const novo = !c.bloqueado;
    const motivo = novo ? prompt("Motivo do bloqueio:") : null;
    if (novo && !motivo) return;
    await db.patch("clientes", c.id, { bloqueado: novo, motivo_bloqueio: motivo || null });
    setClientes(p => p.map(x => x.id === c.id ? Object.assign({}, x, { bloqueado: novo, motivo_bloqueio: motivo || null }) : x));
    toast(novo ? "Cliente bloqueado!" : "Cliente desbloqueado!");
  }
  function verHist(c) { setHistCliente(c); setHistModal(true); }
  const histContratos = histCliente ? contratos.filter(c => c.cliente_id == histCliente.id) : [];
  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ fontSize: 24, fontWeight: 800 }}>Clientes</div>
      <button style={Btn()} onClick={() => { setForm({}); setEdit(null); setModal(true); }}>+ Cliente</button>
    </div>
    <input style={FI} placeholder="Buscar nome, CPF/CNPJ..." value={search} onChange={e => setSearch(e.target.value)} />
    <div style={CARD}>
      {fil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhum cliente</div>}
      {fil.map((c, i) => (
        <div key={c.id} style={{ padding: "13px 0", borderBottom: i < fil.length - 1 ? "1px solid " + C.border : "none" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
            <div style={{ fontWeight: 700, fontSize: 15 }}>{c.nome}</div>
            {c.bloqueado && <span style={Badge(C.red)}>Bloqueado</span>}
            {c.vencimento_cnh && c.vencimento_cnh <= hoje && <span style={Badge(C.orange)}>CNH Vencida</span>}
          </div>
          <div style={{ fontSize: 12, color: C.sub }}>CPF/CNPJ: {c.cpf || "--"} · CNH: {c.cnh || "--"} {c.categoria_cnh && "(" + c.categoria_cnh + ")"}</div>
          <div style={{ fontSize: 12, color: C.sub }}>Tel: {c.telefone || "--"}</div>
          {c.bloqueado && c.motivo_bloqueio && <div style={{ fontSize: 12, color: C.red }}>Motivo: {c.motivo_bloqueio}</div>}
          {c.cnh_url && <a href={c.cnh_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>Ver CNH</a>}
          <div style={{ display: "flex", gap: 6, marginTop: 10, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
            <button style={Ghost(C.teal)} onClick={() => verHist(c)}>Historico</button>
            <button style={Ghost()} onClick={() => { setForm(Object.assign({}, c)); setEdit(c.id); setModal(true); }}>Editar</button>
            <button style={Btn(c.bloqueado ? C.green : C.orange, true)} onClick={() => toggleBloquear(c)}>{c.bloqueado ? "Desbloquear" : "Bloquear"}</button>
            <button style={Btn(C.red, true)} onClick={() => remove(c.id)}>✕</button>
          </div>
        </div>
      ))}
    </div>
    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Cliente" : "Novo Cliente"}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Lbl label="Nome *"><input style={FI} value={form.nome || ""} onChange={e => F("nome", e.target.value)} /></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="CPF/CNPJ" flex={1}><input style={FI} value={form.cpf || ""} onChange={e => F("cpf", e.target.value)} /></Lbl>
          <Lbl label="Nascimento" flex={1}><input style={FI} type="date" value={form.nascimento || ""} onChange={e => F("nascimento", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="CNH No" flex={1}><input style={FI} value={form.cnh || ""} onChange={e => F("cnh", e.target.value)} /></Lbl>
          <Lbl label="Categoria" flex={1}><select style={FI} value={form.categoria_cnh || ""} onChange={e => F("categoria_cnh", e.target.value)}><option value="">--</option><option>A</option><option>B</option><option>AB</option><option>C</option><option>D</option><option>E</option></select></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Venc. CNH" flex={1}><input style={FI} type="date" value={form.vencimento_cnh || ""} onChange={e => F("vencimento_cnh", e.target.value)} /></Lbl>
          <Lbl label="Telefone" flex={1}><input style={FI} value={form.telefone || ""} onChange={e => F("telefone", e.target.value)} /></Lbl>
        </div>
        <Lbl label="Email"><input style={FI} type="email" value={form.email || ""} onChange={e => F("email", e.target.value)} /></Lbl>
        <Lbl label="Endereco"><input style={FI} value={form.endereco || ""} onChange={e => F("endereco", e.target.value)} /></Lbl>
        <UploadField label="Foto da CNH" value={form.cnh_url || ""} onChange={v => F("cnh_url", v)} pasta="cnh" nome={form.cpf || "cliente"} />
        <button style={Btn()} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
    <Modal open={histModal} onClose={() => setHistModal(false)} title={"Historico - " + (histCliente && histCliente.nome || "")} wide>
      <div>
        {histContratos.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Nenhum contrato</div>}
        {histContratos.map((c, i) => (
          <div key={c.id} style={{ padding: "10px 0", borderBottom: i < histContratos.length - 1 ? "1px solid " + C.border : "none" }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <div><div style={{ fontWeight: 600 }}>Contrato No {numCt(c.id)}</div><div style={{ fontSize: 12, color: C.sub }}>{fmtDate(c.data_inicio)} a {fmtDate(c.data_fim)}</div></div>
              <div><div style={{ fontWeight: 700, color: C.green }}>{fmtBRL(c.valor_total)}</div><span style={Badge(c.status === "ativo" ? C.blue : c.status === "concluido" ? C.green : C.red)}>{c.status}</span></div>
            </div>
          </div>
        ))}
        <div style={{ marginTop: 12, fontWeight: 700, color: C.blue }}>Total: {fmtBRL(histContratos.reduce((s, c) => s + parseFloat(c.valor_total || 0), 0))}</div>
      </div>
    </Modal>
  </div>;
}

// ── CONTRATOS ──────────────────────────────────────────────────────────────
function Contratos({ contratos, setContratos, veiculos, setVeiculos, clientes, empresa, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("mes_vigente");
  const [dispModal, setDispModal] = useState(false);
  const [dispDe, setDispDe] = useState("");
  const [dispAte, setDispAte] = useState("");
  const [filDe, setFilDe] = useState("");
  const [filAte, setFilAte] = useState("");
  const [filVeiculo, setFilVeiculo] = useState("");
  const [filCliente, setFilCliente] = useState("");
  const [mostrarFiltros, setMostrarFiltros] = useState(false);
  const temFiltro = filDe || filAte || filVeiculo || filCliente;
  function limparFiltros() { setFilDe(""); setFilAte(""); setFilVeiculo(""); setFilCliente(""); }
  const hoje = new Date().toISOString().split("T")[0];
  function getCl(id) { return clientes.find(c => c.id == id); }
  function getVe(id) { return veiculos.find(v => v.id == id); }
  function dias(fm) { if (!fm.data_inicio || !fm.data_fim) return 0; return Math.max(1, Math.ceil((new Date(fm.data_fim) - new Date(fm.data_inicio)) / 86400000)); }
  function calcValor(fm) {
    var v = getVe(fm.veiculo_id); if (!v) return 0;
    var base = dias(fm) * parseFloat(v.valor_diaria || 0);
    var kmExc = 0;
    if (fm.km_franquia && fm.km_final && fm.km_inicial) { var kmRod = fm.km_final - fm.km_inicial; if (kmRod > fm.km_franquia) kmExc = (kmRod - fm.km_franquia) * parseFloat(fm.valor_km_excedente || 0); }
    return (base + kmExc).toFixed(2);
  }
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  function veicsDisponiveis() {
    if (!dispDe || !dispAte) return veiculos;
    return veiculos.filter(v => {
      if (v.status === "manutencao" || v.status === "inativo") return false;
      var conflito = contratos.filter(c => c.status === "ativo" && c.veiculo_id == v.id).some(c => !(c.data_fim < dispDe || c.data_inicio > dispAte));
      return !conflito;
    });
  }
  async function save() {
    if (!form.cliente_id || !form.veiculo_id) return toast("Cliente e Veiculo obrigatorios", "error");
    var cl = getCl(form.cliente_id);
    if (cl && cl.bloqueado) return toast("Cliente bloqueado: " + (cl.motivo_bloqueio || ""), "error");
    if (cl && cl.vencimento_cnh && cl.vencimento_cnh < hoje) { if (!confirm("CNH do cliente VENCIDA em " + cl.vencimento_cnh + ". Continuar mesmo assim?")) return; }
    setLoading(true);
    try {
      const valorFinal = form.valor_total !== undefined && form.valor_total !== "" ? parseFloat(form.valor_total).toFixed(2) : (parseFloat(calcValor(form)) - parseFloat(form.desconto||0) + parseFloat(form.acrescimo||0)).toFixed(2);
      const payload = Object.assign({}, form, { valor_total: valorFinal });
      if (edit) { const u = await db.patch("contratos", edit, payload); setContratos(p => p.map(c => c.id === edit ? Object.assign({}, c, u) : c)); toast("Atualizado!"); }
      else { const c = await db.post("contratos", payload); setContratos(p => [c].concat(p)); await db.patch("veiculos", form.veiculo_id, { status: "alugado" }); setVeiculos(p => p.map(v => v.id == form.veiculo_id ? Object.assign({}, v, { status: "alugado" }) : v)); toast("Contrato No " + numCt(c.id) + " criado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function renovar(ct) {
    if (!confirm("Renovar contrato por mais 30 dias?")) return;
    var dataInicio = ct.data_fim;
    var dataFim = new Date(ct.data_fim);
    dataFim.setDate(dataFim.getDate() + 30);
    var novaFim = dataFim.toISOString().split("T")[0];
    var novaPrevPag = "";
    if (ct.previsao_pagamento) {
      var diaOriginal = parseInt(ct.previsao_pagamento.split("-")[2]);
      var proxMes = new Date(ct.previsao_pagamento);
      proxMes.setMonth(proxMes.getMonth() + 1);
      proxMes.setDate(diaOriginal);
      novaPrevPag = proxMes.toISOString().split("T")[0];
    }
    var payload = {
      cliente_id: ct.cliente_id, veiculo_id: ct.veiculo_id,
      data_inicio: dataInicio, data_fim: novaFim,
      km_inicial: ct.km_final || ct.km_inicial, km_final: null,
      km_franquia: ct.km_franquia, valor_km_excedente: ct.valor_km_excedente,
      valor_total: ct.valor_total, status: "ativo",
      status_pagamento: "pendente",
      forma_pagamento: ct.forma_pagamento,
      previsao_pagamento: novaPrevPag
    };
    try {
      // Conclui o contrato original e marca como pago
      await db.patch("contratos", ct.id, { status: "concluido", status_pagamento: ct.status_pagamento === "pago" ? "pago" : "pago" });
      setContratos(p => p.map(c => c.id === ct.id ? Object.assign({}, c, { status: "concluido" }) : c));
      // Cria o novo contrato (veiculo continua alugado)
      const novo = await db.post("contratos", payload);
      setContratos(p => [novo].concat(p));
      toast("Renovado! Contrato anterior concluido. Novo No " + numCt(novo.id));
    } catch(e) { toast("Erro ao renovar: " + e.message, "error"); }
  }
  async function concluir(ct) {
    if (!confirm("Concluir e liberar veiculo?")) return;
    await db.patch("contratos", ct.id, { status: "concluido" }); await db.patch("veiculos", ct.veiculo_id, { status: "disponivel" });
    setContratos(p => p.map(c => c.id === ct.id ? Object.assign({}, c, { status: "concluido" }) : c)); setVeiculos(p => p.map(v => v.id == ct.veiculo_id ? Object.assign({}, v, { status: "disponivel" }) : v));
    toast("Concluido! Veiculo liberado");
  }
  const SC = { ativo: C.blue, concluido: C.green, cancelado: C.red };
  var veicsDisp = veicsDisponiveis();
  var mesAtual = new Date().toISOString().slice(0, 7);
  var proxMesDate = new Date(); proxMesDate.setMonth(proxMesDate.getMonth() + 1);
  var proxMes = proxMesDate.toISOString().slice(0, 7);

  function filtrarContratos(lista) {
    return lista.filter(c => {
      if (filter === "todos") {}
      else if (filter === "ativo" || filter === "concluido") { if (c.status !== filter) return false; }
      else if (filter === "mes_vigente") { if (!c.previsao_pagamento || c.previsao_pagamento.slice(0,7) !== mesAtual) return false; }
      else if (filter === "proximo_mes") { if (!c.previsao_pagamento || c.previsao_pagamento.slice(0,7) !== proxMes) return false; }
      else if (filter === "a_receber") { if (c.status_pagamento === "pago" || c.status_pagamento === "isento") return false; if (!c.previsao_pagamento || c.previsao_pagamento.slice(0,7) !== mesAtual) return false; }
      else if (filter === "recebidos_mes") { if (c.status_pagamento !== "pago" || !c.previsao_pagamento || c.previsao_pagamento.slice(0,7) !== mesAtual) return false; }
      else if (filter === "mes_anterior") { var maDate = new Date(); maDate.setMonth(maDate.getMonth() - 1); var mesAnt = maDate.toISOString().slice(0,7); if (!c.previsao_pagamento || c.previsao_pagamento.slice(0,7) !== mesAnt) return false; }
      if (filDe && c.data_inicio && c.data_inicio < filDe) return false;
      if (filAte && c.data_fim && c.data_fim > filAte) return false;
      if (filVeiculo && String(c.veiculo_id) !== filVeiculo) return false;
      if (filCliente && String(c.cliente_id) !== filCliente) return false;
      return true;
    });
  }
  var fil2 = filtrarContratos(contratos);
  var totalFil = fil2.reduce((s,c) => s + parseFloat(c.valor_total||0), 0);
  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
      <div style={{ fontSize: 24, fontWeight: 800 }}>Contratos</div>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
        <button style={Ghost(temFiltro ? C.orange : C.teal)} onClick={() => setMostrarFiltros(p => !p)}>{temFiltro ? "🔶" : "🔍"} Filtros{temFiltro ? " ●" : ""}</button>
        <button style={Ghost(C.teal)} onClick={() => setDispModal(true)}>📅 Disponibilidade</button>
        <button style={Btn()} onClick={() => { setForm({ status: "ativo" }); setEdit(null); setModal(true); }}>+ Contrato</button>
      </div>
    </div>
    {mostrarFiltros && <div style={Object.assign({}, CARD, { display: "flex", flexDirection: "column", gap: 10 })}>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.sub }}>Filtrar contratos</div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Lbl label="Data inicio (de)" flex={1}><input style={FI} type="date" value={filDe} onChange={e => setFilDe(e.target.value)} /></Lbl>
        <Lbl label="Data fim (ate)" flex={1}><input style={FI} type="date" value={filAte} onChange={e => setFilAte(e.target.value)} /></Lbl>
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Lbl label="Veiculo" flex={1}><select style={FI} value={filVeiculo} onChange={e => setFilVeiculo(e.target.value)}><option value="">Todos</option>{veiculos.map(v => <option key={v.id} value={v.id}>{v.placa} - {v.marca} {v.modelo}</option>)}</select></Lbl>
        <Lbl label="Cliente" flex={1}><select style={FI} value={filCliente} onChange={e => setFilCliente(e.target.value)}><option value="">Todos</option>{clientes.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}</select></Lbl>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, color: C.sub }}>{fil2.length} contrato(s) encontrado(s)</span>
        {temFiltro && <button style={Ghost(C.red)} onClick={limparFiltros}>Limpar filtros</button>}
      </div>
    </div>}
    <div style={{ display: "flex", gap: 6, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
      {[
        ["mes_vigente", "Mês Vigente", C.teal],
        ["a_receber", "A Receber/Mês", C.orange],
        ["recebidos_mes", "Recebidos/Mês", C.green],
        ["proximo_mes", "Próx. Mês", C.purple],
        ["mes_anterior", "Mês Anterior", C.gray],
        ["ativo", "Todos Ativos", C.blue],
        ["concluido", "Concluidos", C.gray],
        ["todos", "Todos", C.gray],
      ].map(([val, label, cor]) => (
        <button key={val} onClick={() => setFilter(val)} style={Object.assign({}, Ghost(filter === val ? cor : C.gray), { background: filter === val ? cor : "transparent", color: filter === val ? "#fff" : C.gray, fontSize: 12 })}>{label}</button>
      ))}
    </div>
    {fil2.length > 0 && <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "6px 2px" }}>
      <span style={{ fontSize: 13, color: C.sub }}>{fil2.length} contrato(s)</span>
      <span style={{ fontWeight: 800, color: C.green, fontSize: 15 }}>{fmtBRL(totalFil)}</span>
    </div>}
    <div style={CARD}>
      {fil2.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhum contrato</div>}
      {fil2.map((c, i) => {
        var cl = getCl(c.cliente_id); var ve = getVe(c.veiculo_id);
        var pagAtrasado = (c.status_pagamento === "pendente" || !c.status_pagamento) && c.previsao_pagamento && c.previsao_pagamento < hoje;
        var SPG = { pendente: C.orange, pago: C.green, parcial: C.blue, isento: C.gray };
        return <div key={c.id} style={{ padding: "13px 0", borderBottom: i < fil2.length - 1 ? "1px solid " + C.border : "none" }}>
          <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>Contrato No {numCt(c.id)}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{cl && cl.nome || "--"} - {ve && ve.placa || "--"} {ve && ve.modelo || ""}</div>
              <div style={{ fontSize: 12, color: C.sub }}>📅 {fmtDate(c.data_inicio)} ate {fmtDate(c.data_fim)}</div>
              {c.forma_pagamento && <div style={{ fontSize: 12, color: C.teal }}>💳 {c.forma_pagamento}</div>}
              {c.previsao_pagamento && <div style={{ fontSize: 12, color: pagAtrasado ? C.red : C.sub, fontWeight: pagAtrasado ? 700 : 400 }}>
                {pagAtrasado ? "🚨 Pag. ATRASADO desde " : "📆 Pagar ate: "}{fmtDate(c.previsao_pagamento)}
              </div>}
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontWeight: 800, fontSize: 16, color: C.green }}>{fmtBRL(c.valor_total)}</div>
              <div style={{ display: "flex", gap: 4, justifyContent: "flex-end", flexWrap: "wrap", marginTop: 4 }}>
                <span style={Badge(SC[c.status] || C.gray)}>{c.status}</span>
                <span style={Badge(SPG[c.status_pagamento || "pendente"])}>{c.status_pagamento || "pendente"}</span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6, marginTop: 10, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
            {c.status === "ativo" && <button style={Btn(C.green, true)} onClick={() => concluir(c)}>Concluir</button>}
            {c.status === "ativo" && <button style={Btn(C.purple, true)} onClick={() => renovar(c)}>🔄 Renovar</button>}
            {(c.status_pagamento === "pendente" || !c.status_pagamento) && <button style={Btn(C.teal, true)} onClick={async () => { await db.patch("contratos", c.id, { status_pagamento: "pago" }); setContratos(p => p.map(x => x.id === c.id ? Object.assign({}, x, { status_pagamento: "pago" }) : x)); toast("Pagamento registrado!"); }}>💰 Pago</button>}
            <button style={Ghost()} onClick={() => { setForm(Object.assign({}, c)); setEdit(c.id); setModal(true); }}>Editar</button>
            <button style={Btn(C.blue, true)} onClick={() => printContrato(c, cl, ve, empresa)}>Contrato</button>
            <button style={Btn(C.orange, true)} onClick={() => printFatura(c, cl, ve, empresa)}>Fatura</button>
            <button style={Btn(C.green, true)} onClick={() => shareWhatsApp(c, cl, ve, empresa)}>WhatsApp</button>
            <button style={Btn(C.red, true)} onClick={() => remove(c.id)}>✕</button>
          </div>
        </div>;
      })}
    </div>
    <Modal open={dispModal} onClose={() => setDispModal(false)} title="Disponibilidade de Veiculos" wide>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="De" flex={1}><input style={FI} type="date" value={dispDe} onChange={e => setDispDe(e.target.value)} /></Lbl>
          <Lbl label="Ate" flex={1}><input style={FI} type="date" value={dispAte} onChange={e => setDispAte(e.target.value)} /></Lbl>
        </div>
        {dispDe && dispAte && <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: C.sub, marginBottom: 8 }}>{veicsDisp.length} veiculo(s) disponivel(is)</div>
          {veicsDisp.map(v => (
            <div key={v.id} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid " + C.border }}>
              <div><div style={{ fontWeight: 600 }}>{v.placa} - {v.marca} {v.modelo}</div><div style={{ fontSize: 12, color: C.sub }}>{v.cor} {v.ano}</div></div>
              <div style={{ fontWeight: 700, color: C.green }}>{fmtBRL(v.valor_diaria)}/dia</div>
            </div>
          ))}
          {veicsDisp.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Nenhum veiculo disponivel neste periodo</div>}
        </div>}
      </div>
    </Modal>
    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Contrato" : "Novo Contrato"} wide>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Lbl label="Cliente *"><select style={FI} value={form.cliente_id || ""} onChange={e => F("cliente_id", e.target.value)}><option value="">Selecione...</option>{clientes.map(c => <option key={c.id} value={c.id}>{c.nome}{c.bloqueado ? " [BLOQUEADO]" : ""}</option>)}</select></Lbl>
        <Lbl label="Veiculo *"><select style={FI} value={form.veiculo_id || ""} onChange={e => F("veiculo_id", e.target.value)}><option value="">Selecione...</option>{veiculos.filter(v => v.status === "disponivel" || v.id == form.veiculo_id).map(v => <option key={v.id} value={v.id}>{v.placa} - {v.marca} {v.modelo} - {fmtBRL(v.valor_diaria)}/dia</option>)}</select></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Retirada" flex={1}><input style={FI} type="date" value={form.data_inicio || ""} onChange={e => F("data_inicio", e.target.value)} /></Lbl>
          <Lbl label="Devolucao" flex={1}><input style={FI} type="date" value={form.data_fim || ""} onChange={e => F("data_fim", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="KM Saida" flex={1}><input style={FI} type="number" value={form.km_inicial || ""} onChange={e => F("km_inicial", e.target.value)} /></Lbl>
          <Lbl label="KM Retorno" flex={1}><input style={FI} type="number" value={form.km_final || ""} onChange={e => F("km_final", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Franquia KM" flex={1}><input style={FI} type="number" value={form.km_franquia || ""} onChange={e => F("km_franquia", e.target.value)} placeholder="Ex: 300" /></Lbl>
          <Lbl label="R$/KM excedente" flex={1}><input style={FI} type="number" step="0.01" value={form.valor_km_excedente || ""} onChange={e => F("valor_km_excedente", e.target.value)} placeholder="Ex: 1.50" /></Lbl>
        </div>
        <Lbl label="Status"><select style={FI} value={form.status || "ativo"} onChange={e => F("status", e.target.value)}><option value="ativo">Ativo</option><option value="concluido">Concluido</option><option value="cancelado">Cancelado</option></select></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Forma de Pagamento" flex={1}><select style={FI} value={form.forma_pagamento || ""} onChange={e => F("forma_pagamento", e.target.value)}><option value="">Selecione...</option><option>Pix</option><option>Dinheiro</option><option>Cartao Debito</option><option>Cartao Credito</option><option>Transferencia</option><option>Boleto</option><option>A Prazo</option></select></Lbl>
          <Lbl label="Status Pagamento" flex={1}><select style={FI} value={form.status_pagamento || "pendente"} onChange={e => F("status_pagamento", e.target.value)}><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="parcial">Parcial</option><option value="isento">Isento</option></select></Lbl>
        </div>
        <Lbl label="Previsao de Pagamento"><input style={FI} type="date" value={form.previsao_pagamento || ""} onChange={e => F("previsao_pagamento", e.target.value)} /></Lbl>
        <Lbl label="Checklist Vistoria Retirada"><textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 60, fontSize: 13 })} value={form.checklist_retirada || ""} onChange={e => F("checklist_retirada", e.target.value)} placeholder="Ex: Sem arranhoes, tanque cheio, pneus ok..." /></Lbl>
        <Lbl label="Checklist Vistoria Devolucao"><textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 60, fontSize: 13 })} value={form.checklist_devolucao || ""} onChange={e => F("checklist_devolucao", e.target.value)} placeholder="Ex: Arranhao no para-choque traseiro..." /></Lbl>
        <Lbl label="Observacoes"><textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 50 })} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
        {form.veiculo_id && form.data_inicio && form.data_fim && (
          <div style={{ background: C.bg, borderRadius: 12, padding: "12px 16px" }}>
            <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
              <Lbl label="Desconto (R$)" flex={1}><input style={FI} type="number" step="0.01" min="0" value={form.desconto || ""} onChange={e => F("desconto", e.target.value)} placeholder="0,00" /></Lbl>
              <Lbl label="Acrescimo (R$)" flex={1}><input style={FI} type="number" step="0.01" min="0" value={form.acrescimo || ""} onChange={e => F("acrescimo", e.target.value)} placeholder="0,00" /></Lbl>
            </div>
            <div style={{ marginBottom: 10 }}>
              <Lbl label="Valor Total (editavel)">
                <input style={Object.assign({}, FI, { fontWeight: 700, fontSize: 16, color: C.green })} type="number" step="0.01" value={form.valor_total !== undefined && form.valor_total !== "" ? form.valor_total : (parseFloat(calcValor(form)) - parseFloat(form.desconto||0) + parseFloat(form.acrescimo||0)).toFixed(2)} onChange={e => F("valor_total", e.target.value)} />
              </Lbl>
              <div style={{ fontSize: 11, color: C.sub, marginTop: 4 }}>Base calculada: {fmtBRL(calcValor(form))} · {dias(form)} dias{parseFloat(form.desconto||0)>0 ? " · desc. " + fmtBRL(form.desconto) : ""}{parseFloat(form.acrescimo||0)>0 ? " · acresc. " + fmtBRL(form.acrescimo) : ""}</div>
            </div>
          </div>
        )}
        <button style={Btn()} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar Contrato"}</button>
      </div>
    </Modal>
  </div>;
}

// ── MULTAS ─────────────────────────────────────────────────────────────────
function Multas({ multas, setMultas, contratos, clientes, veiculos, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("todos");
  const [filVeiculo, setFilVeiculo] = useState("");
  const [filCliente, setFilCliente] = useState("");
  const [filDe, setFilDe] = useState("");
  const [filAte, setFilAte] = useState("");
  const [mostrarFiltros, setMostrarFiltros] = useState(false);
  function getCt(id) { return contratos.find(c => c.id == id); }
  function getCl(id) { return clientes.find(c => c.id == id); }
  function getVeByContrato(contrato_id) { var ct = getCt(contrato_id); return ct ? veiculos.find(v => v.id == ct.veiculo_id) : null; }
  const fil = multas.filter(m => {
    if (filter !== "todos" && m.status !== filter) return false;
    if (filDe && m.data && m.data < filDe) return false;
    if (filAte && m.data && m.data > filAte) return false;
    if (filCliente) { var ct = getCt(m.contrato_id); if (!ct || String(ct.cliente_id) !== filCliente) return false; }
    if (filVeiculo) { var ct2 = getCt(m.contrato_id); if (!ct2 || String(ct2.veiculo_id) !== filVeiculo) return false; }
    return true;
  });
  const temFiltro = filDe || filAte || filVeiculo || filCliente;
  function limparFiltros() { setFilDe(""); setFilAte(""); setFilVeiculo(""); setFilCliente(""); }
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.contrato_id || !form.tipo || !form.valor) return toast("Campos obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("multas", edit, form); setMultas(p => p.map(m => m.id === edit ? Object.assign({}, m, u) : m)); toast("Atualizado!"); }
      else { const c = await db.post("multas", form); setMultas(p => [c].concat(p)); toast("Registrada!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) { if (!confirm("Excluir?")) return; await db.del("multas", id); setMultas(p => p.filter(m => m.id !== id)); toast("Excluido!"); }
  async function pagar(m) { await db.patch("multas", m.id, { status: "pago" }); setMultas(p => p.map(x => x.id === m.id ? Object.assign({}, x, { status: "pago" }) : x)); toast("Pago!"); }
  const SC = { pendente: C.orange, pago: C.green, contestado: C.red };
  const total = fil.reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ fontSize: 24, fontWeight: 800 }}>Multas</div>
      <div style={{ display: "flex", gap: 8 }}>
        <button style={Ghost(temFiltro ? C.orange : C.teal)} onClick={() => setMostrarFiltros(p => !p)}>{temFiltro ? "🔶" : "🔍"} Filtros{temFiltro ? " ●" : ""}</button>
        <button style={Btn(C.red)} onClick={() => { setForm({ status: "pendente", data: new Date().toISOString().split("T")[0] }); setEdit(null); setModal(true); }}>+ Multa</button>
      </div>
    </div>
    {mostrarFiltros && <div style={Object.assign({}, CARD, { display: "flex", flexDirection: "column", gap: 10 })}>
      <div style={{ fontSize: 13, fontWeight: 700, color: C.sub }}>Filtrar multas — descubra quem estava com o carro</div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Lbl label="Data da multa (de)" flex={1}><input style={FI} type="date" value={filDe} onChange={e => setFilDe(e.target.value)} /></Lbl>
        <Lbl label="Data da multa (ate)" flex={1}><input style={FI} type="date" value={filAte} onChange={e => setFilAte(e.target.value)} /></Lbl>
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Lbl label="Veiculo" flex={1}><select style={FI} value={filVeiculo} onChange={e => setFilVeiculo(e.target.value)}><option value="">Todos</option>{veiculos.map(v => <option key={v.id} value={v.id}>{v.placa} - {v.marca} {v.modelo}</option>)}</select></Lbl>
        <Lbl label="Cliente" flex={1}><select style={FI} value={filCliente} onChange={e => setFilCliente(e.target.value)}><option value="">Todos</option>{clientes.map(c => <option key={c.id} value={c.id}>{c.nome}</option>)}</select></Lbl>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, color: C.sub }}>{fil.length} multa(s) encontrada(s) · {fmtBRL(total)}</span>
        {temFiltro && <button style={Ghost(C.red)} onClick={limparFiltros}>Limpar filtros</button>}
      </div>
    </div>}
    <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", alignItems: "center", paddingBottom: 2 }}>
      {["todos", "pendente", "pago", "contestado"].map(x => <button key={x} onClick={() => setFilter(x)} style={Object.assign({}, Ghost(filter === x ? C.blue : C.gray), { background: filter === x ? C.blue : "transparent", color: filter === x ? "#fff" : C.gray, textTransform: "capitalize" })}>{x}</button>)}
      <span style={{ marginLeft: "auto", fontWeight: 700, color: C.red }}>{fmtBRL(total)}</span>
    </div>
    <div style={CARD}>
      {fil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma multa</div>}
      {fil.map((m, i) => {
        var ct = getCt(m.contrato_id); var cl = ct ? getCl(ct.cliente_id) : null; var ve = getVeByContrato(m.contrato_id);
        return <div key={m.id} style={{ padding: "13px 0", borderBottom: i < fil.length - 1 ? "1px solid " + C.border : "none" }}>
          <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15 }}>{m.tipo}</div>
              <div style={{ fontSize: 13, color: C.sub }}>👤 {cl && cl.nome || "--"}</div>
              <div style={{ fontSize: 13, color: C.sub }}>🚗 {ve && ve.placa || "--"} {ve && ve.modelo || ""}</div>
              <div style={{ fontSize: 12, color: C.sub }}>Contrato #{m.contrato_id} · {fmtDate(m.data)}{m.local && " · " + m.local}</div>
              <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                {m.auto_infracao_url && <a href={m.auto_infracao_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>Auto Infracao</a>}
                {m.cnh_condutor_url && <a href={m.cnh_condutor_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>CNH Condutor</a>}
              </div>
            </div>
            <div style={{ textAlign: "right" }}><div style={{ fontWeight: 800, fontSize: 17, color: C.red }}>{fmtBRL(m.valor)}</div><span style={Badge(SC[m.status] || C.gray)}>{m.status}</span>{m.pontos && <div style={{ fontSize: 11, color: C.sub }}>{m.pontos} pts</div>}</div>
          </div>
          <div style={{ display: "flex", gap: 8, marginTop: 10, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
            {m.status === "pendente" && <button style={Btn(C.green, true)} onClick={() => pagar(m)}>Pago</button>}
            <button style={Ghost()} onClick={() => { setForm(Object.assign({}, m)); setEdit(m.id); setModal(true); }}>Editar</button>
            <button style={Btn(C.red, true)} onClick={() => remove(m.id)}>✕</button>
          </div>
        </div>;
      })}
    </div>
    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Multa" : "Nova Multa"} wide>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Lbl label="Contrato *"><select style={FI} value={form.contrato_id || ""} onChange={e => F("contrato_id", e.target.value)}><option value="">Selecione...</option>{contratos.map(c => { var cl = clientes.find(x => x.id == c.cliente_id); var ve = veiculos.find(x => x.id == c.veiculo_id); return <option key={c.id} value={c.id}>#{numCt(c.id)} - {cl && cl.nome || "?"} · {ve && ve.placa || ""}</option>; })}</select></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Tipo *" flex={1}><select style={FI} value={form.tipo || ""} onChange={e => F("tipo", e.target.value)}><option value="">Selecione...</option><option>Excesso de Velocidade</option><option>Estacionamento Irregular</option><option>Avanco de Sinal</option><option>Uso de Celular</option><option>Faixa de Pedestre</option><option>Documentacao</option><option>Outro</option></select></Lbl>
          <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Data *" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
          <Lbl label="Pontos" flex={1}><input style={FI} type="number" value={form.pontos || ""} onChange={e => F("pontos", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Local" flex={2}><input style={FI} value={form.local || ""} onChange={e => F("local", e.target.value)} /></Lbl>
          <Lbl label="Status" flex={1}><select style={FI} value={form.status || "pendente"} onChange={e => F("status", e.target.value)}><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="contestado">Contestado</option></select></Lbl>
        </div>
        <Lbl label="Descricao"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} /></Lbl>
        <UploadField label="Auto de Infracao" value={form.auto_infracao_url || ""} onChange={v => F("auto_infracao_url", v)} pasta="multas" nome={"auto_" + (form.contrato_id || "0")} />
        <UploadField label="CNH do Condutor" value={form.cnh_condutor_url || ""} onChange={v => F("cnh_condutor_url", v)} pasta="cnh_infratores" nome={"cnh_" + (form.contrato_id || "0")} />
        <button style={Btn(C.red)} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
  </div>;
}

// ── MANUTENCAO ─────────────────────────────────────────────────────────────
function Manutencao({ manutencoes, setManutencoes, veiculos, setVeiculos, toast }) {
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [filter, setFilter] = useState("todos");
  const fil = manutencoes.filter(m => filter === "todos" || m.status === filter);
  function getVe(id) { return veiculos.find(v => v.id == id); }
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }
  async function save() {
    if (!form.veiculo_id || !form.tipo) return toast("Veiculo e Tipo obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("manutencao", edit, form); setManutencoes(p => p.map(m => m.id === edit ? Object.assign({}, m, u) : m)); var ns = form.status === "em_andamento" ? "manutencao" : "disponivel"; await db.patch("veiculos", form.veiculo_id, { status: ns }); setVeiculos(p => p.map(v => v.id == form.veiculo_id ? Object.assign({}, v, { status: ns }) : v)); toast("Atualizado!"); }
      else { const c = await db.post("manutencao", form); setManutencoes(p => [c].concat(p)); await db.patch("veiculos", form.veiculo_id, { status: "manutencao" }); setVeiculos(p => p.map(v => v.id == form.veiculo_id ? Object.assign({}, v, { status: "manutencao" }) : v)); toast("Registrada!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function remove(id) { if (!confirm("Excluir?")) return; await db.del("manutencao", id); setManutencoes(p => p.filter(m => m.id !== id)); toast("Excluido!"); }
  async function concluir(m) {
    if (!confirm("Concluir e liberar veiculo?")) return;
    var hoje = new Date().toISOString().split("T")[0];
    await db.patch("manutencao", m.id, { status: "concluida", data_saida: hoje }); await db.patch("veiculos", m.veiculo_id, { status: "disponivel" });
    setManutencoes(p => p.map(x => x.id === m.id ? Object.assign({}, x, { status: "concluida", data_saida: hoje }) : x)); setVeiculos(p => p.map(v => v.id == m.veiculo_id ? Object.assign({}, v, { status: "disponivel" }) : v));
    toast("Concluida! Veiculo liberado");
  }
  const SC = { em_andamento: C.orange, concluida: C.green, aguardando: C.purple, cancelada: C.red };
  const total = fil.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div style={{ fontSize: 24, fontWeight: 800 }}>Manutencao</div>
      <button style={Btn(C.purple)} onClick={() => { setForm({ status: "em_andamento", data_entrada: new Date().toISOString().split("T")[0] }); setEdit(null); setModal(true); }}>+ Manutencao</button>
    </div>
    <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", alignItems: "center", paddingBottom: 2 }}>
      {["todos", "em_andamento", "aguardando", "concluida", "cancelada"].map(x => <button key={x} onClick={() => setFilter(x)} style={Object.assign({}, Ghost(filter === x ? C.purple : C.gray), { background: filter === x ? C.purple : "transparent", color: filter === x ? "#fff" : C.gray, fontSize: 13 })}>{x.replace("_", " ")}</button>)}
      <span style={{ marginLeft: "auto", fontWeight: 700, color: C.purple }}>{fmtBRL(total)}</span>
    </div>
    <div style={CARD}>
      {fil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma manutencao</div>}
      {fil.map((m, i) => { var ve = getVe(m.veiculo_id); return <div key={m.id} style={{ padding: "13px 0", borderBottom: i < fil.length - 1 ? "1px solid " + C.border : "none" }}>
        <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
          <div><div style={{ fontWeight: 700, fontSize: 15 }}>{m.tipo}</div><div style={{ fontSize: 12, color: C.sub }}>{ve && ve.placa || "--"} {ve && ve.modelo || ""}</div><div style={{ fontSize: 12, color: C.sub }}>Entrada: {fmtDate(m.data_entrada)}{m.data_saida && " - Saida: " + fmtDate(m.data_saida)}</div>{m.oficina && <div style={{ fontSize: 12, color: C.sub }}>{m.oficina}</div>}
          <div style={{ display: "flex", gap: 12, marginTop: 4, flexWrap: "wrap" }}>
            {m.orcamento_url && <a href={m.orcamento_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.teal, fontWeight: 600 }}>📄 Orcamento</a>}
            {m.nota_servico_url && <a href={m.nota_servico_url} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: C.green, fontWeight: 600 }}>🧾 Nota de Servico</a>}
          </div></div>
          <div style={{ textAlign: "right" }}>{parseFloat(m.custo || 0) > 0 && <div style={{ fontWeight: 800, fontSize: 16, color: C.purple }}>{fmtBRL(m.custo)}</div>}<span style={Badge(SC[m.status] || C.gray)}>{(m.status || "").replace("_", " ")}</span></div>
        </div>
        <div style={{ display: "flex", gap: 8, marginTop: 10, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
          {m.status === "em_andamento" && <button style={Btn(C.green, true)} onClick={() => concluir(m)}>Concluir</button>}
          <button style={Ghost(C.purple)} onClick={() => { setForm(Object.assign({}, m)); setEdit(m.id); setModal(true); }}>Editar</button>
          <button style={Btn(C.red, true)} onClick={() => remove(m.id)}>✕</button>
        </div>
      </div>; })}
    </div>
    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar" : "Nova Manutencao"} wide>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <Lbl label="Veiculo *"><select style={FI} value={form.veiculo_id || ""} onChange={e => F("veiculo_id", e.target.value)}><option value="">Selecione...</option>{veiculos.map(v => <option key={v.id} value={v.id}>{v.placa} - {v.marca} {v.modelo}</option>)}</select></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Tipo *" flex={1}><select style={FI} value={form.tipo || ""} onChange={e => F("tipo", e.target.value)}><option value="">Selecione...</option><option>Revisao Geral</option><option>Troca de Oleo</option><option>Freios</option><option>Pneus</option><option>Suspensao</option><option>Eletrica</option><option>Funilaria/Pintura</option><option>Ar Condicionado</option><option>Outro</option></select></Lbl>
          <Lbl label="Status" flex={1}><select style={FI} value={form.status || "em_andamento"} onChange={e => F("status", e.target.value)}><option value="aguardando">Aguardando</option><option value="em_andamento">Em Andamento</option><option value="concluida">Concluida</option><option value="cancelada">Cancelada</option></select></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Entrada" flex={1}><input style={FI} type="date" value={form.data_entrada || ""} onChange={e => F("data_entrada", e.target.value)} /></Lbl>
          <Lbl label="Saida Prevista" flex={1}><input style={FI} type="date" value={form.data_saida || ""} onChange={e => F("data_saida", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Oficina" flex={2}><input style={FI} value={form.oficina || ""} onChange={e => F("oficina", e.target.value)} /></Lbl>
          <Lbl label="Custo (R$)" flex={1}><input style={FI} type="number" step="0.01" value={form.custo || ""} onChange={e => F("custo", e.target.value)} /></Lbl>
        </div>
        <Lbl label="Descricao / Pecas"><textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 80 })} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} /></Lbl>
        <UploadField label="Orcamento (PDF/Foto)" value={form.orcamento_url || ""} onChange={v => F("orcamento_url", v)} pasta="manutencao" nome={"orc_" + (form.veiculo_id || "0") + "_" + Date.now()} />
        <UploadField label="Nota de Servico (PDF/Foto)" value={form.nota_servico_url || ""} onChange={v => F("nota_servico_url", v)} pasta="manutencao" nome={"nota_" + (form.veiculo_id || "0") + "_" + Date.now()} />
        <button style={Btn(C.purple)} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
  </div>;
}

// ── ORCAMENTO PESSOAL ──────────────────────────────────────────────────────
function OrcamentoPessoal({ contratos, despesas, receitas, toast }) {
  const [itens, setItens] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [saving, setSaving] = useState(false);
  const mesAtual = new Date().toISOString().slice(0, 7);
  const nomeMes = new Date().toLocaleString("pt-BR", { month: "long", year: "numeric" });
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }

  useState(() => { db.get("orcamento_pessoal").then(d => { setItens(d || []); setLoading(false); }).catch(() => setLoading(false)); }, []);

  // Lucro previsto da locadora no mês (receita prevista - despesas do mês)
  var recLocMes = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === mesAtual).reduce((s,c)=>s+parseFloat(c.valor_total||0),0);
  var despLocMes = despesas.filter(d => (d.data||"").slice(0,7) === mesAtual).reduce((s,d)=>s+parseFloat(d.valor||0),0);
  var lucroLocadora = Math.max(0, recLocMes - despLocMes);

  var itensMes = itens.filter(it => (it.mes || "") === mesAtual);
  var entradasExtras = itensMes.filter(it => it.tipo === "receita").reduce((s,it)=>s+parseFloat(it.valor||0),0);
  var despPessoais = itensMes.filter(it => it.tipo === "despesa").reduce((s,it)=>s+parseFloat(it.valor||0),0);
  var totalReceita = lucroLocadora + entradasExtras;
  var saldo = totalReceita - despPessoais;
  var percentGasto = totalReceita > 0 ? Math.min(100, Math.round((despPessoais / totalReceita) * 100)) : 0;

  var CATS = ["Moradia", "Alimentacao", "Transporte", "Saude", "Lazer", "Educacao", "Investimento", "Vestuario", "Servicos", "Outros"];

  async function save() {
    if (!form.descricao || !form.valor) return toast("Descricao e valor obrigatorios", "error");
    setSaving(true);
    try {
      var payload = Object.assign({}, form, { mes: mesAtual });
      if (edit) { const u = await db.patch("orcamento_pessoal", edit, payload); setItens(p => p.map(it => it.id === edit ? Object.assign({}, it, u) : it)); toast("Atualizado!"); }
      else { const c = await db.post("orcamento_pessoal", payload); setItens(p => [c].concat(p)); toast("Adicionado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message + " — execute o SQL do Orçamento Pessoal nas configurações", "error"); }
    setSaving(false);
  }
  async function remove(id) { if (!confirm("Excluir?")) return; await db.del("orcamento_pessoal", id); setItens(p => p.filter(it => it.id !== id)); toast("Excluido!"); }

  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div style={{ fontSize: 18, fontWeight: 800 }}>Orçamento Pessoal</div>
        <div style={{ fontSize: 13, color: C.sub, textTransform: "capitalize" }}>{nomeMes}</div>
      </div>
      <button style={Btn(C.purple)} onClick={() => { setForm({ tipo: "despesa", categoria: "Moradia" }); setEdit(null); setModal(true); }}>+ Lançamento</button>
    </div>

    {/* Cartão principal */}
    <div style={{ background: "linear-gradient(135deg, #AF52DE 0%, #7B2FA8 100%)", borderRadius: 20, padding: "20px 20px 16px", color: "#fff" }}>
      <div style={{ fontSize: 11, fontWeight: 600, opacity: 0.75, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Saldo do Mês</div>
      <div style={{ fontSize: 32, fontWeight: 800, letterSpacing: -1, color: saldo >= 0 ? "#fff" : "#FF6B6B" }}>{fmtBRL(saldo)}</div>
      <div style={{ fontSize: 13, opacity: 0.8, marginTop: 4 }}>de {fmtBRL(totalReceita)} disponível</div>
      <div style={{ background: "rgba(255,255,255,0.2)", borderRadius: 6, height: 6, marginTop: 14, overflow: "hidden" }}>
        <div style={{ height: "100%", width: percentGasto + "%", background: percentGasto > 90 ? "#FF6B6B" : percentGasto > 70 ? "#FFD60A" : "#4ADE80", borderRadius: 6 }} />
      </div>
      <div style={{ fontSize: 12, opacity: 0.8, marginTop: 6 }}>{percentGasto}% do orçamento utilizado</div>
    </div>

    {/* KPIs */}
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "14px 12px" }}>
        <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase" }}>Locadora</div>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.blue, marginTop: 4 }}>{fmtBRL(lucroLocadora)}</div>
        <div style={{ fontSize: 11, color: C.sub }}>lucro previsto</div>
      </div>
      <div style={{ background: "#fff", borderRadius: 14, padding: "14px 12px" }}>
        <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase" }}>Extras</div>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.green, marginTop: 4 }}>{fmtBRL(entradasExtras)}</div>
        <div style={{ fontSize: 11, color: C.sub }}>entradas</div>
      </div>
      <div style={{ background: "#fff", borderRadius: 14, padding: "14px 12px" }}>
        <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase" }}>Gastos</div>
        <div style={{ fontSize: 18, fontWeight: 800, color: C.red, marginTop: 4 }}>{fmtBRL(despPessoais)}</div>
        <div style={{ fontSize: 11, color: C.sub }}>despesas</div>
      </div>
    </div>

    {/* Lista */}
    <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Lançamentos do Mês</div>
      {loading && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Carregando...</div>}
      {!loading && itensMes.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Nenhum lançamento neste mês</div>}
      {itensMes.map((it, i) => <div key={it.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < itensMes.length - 1 ? "1px solid " + C.border : "none" }}>
        <div>
          <div style={{ fontWeight: 600, fontSize: 14 }}>{it.descricao}</div>
          <div style={{ fontSize: 12, color: C.sub }}>{it.categoria}</div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ textAlign: "right" }}>
            <div style={{ fontWeight: 700, color: it.tipo === "receita" ? C.green : C.red }}>{it.tipo === "receita" ? "+" : "-"}{fmtBRL(it.valor)}</div>
            <span style={Badge(it.tipo === "receita" ? C.green : C.red)}>{it.tipo}</span>
          </div>
          <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: C.sub, padding: "4px 6px" }} onClick={() => { setForm(Object.assign({}, it)); setEdit(it.id); setModal(true); }}>✏️</button>
          <button style={{ background: "none", border: "none", cursor: "pointer", fontSize: 14, color: C.red, padding: "4px 6px" }} onClick={() => remove(it.id)}>🗑</button>
        </div>
      </div>)}
    </div>

    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Lançamento" : "Novo Lançamento"}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", gap: 10 }}>
          <button style={Object.assign({}, Ghost(form.tipo === "despesa" ? C.red : C.gray), { flex: 1, background: form.tipo === "despesa" ? C.red : "transparent", color: form.tipo === "despesa" ? "#fff" : C.gray })} onClick={() => F("tipo", "despesa")}>Despesa</button>
          <button style={Object.assign({}, Ghost(form.tipo === "receita" ? C.green : C.gray), { flex: 1, background: form.tipo === "receita" ? C.green : "transparent", color: form.tipo === "receita" ? "#fff" : C.gray })} onClick={() => F("tipo", "receita")}>Receita Extra</button>
        </div>
        <Lbl label="Descrição *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} placeholder="Ex: Aluguel, Supermercado..." /></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
          <Lbl label="Categoria" flex={1}><select style={FI} value={form.categoria || "Outros"} onChange={e => F("categoria", e.target.value)}>{CATS.map(c => <option key={c}>{c}</option>)}</select></Lbl>
        </div>
        <Lbl label="Observações"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
        <button style={Btn(form.tipo === "receita" ? C.green : C.purple)} onClick={save} disabled={saving}>{saving ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
  </div>;
}

// ── FINANCEIRO ─────────────────────────────────────────────────────────────
function Financeiro({ despesas, setDespesas, receitas, setReceitas, contas, setContas, contratos, manutencoes, multas, toast }) {
  const [modal, setModal] = useState(false);
