          <Lbl label="Entrada" flex={1}><input style={FI} type="date" value={form.data_entrada || ""} onChange={e => F("data_entrada", e.target.value)} /></Lbl>
          <Lbl label="Saida Prevista" flex={1}><input style={FI} type="date" value={form.data_saida || ""} onChange={e => F("data_saida", e.target.value)} /></Lbl>
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Oficina" flex={2}><input style={FI} value={form.oficina || ""} onChange={e => F("oficina", e.target.value)} /></Lbl>
          <Lbl label="Custo (R$)" flex={1}><input style={FI} type="number" step="0.01" value={form.custo || ""} onChange={e => F("custo", e.target.value)} /></Lbl>
        </div>
        <Lbl label="Previsão de Pagamento"><input style={FI} type="date" value={form.data_previsao_pagamento || ""} onChange={e => F("data_previsao_pagamento", e.target.value)} /></Lbl>
        {/* Recorrente */}
        <div onClick={() => F("recorrente", !form.recorrente)} style={{ display: "flex", alignItems: "center", gap: 10, background: form.recorrente ? C.orange + "15" : C.border + "40", borderRadius: 12, padding: "12px 14px", cursor: "pointer", border: "1.5px solid " + (form.recorrente ? C.orange : C.border) }}>
          <div style={{ width: 22, height: 22, borderRadius: 6, background: form.recorrente ? C.orange : "#fff", border: "2px solid " + (form.recorrente ? C.orange : "#C7C7CC"), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            {form.recorrente && <span style={{ color: "#fff", fontSize: 14, fontWeight: 900 }}>✓</span>}
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: form.recorrente ? C.orange : "#1C1C1E" }}>🔁 Manutenção recorrente</div>
            <div style={{ fontSize: 12, color: C.sub }}>Lançar despesa automaticamente nos próximos meses</div>
          </div>
        </div>
        {form.recorrente && <Lbl label="Prazo da Recorrência (meses)"><input style={FI} type="number" min="1" max="60" value={form.prazo_recorrencia || ""} onChange={e => F("prazo_recorrencia", e.target.value)} placeholder="Ex: 6 = a cada 6 meses" /></Lbl>}
        <Lbl label="Descricao / Pecas"><textarea style={Object.assign({}, FI, { resize: "vertical", minHeight: 80 })} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} /></Lbl>
        <UploadField label="Orcamento (PDF/Foto)" value={form.orcamento_url || ""} onChange={v => F("orcamento_url", v)} pasta="manutencao" nome={"orc_" + (form.veiculo_id || "0") + "_" + Date.now()} />
        <UploadField label="Nota de Servico (PDF/Foto)" value={form.nota_servico_url || ""} onChange={v => F("nota_servico_url", v)} pasta="manutencao" nome={"nota_" + (form.veiculo_id || "0") + "_" + Date.now()} />
        <button style={Btn(C.purple)} onClick={save} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
  </div>;
}

// ── ORCAMENTO PESSOAL ──────────────────────────────────────────────────────
function OrcamentoPessoal({ contratos, despesas, receitas, toast }) {
  const [itens, setItens] = useState([]);
  const [loading, setLoading] = useState(true);
  const [modal, setModal] = useState(false);
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [saving, setSaving] = useState(false);
  const [filtroMes, setFiltroMes] = useState(new Date().toISOString().slice(0, 7));
  const [subTab, setSubTab] = useState("dashboard");
  const mesAtual = new Date().toISOString().slice(0, 7);
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }

  useState(() => { db.get("orcamento_pessoal").then(d => { setItens(d || []); setLoading(false); }).catch(() => setLoading(false)); }, []);

  // Filtra itens visíveis no mês selecionado
  function itemVisivelNoMes(it, mes) {
    if (it.mes === mes) return true; // item do próprio mês
    if (!it.recorrente || !it.mes || it.mes >= mes) return false; // não recorrente ou futuro
    if (!it.prazo_recorrencia) return true; // recorrente sem prazo = infinito
    var inicio = new Date(it.mes + "-01");
    var fim = new Date(mes + "-01");
    var diff = (fim.getFullYear() - inicio.getFullYear()) * 12 + (fim.getMonth() - inicio.getMonth());
    return diff <= parseInt(it.prazo_recorrencia);
  }

  var itensProprios = itens.filter(it => it.mes === filtroMes);
  var itensRecorrentes = itens.filter(it => it.recorrente && it.mes && it.mes < filtroMes && itemVisivelNoMes(it, filtroMes));
  var todosVisiveis = itensProprios.concat(itensRecorrentes);

  // KPIs
  var recLocMes = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === filtroMes).reduce((s,c)=>s+parseFloat(c.valor_total||0),0);
  var despLocMes = despesas.filter(d => (d.data||"").slice(0,7) === filtroMes).reduce((s,d)=>s+parseFloat(d.valor||0),0);
  var lucroLocadora = Math.max(0, recLocMes - despLocMes);
  var entradasExtras = todosVisiveis.filter(it => it.tipo === "receita").reduce((s,it)=>s+parseFloat(it.valor||0),0);
  var despPessoais = todosVisiveis.filter(it => it.tipo === "despesa").reduce((s,it)=>s+parseFloat(it.valor||0),0);
  var despPago = todosVisiveis.filter(it => it.tipo === "despesa" && (it.status === "pago" || it.status === "recebido")).reduce((s,it)=>s+parseFloat(it.valor||0),0);
  var despRecorrente = itensRecorrentes.filter(it => it.tipo === "despesa").reduce((s,it)=>s+parseFloat(it.valor||0),0);
  var totalReceita = lucroLocadora + entradasExtras;
  var saldo = totalReceita - despPessoais;
  var saldoReal = totalReceita - despPago;
  var percentGasto = totalReceita > 0 ? Math.min(100, Math.round((despPessoais / totalReceita) * 100)) : 0;
  var nomeMesFiltro = new Date(filtroMes + "-15").toLocaleString("pt-BR", { month: "long", year: "numeric" });

  var CATS = ["Moradia", "Alimentacao", "Transporte", "Saude", "Lazer", "Educacao", "Investimento", "Vestuario", "Servicos", "Outros"];

  async function save() {
    if (!form.descricao || !form.valor) return toast("Descricao e valor obrigatorios", "error");
    setSaving(true);
    try {
      var payload = Object.assign({}, form, {
        mes: filtroMes,
        recorrente: !!form.recorrente,
        prazo_recorrencia: form.recorrente ? (form.prazo_recorrencia || null) : null
      });
      if (edit) { const u = await db.patch("orcamento_pessoal", edit, payload); setItens(p => p.map(it => it.id === edit ? Object.assign({}, it, u) : it)); toast("Atualizado!"); }
      else { const c = await db.post("orcamento_pessoal", payload); setItens(p => [c].concat(p)); toast("Adicionado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message + " — execute o SQL nas configurações", "error"); }
    setSaving(false);
  }
  async function remove(id) { if (!confirm("Excluir?")) return; await db.del("orcamento_pessoal", id); setItens(p => p.filter(it => it.id !== id)); toast("Excluido!"); }

  function ItemCard({ it, i, total }) {
    var isRecorrente = it.mes !== filtroMes;
    return <div style={{ padding: "12px 0", borderBottom: i < total - 1 ? "1px solid " + C.border : "none" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
        <div>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <div style={{ fontWeight: 600, fontSize: 14 }}>{it.descricao}</div>
            {isRecorrente && <span style={{ fontSize: 10, background: C.purple + "20", color: C.purple, borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>🔁 recorrente{it.prazo_recorrencia ? " · " + it.prazo_recorrencia + "m" : ""}</span>}
            {it.recorrente && !isRecorrente && <span style={{ fontSize: 10, background: C.purple + "20", color: C.purple, borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>🔁{it.prazo_recorrencia ? " " + it.prazo_recorrencia + "m" : ""}</span>}
          </div>
          <div style={{ fontSize: 12, color: C.sub }}>{it.categoria}</div>
          <div style={{ fontSize: 12, color: C.sub }}>
            {it.data && <span>Previsão: {fmtDate(it.data)}</span>}
            {it.data_pagamento && <span style={{ color: it.tipo === "receita" ? C.green : C.red }}> · {it.tipo === "receita" ? "Recebido" : "Pago"}: {fmtDate(it.data_pagamento)}</span>}
          </div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div style={{ fontWeight: 700, color: it.tipo === "receita" ? C.green : C.red }}>{it.tipo === "receita" ? "+" : "-"}{fmtBRL(it.valor)}</div>
          {/* Recorrentes de outros meses sempre aparecem como "previsto" neste mês */}
          <span style={Badge(!isRecorrente && (it.status === "pago" || it.status === "recebido") ? (it.tipo === "receita" ? C.green : C.red) : C.orange)}>
            {!isRecorrente && (it.status === "pago" || it.status === "recebido") ? (it.tipo === "receita" ? "recebido" : "pago") : "previsto"}
          </span>
        </div>
      </div>
      <div style={{ display: "flex", gap: 6, marginTop: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch" }}>
        {!isRecorrente && it.status !== "pago" && it.status !== "recebido" && <button style={Ghost(it.tipo === "receita" ? C.green : C.red)} onClick={async () => {
          var dt = prompt("Data (" + (it.tipo === "receita" ? "recebimento" : "pagamento") + "):", new Date().toISOString().split("T")[0]);
          if (!dt) return;
          var novoStatus = it.tipo === "receita" ? "recebido" : "pago";
          var upd = await db.patch("orcamento_pessoal", it.id, { status: novoStatus, data_pagamento: dt });
          setItens(p => p.map(x => x.id === it.id ? Object.assign({}, x, upd) : x));
          toast("Baixado!");
        }}>{it.tipo === "receita" ? "✅ Receber" : "💸 Baixar"}</button>}
        {!isRecorrente && (it.status === "pago" || it.status === "recebido") && <button style={Ghost(C.sub)} onClick={async () => {
          var upd = await db.patch("orcamento_pessoal", it.id, { status: "previsto", data_pagamento: null });
          setItens(p => p.map(x => x.id === it.id ? Object.assign({}, x, upd) : x));
          toast("Estornado!");
        }}>↩ Estornar</button>}
        {!isRecorrente && <button style={Ghost()} onClick={() => { setForm(Object.assign({}, it)); setEdit(it.id); setModal(true); }}>Editar</button>}
        {!isRecorrente && <button style={Ghost(C.red)} onClick={() => remove(it.id)}>✕</button>}
      </div>
    </div>;
  }

  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
      <div>
        <div style={{ fontSize: 18, fontWeight: 800 }}>Orçamento Pessoal</div>
        <input style={Object.assign({}, FI, { width: 150, marginTop: 4, fontSize: 13 })} type="month" value={filtroMes} onChange={e => setFiltroMes(e.target.value)} />
      </div>
      <button style={Btn(C.purple)} onClick={() => { setForm({ tipo: "despesa", categoria: "Moradia" }); setEdit(null); setModal(true); }}>+ Lançamento</button>
    </div>

    {/* Sub-tabs */}
    <div style={{ display: "flex", gap: 6, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch" }}>
      {[["dashboard","📊 Dashboard"],["despesas","📉 Despesas"],["receitas","💰 Receitas"]].map(([v,l]) =>
        <button key={v} onClick={() => setSubTab(v)} style={{ background: subTab === v ? C.purple : "transparent", color: subTab === v ? "#fff" : C.sub, border: "1.5px solid " + (subTab === v ? C.purple : "#C7C7CC"), borderRadius: 10, padding: "8px 14px", fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>{l}</button>
      )}
    </div>

    {subTab === "dashboard" && <>
      {/* Banner principal */}
      <div style={{ background: "#fff", borderRadius: 20, padding: "14px 16px", border: "1px solid " + C.border }}>
        <div style={{ fontSize: 10, fontWeight: 600, color: C.sub, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10, textTransform: "capitalize" }}>{nomeMesFiltro}</div>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
          <div>
            <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 2 }}>Disponível</div>
            <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5, color: "#1C1C1E" }}>{fmtBRL(totalReceita)}</div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>locadora + extras</div>
          </div>
          <div style={{ borderLeft: "1px solid " + C.border, paddingLeft: 12 }}>
            <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 2 }}>Saldo Previsto</div>
            <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: -0.5, color: saldo >= 0 ? C.green : C.red }}>{fmtBRL(saldo)}</div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>após despesas</div>
          </div>
        </div>
        {/* Barra de progresso */}
        <div style={{ marginTop: 12, paddingTop: 10, borderTop: "1px solid " + C.border }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
            <span style={{ fontSize: 11, color: C.sub, fontWeight: 600 }}>Comprometido</span>
            <span style={{ fontSize: 11, fontWeight: 700, color: percentGasto > 90 ? C.red : percentGasto > 70 ? C.orange : C.green }}>{percentGasto}%</span>
          </div>
          <div style={{ background: C.border, borderRadius: 6, height: 8, overflow: "hidden" }}>
            <div style={{ height: "100%", width: percentGasto + "%", background: percentGasto > 90 ? C.red : percentGasto > 70 ? C.orange : C.green, borderRadius: 6, transition: "width 0.3s" }} />
          </div>
        </div>
        <div style={{ display: "flex", gap: 0, marginTop: 12, paddingTop: 10, borderTop: "1px solid " + C.border }}>
          <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: C.sub, fontWeight: 600 }}>PAGOS</div><div style={{ fontSize: 15, fontWeight: 800, color: C.red }}>{fmtBRL(despPago)}</div></div>
          <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: C.sub, fontWeight: 600 }}>A PAGAR</div><div style={{ fontSize: 15, fontWeight: 800, color: despPessoais - despPago > 0 ? C.orange : "#1C1C1E" }}>{fmtBRL(despPessoais - despPago)}</div></div>
          <div style={{ flex: 1 }}><div style={{ fontSize: 10, color: C.sub, fontWeight: 600 }}>RECORRENTES</div><div style={{ fontSize: 15, fontWeight: 800, color: C.purple }}>{fmtBRL(despRecorrente)}</div></div>
        </div>
      </div>

      {/* KPIs */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
        <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Locadora</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: C.blue, marginTop: 4 }}>{fmtBRL(lucroLocadora)}</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>lucro previsto</div>
        </div>
        <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Extras</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: C.green, marginTop: 4 }}>{fmtBRL(entradasExtras)}</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>entradas adicionais</div>
        </div>
        <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Despesas</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: C.red, marginTop: 4 }}>{fmtBRL(despPessoais)}</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>{todosVisiveis.filter(it=>it.tipo==="despesa").length} lançamento(s)</div>
        </div>
        <div style={{ background: "#fff", borderRadius: 16, padding: "14px 16px" }}>
          <div style={{ fontSize: 10, color: C.sub, fontWeight: 600, textTransform: "uppercase", letterSpacing: 0.5 }}>Saldo Real</div>
          <div style={{ fontSize: 20, fontWeight: 800, color: saldoReal >= 0 ? C.green : C.red, marginTop: 4 }}>{fmtBRL(saldoReal)}</div>
          <div style={{ fontSize: 11, color: C.sub, marginTop: 1 }}>recebido - pago</div>
        </div>
      </div>

      {/* Lista resumida */}
      {todosVisiveis.length > 0 && <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Todos os Lançamentos</div>
        {todosVisiveis.map((it, i) => <ItemCard key={it.id + "-" + filtroMes} it={it} i={i} total={todosVisiveis.length} />)}
      </div>}
      {todosVisiveis.length === 0 && !loading && <div style={CARD}><div style={{ color: C.sub, textAlign: "center", padding: 24 }}>Nenhum lançamento neste mês</div></div>}
    </>}

    {subTab === "despesas" && <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Despesas</div>
      {todosVisiveis.filter(it=>it.tipo==="despesa").length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Nenhuma despesa</div>}
      {todosVisiveis.filter(it=>it.tipo==="despesa").map((it, i, arr) => <ItemCard key={it.id + "-" + filtroMes} it={it} i={i} total={arr.length} />)}
    </div>}

    {subTab === "receitas" && <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>Receitas Extras</div>
      {todosVisiveis.filter(it=>it.tipo==="receita").length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Nenhuma receita extra</div>}
      {todosVisiveis.filter(it=>it.tipo==="receita").map((it, i, arr) => <ItemCard key={it.id + "-" + filtroMes} it={it} i={i} total={arr.length} />)}
    </div>}

    <Modal open={modal} onClose={() => setModal(false)} title={edit ? "Editar Lançamento" : "Novo Lançamento"}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", gap: 10 }}>
          <button style={{ flex: 1, background: form.tipo === "despesa" ? C.sub : "transparent", color: form.tipo === "despesa" ? "#fff" : C.sub, border: "1.5px solid " + C.sub, borderRadius: 10, padding: "10px", fontWeight: 600, cursor: "pointer" }} onClick={() => F("tipo", "despesa")}>Despesa</button>
          <button style={{ flex: 1, background: form.tipo === "receita" ? C.sub : "transparent", color: form.tipo === "receita" ? "#fff" : C.sub, border: "1.5px solid " + C.sub, borderRadius: 10, padding: "10px", fontWeight: 600, cursor: "pointer" }} onClick={() => F("tipo", "receita")}>Receita Extra</button>
        </div>
        <Lbl label="Descrição *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} placeholder="Ex: Aluguel, Supermercado..." /></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
          <Lbl label="Data Prevista" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
        </div>
        <Lbl label="Categoria"><select style={FI} value={form.categoria || "Outros"} onChange={e => F("categoria", e.target.value)}>{CATS.map(c => <option key={c}>{c}</option>)}</select></Lbl>
        {/* Recorrente */}
        <div onClick={() => F("recorrente", !form.recorrente)} style={{ display: "flex", alignItems: "center", gap: 10, background: form.recorrente ? C.purple + "15" : C.border + "40", borderRadius: 12, padding: "12px 14px", cursor: "pointer", border: "1.5px solid " + (form.recorrente ? C.purple : C.border) }}>
          <div style={{ width: 22, height: 22, borderRadius: 6, background: form.recorrente ? C.purple : "#fff", border: "2px solid " + (form.recorrente ? C.purple : "#C7C7CC"), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
            {form.recorrente && <span style={{ color: "#fff", fontSize: 14, fontWeight: 900 }}>✓</span>}
          </div>
          <div>
            <div style={{ fontWeight: 700, fontSize: 14, color: form.recorrente ? C.purple : "#1C1C1E" }}>🔁 Lançamento recorrente</div>
            <div style={{ fontSize: 12, color: C.sub }}>Aparece automaticamente nos próximos meses</div>
          </div>
        </div>
        {form.recorrente && <Lbl label="Prazo da Recorrência (meses)"><input style={FI} type="number" min="1" max="60" value={form.prazo_recorrencia || ""} onChange={e => F("prazo_recorrencia", e.target.value)} placeholder="Vazio = sem prazo (indefinido)" /></Lbl>}
        <Lbl label="Observações"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
        <button style={Btn(C.purple)} onClick={save} disabled={saving}>{saving ? "Salvando..." : "Salvar"}</button>
      </div>
    </Modal>
  </div>;
}

// ── FINANCEIRO ─────────────────────────────────────────────────────────────
function Financeiro({ despesas, setDespesas, receitas, setReceitas, contas, setContas, contratos, manutencoes, multas, toast }) {
  const [modal, setModal] = useState(false);
  const [modalTipo, setModalTipo] = useState("despesa");
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("resumo");
  const [filtroMes, setFiltroMes] = useState(new Date().toISOString().slice(0, 7));
  const [filtroResumoMes, setFiltroResumoMes] = useState(new Date().toISOString().slice(0, 7));
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }

  const hoje = new Date().toISOString().split("T")[0];

  // Filtrar despesas pelo mês selecionado (incluindo recorrentes com prazo válido)
  function despesaVisivelNoMes(d, mes) {
    var dataMes = (d.data || "").slice(0, 7);
    if (dataMes === mes) return true;
    if (d.recorrente && dataMes && dataMes < mes) {
      // Verificar se ainda está dentro do prazo de recorrência
      if (!d.prazo_recorrencia) return true; // sem prazo = infinito
      var inicio = new Date(dataMes + "-01");
      var fim = new Date(mes + "-01");
      var mesesDiff = (fim.getFullYear() - inicio.getFullYear()) * 12 + (fim.getMonth() - inicio.getMonth());
      return mesesDiff <= parseInt(d.prazo_recorrencia);
    }
    return false;
  }

  // Mês financeiro da manutenção: previsão de pgto > data pagamento > data entrada
  function manMesRef(m) {
    return (m.data_previsao_pagamento || m.data_pagamento || m.data_entrada || "").slice(0, 7);
  }

  function receitaVisivelNoMes(r, mes) {
    var dataMes = (r.data || "").slice(0, 7);
    if (dataMes === mes) return true;
    if (r.recorrente && dataMes && dataMes < mes) {
      if (!r.prazo_recorrencia) return true;
      var inicio = new Date(dataMes + "-01");
      var fim = new Date(mes + "-01");
      var mesesDiff = (fim.getFullYear() - inicio.getFullYear()) * 12 + (fim.getMonth() - inicio.getMonth());
      return mesesDiff <= parseInt(r.prazo_recorrencia);
    }
    return false;
  }

  async function saveDespesa() {
    if (!form.descricao || !form.valor || !form.data) return toast("Descricao, valor e data obrigatorios", "error");
    setLoading(true);
    try {
      var payload = Object.assign({}, form, { prazo_recorrencia: form.recorrente ? (form.prazo_recorrencia || null) : null });
      if (edit) { const u = await db.patch("despesas", edit, payload); setDespesas(p => p.map(d => d.id === edit ? Object.assign({}, d, u) : d)); toast("Atualizado!"); }
      else { const c = await db.post("despesas", payload); setDespesas(p => [c].concat(p)); toast("Registrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function saveReceita() {
    if (!form.descricao || !form.valor || !form.data) return toast("Descricao, valor e data obrigatorios", "error");
    setLoading(true);
    try {
      var payload = Object.assign({}, form, { prazo_recorrencia: form.recorrente ? (form.prazo_recorrencia || null) : null });
      if (edit) { const u = await db.patch("receitas", edit, payload); setReceitas(p => p.map(r => r.id === edit ? Object.assign({}, r, u) : r)); toast("Atualizado!"); }
      else { const c = await db.post("receitas", payload); setReceitas(p => [c].concat(p)); toast("Registrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function removeDespesa(id) { if (!confirm("Excluir?")) return; await db.del("despesas", id); setDespesas(p => p.filter(d => d.id !== id)); toast("Excluido!"); }
  async function removeReceita(id) { if (!confirm("Excluir?")) return; await db.del("receitas", id); setReceitas(p => p.filter(r => r.id !== id)); toast("Excluido!"); }

  // Totais gerais acumulados
  var receitaContratos = contratos.filter(c => c.status === "concluido" || c.status_pagamento === "pago").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  var receitaManual = receitas.reduce((s, r) => s + parseFloat(r.valor || 0), 0);
  var totalReceita = receitaContratos + receitaManual;
  var totalDesp = despesas.filter(d => !d.manutencao_id).reduce((s, d) => s + parseFloat(d.valor || 0), 0);
  var totalMan = manutencoes.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  var totalMultas = multas.filter(m => m.status === "pago").reduce((s,m) => s + parseFloat(m.valor||0), 0);
  var lucro = totalReceita - totalDesp - totalMan - totalMultas;

  // Filtros por mês (abas despesas/receitas)
  var despFiltradas = despesas.filter(d => despesaVisivelNoMes(d, filtroMes));
  var recFiltradas = receitas.filter(r => receitaVisivelNoMes(r, filtroMes));

  // Fluxo de caixa por mês
  var desByMes = {}; despesas.filter(d => !d.manutencao_id).forEach(function(d) { var mes = (d.data || "").slice(0, 7); if (mes) { if (!desByMes[mes]) desByMes[mes] = 0; desByMes[mes] += parseFloat(d.valor || 0); } });
  var manByMes = {}; manutencoes.forEach(function(m) { var mes = manMesRef(m); if (mes) { if (!manByMes[mes]) manByMes[mes] = 0; manByMes[mes] += parseFloat(m.custo || 0); } });
  var multaByMes = {}; multas.forEach(function(m) { var mes = (m.data || "").slice(0, 7); if (mes) { if (!multaByMes[mes]) multaByMes[mes] = 0; multaByMes[mes] += parseFloat(m.valor || 0); } });
  var recByMes = {};
  contratos.filter(c => c.status === "concluido" || c.status_pagamento === "pago").forEach(function(c) {
    var mes = (c.previsao_pagamento || c.data_fim || "").slice(0, 7);
    if (mes) { if (!recByMes[mes]) recByMes[mes] = 0; recByMes[mes] += parseFloat(c.valor_total || 0); }
  });
  receitas.forEach(function(r) { var mes = (r.data || "").slice(0, 7); if (mes) { if (!recByMes[mes]) recByMes[mes] = 0; recByMes[mes] += parseFloat(r.valor || 0); } });
  var meses = Array.from(new Set(Object.keys(desByMes).concat(Object.keys(recByMes)).concat(Object.keys(manByMes)).concat(Object.keys(multaByMes)))).filter(Boolean).sort().reverse().slice(0, 12);

  // Receitas do mês selecionado (resumo)
  var recMesContratos = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === filtroResumoMes);
  var recMesPrevista = recMesContratos.reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  var recMesRecebida = recMesContratos.filter(c => c.status_pagamento === "pago").reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  var recMesPendente = recMesContratos.filter(c => c.status_pagamento !== "pago" && c.status_pagamento !== "isento").reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  var recMesManual = receitas.filter(r => (r.data||"").slice(0,7) === filtroResumoMes).reduce((s,r) => s+parseFloat(r.valor||0),0);

  // Despesas do mês — EXCLUI as geradas automaticamente por manutenção (evita dupla contagem)
  var despMes = despesas.filter(d => despesaVisivelNoMes(d, filtroResumoMes) && !d.manutencao_id).reduce((s,d) => s+parseFloat(d.valor||0),0);
  var despMesPago = despesas.filter(d => despesaVisivelNoMes(d, filtroResumoMes) && !d.manutencao_id && d.status === "pago").reduce((s,d) => s+parseFloat(d.valor||0),0);
  var despMesPendente = despesas.filter(d => despesaVisivelNoMes(d, filtroResumoMes) && !d.manutencao_id && d.status !== "pago").reduce((s,d) => s+parseFloat(d.valor||0),0);
  // Manutenções — mês pelo campo de previsão de pagamento (ou data_entrada como fallback)
  var manMesAll = manutencoes.filter(m => manMesRef(m) === filtroResumoMes);
  var manMes = manMesAll.reduce((s,m) => s+parseFloat(m.custo||0),0);
  var manMesPago = manMesAll.filter(m => m.status_financeiro === "pago").reduce((s,m) => s+parseFloat(m.custo||0),0);
  var manMesPendente = manMes - manMesPago;
  // Multas do mês
  var multasMes = multas.filter(m => (m.data||"").slice(0,7) === filtroResumoMes);
  var multasMesPago = multasMes.filter(m => m.status === "pago").reduce((s,m) => s+parseFloat(m.valor||0),0);
  var multasMesPendente = multasMes.filter(m => m.status === "pendente").reduce((s,m) => s+parseFloat(m.valor||0),0);
  var multasMesTotal = multasMes.reduce((s,m) => s+parseFloat(m.valor||0),0);
  var totalDespMes = despMesPago + manMesPago + multasMesPago;

  var saldoMes = (recMesRecebida + recMesManual) - totalDespMes;
  var saldoProjetado = (recMesPrevista + recMesManual) - (despMes + manMes + multasMesTotal);

  var CATS_DESP = ["Combustivel", "Limpeza", "Impostos", "Salarios", "Aluguel", "Manutencao", "Marketing", "Seguros", "Outros"];
  var CATS_REC = ["Locacao", "Servico", "Multa Cobrada", "Deposito", "Outros"];

  function openDesp(d) { setForm(d ? Object.assign({}, d) : { data: new Date().toISOString().split("T")[0], categoria: "Outros", status: "previsto" }); setEdit(d ? d.id : null); setModalTipo("despesa"); setModal(true); }

          { label: "⏳ Manutenções a pagar", val: manMesPendente, color: C.orange },
          { label: "⚠️ Multas do mês", val: multasMesTotal, color: C.sub },
          { label: "✅ Multas pagas", val: multasMesPago, color: C.red },
          { label: "⏳ Multas pendentes", val: multasMesPendente, color: C.orange },

            <span style={{ fontWeight: 800, color: row.color }}>{fmtBRL(row.val)}</span>
          </div>
        ))}
      </div>

        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Consolidação</div>

          var isRec = (d.data||"").slice(0,7) !== filtroMes && d.recorrente;
          return <div key={d.id} style={{ padding: "12px 0", borderBottom: i < despFiltradas.length - 1 ? "1px solid " + C.border : "none" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  <div style={{ fontWeight: 600 }}>{d.descricao}</div>
                  {d.recorrente && <span style={{ fontSize: 10, background: C.orange + "20", color: C.orange, borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>🔁{d.prazo_recorrencia ? " " + d.prazo_recorrencia + "m" : ""}</span>}
                  {isRec && <span style={{ fontSize: 10, background: C.purple + "20", color: C.purple, borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>recorrente</span>}
                  {d.categoria === "Manutencao" && <span style={{ fontSize: 10, background: C.purple + "20", color: C.purple, borderRadius: 6, padding: "2px 6px", fontWeight: 700 }}>🔧</span>}
                </div>
                <div style={{ fontSize: 12, color: C.sub }}>{d.categoria}</div>
                <div style={{ fontSize: 12, color: C.sub }}>Previsão: {fmtDate(d.data)}{d.data_pagamento && <span style={{ color: C.red }}> · Pago: {fmtDate(d.data_pagamento)}</span>}</div>
                {d.observacoes && <div style={{ fontSize: 12, color: C.sub }}>{d.observacoes}</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontWeight: 800, color: d.status === "pago" ? C.red : C.orange }}>{fmtBRL(d.valor)}</div>
                <span style={Badge(d.status === "pago" ? C.red : C.orange)}>{d.status === "pago" ? "pago" : "previsto"}</span>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6, marginTop: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch" }}>
              {d.status !== "pago" && !isRec && <button style={Ghost(C.red)} onClick={async () => {
                var dt = prompt("Data do pagamento (AAAA-MM-DD):", new Date().toISOString().split("T")[0]);
                if (!dt) return;
                var upd = await db.patch("despesas", d.id, { status: "pago", data_pagamento: dt });
                setDespesas(p => p.map(x => x.id === d.id ? Object.assign({}, x, upd) : x));
                toast("Despesa baixada!");
              }}>💸 Baixar</button>}
              {d.status === "pago" && !isRec && <button style={Ghost(C.sub)} onClick={async () => {
                var upd = await db.patch("despesas", d.id, { status: "previsto", data_pagamento: null });
                setDespesas(p => p.map(x => x.id === d.id ? Object.assign({}, x, upd) : x));
                toast("Estornado!");
              }}>↩ Estornar</button>}
              {!isRec && <button style={Ghost()} onClick={() => openDesp(d)}>Editar</button>}
              {!isRec && <button style={Ghost(C.red)} onClick={() => removeDespesa(d.id)}>✕</button>}
            </div>
          </div>;
        })}
      </div>
    </div>}

    {tab === "fluxo" && <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Fluxo de Caixa Mensal</div>
      {meses.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Sem dados</div>}
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr style={{ background: C.bg }}>
            <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: C.sub }}>Mês</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.green }}>Receitas</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.red }}>Despesas</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.purple }}>Manutenção</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.orange }}>Multas</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.blue }}>Saldo</th>
          </tr></thead>
          <tbody>{meses.map(mes => {
            var rec = recByMes[mes] || 0; var desp = desByMes[mes] || 0; var man = manByMes[mes] || 0; var mult = multaByMes[mes] || 0; var saldo = rec - desp - man - mult;
            return <tr key={mes} style={{ borderTop: "1px solid " + C.border }}>
              <td style={{ padding: "8px 12px", fontWeight: 600 }}>{mes}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: C.green, fontWeight: 600 }}>{fmtBRL(rec)}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: C.red, fontWeight: 600 }}>{fmtBRL(desp)}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: C.purple, fontWeight: 600 }}>{fmtBRL(man)}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: C.orange, fontWeight: 600 }}>{fmtBRL(mult)}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: saldo >= 0 ? C.green : C.red, fontWeight: 800 }}>{fmtBRL(saldo)}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    </div>}

    {tab === "pessoal" && <OrcamentoPessoal contratos={contratos} despesas={despesas} receitas={receitas} toast={toast} />}

    <Modal open={modal} onClose={() => setModal(false)} title={modalTipo === "despesa" ? (edit ? "Editar Despesa" : "Nova Despesa") : (edit ? "Editar Receita" : "Nova Receita")}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {modalTipo === "despesa" && <>
          <Lbl label="Descricao *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
            <Lbl label="Data *" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
          </div>
          <Lbl label="Categoria"><select style={FI} value={form.categoria || "Outros"} onChange={e => F("categoria", e.target.value)}>{CATS_DESP.map(c => <option key={c}>{c}</option>)}</select></Lbl>
          <div onClick={() => F("recorrente", !form.recorrente)} style={{ display: "flex", alignItems: "center", gap: 10, background: form.recorrente ? C.orange + "15" : C.border + "40", borderRadius: 12, padding: "12px 14px", cursor: "pointer", border: "1.5px solid " + (form.recorrente ? C.orange : C.border) }}>
            <div style={{ width: 22, height: 22, borderRadius: 6, background: form.recorrente ? C.orange : "#fff", border: "2px solid " + (form.recorrente ? C.orange : "#C7C7CC"), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {form.recorrente && <span style={{ color: "#fff", fontSize: 14, fontWeight: 900 }}>✓</span>}
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 14, color: form.recorrente ? C.orange : "#1C1C1E" }}>🔁 Despesa recorrente</div>
              <div style={{ fontSize: 12, color: C.sub }}>Aparece automaticamente nos próximos meses</div>
            </div>
          </div>
          {form.recorrente && <Lbl label="Prazo da Recorrência (meses)"><input style={FI} type="number" min="1" max="60" value={form.prazo_recorrencia || ""} onChange={e => F("prazo_recorrencia", e.target.value)} placeholder="Vazio = sem prazo (indefinido)" /></Lbl>}
          <Lbl label="Observacoes"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
          <button style={Btn(C.red)} onClick={saveDespesa} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </>}
        {modalTipo === "receita" && <>
          <Lbl label="Descricao *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} placeholder="Ex: Locacao avulsa, Servico de higienizacao..." /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
            <Lbl label="Data *" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Categoria" flex={1}><select style={FI} value={form.categoria || "Locacao"} onChange={e => F("categoria", e.target.value)}>{CATS_REC.map(c => <option key={c}>{c}</option>)}</select></Lbl>
            <Lbl label="Forma de Pagamento" flex={1}><select style={FI} value={form.forma_pagamento || "Pix"} onChange={e => F("forma_pagamento", e.target.value)}><option>Pix</option><option>Dinheiro</option><option>Cartao Debito</option><option>Cartao Credito</option><option>Transferencia</option><option>Boleto</option></select></Lbl>
          </div>
          <div onClick={() => F("recorrente", !form.recorrente)} style={{ display: "flex", alignItems: "center", gap: 10, background: form.recorrente ? C.green + "15" : C.border + "40", borderRadius: 12, padding: "12px 14px", cursor: "pointer", border: "1.5px solid " + (form.recorrente ? C.green : C.border) }}>
            <div style={{ width: 22, height: 22, borderRadius: 6, background: form.recorrente ? C.green : "#fff", border: "2px solid " + (form.recorrente ? C.green : "#C7C7CC"), display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>
              {form.recorrente && <span style={{ color: "#fff", fontSize: 14, fontWeight: 900 }}>✓</span>}
            </div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 14, color: form.recorrente ? C.green : "#1C1C1E" }}>🔁 Receita recorrente</div>
              <div style={{ fontSize: 12, color: C.sub }}>Aparece automaticamente nos próximos meses</div>
            </div>
          </div>
          {form.recorrente && <Lbl label="Prazo da Recorrência (meses)"><input style={FI} type="number" min="1" max="60" value={form.prazo_recorrencia || ""} onChange={e => F("prazo_recorrencia", e.target.value)} placeholder="Vazio = sem prazo (indefinido)" /></Lbl>}
          <Lbl label="Observacoes"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
          <button style={Btn(C.green)} onClick={saveReceita} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </>}
      </div>
    </Modal>
  </div>;
}

// ── RELATORIOS ─────────────────────────────────────────────────────────────
function Relatorios({ contratos, veiculos, clientes, multas, manutencoes, despesas, empresa }) {
  const [tab, setTab] = useState("geral");
  const [de, setDe] = useState("");
  const [ate, setAte] = useState("");

  var receita = contratos.filter(c => c.status === "concluido").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  var recAtiva = contratos.filter(c => c.status === "ativo").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  var mTotal = multas.reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  var mPagas = multas.filter(m => m.status === "pago").reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  var custoMan = manutencoes.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  var totalDesp = despesas.reduce((s, d) => s + parseFloat(d.valor || 0), 0);
  var lucro = receita - totalDesp - custoMan;
  var porStatus = ["disponivel", "alugado", "manutencao", "inativo"].map(st => ({ label: st, count: veiculos.filter(v => v.status === st).length }));

  var faturasFil = contratos.filter(c => {
    if (c.status !== "concluido") return false;
    if (de && c.data_fim && c.data_fim < de) return false;
    if (ate && c.data_fim && c.data_fim > ate) return false;
    return true;
  });
  var totalFaturas = faturasFil.reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);

  function imprimirGeral() {
    var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio Geral</title><style>body{font-family:Arial,sans-serif;max-width:850px;margin:30px auto;font-size:13px}h2{border-bottom:1px solid #ddd;padding-bottom:6px;margin:20px 0 10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #ddd}th{background:#f5f5f7}.g{color:#34C759;font-weight:800}.r{color:#FF3B30}@media print{body{margin:0}}</style></head><body>';
    h += buildHeader(empresa);
    h += '<h2>Resumo Financeiro</h2><table><tr><th>Indicador</th><th>Valor</th></tr>';
    h += '<tr><td>Receita Total</td><td class="g">' + fmtBRL(receita) + '</td></tr>';
    h += '<tr><td>Em Aberto</td><td>' + fmtBRL(recAtiva) + '</td></tr>';
    h += '<tr><td>Despesas Operacionais</td><td class="r">' + fmtBRL(totalDesp) + '</td></tr>';
    h += '<tr><td>Custo Manutencao</td><td class="r">' + fmtBRL(custoMan) + '</td></tr>';
    h += '<tr><td>Multas Emitidas</td><td>' + fmtBRL(mTotal) + '</td></tr>';
    h += '<tr><td>Multas Pagas</td><td>' + fmtBRL(mPagas) + '</td></tr>';
    h += '<tr><td><b>Lucro Liquido</b></td><td class="' + (lucro >= 0 ? "g" : "r") + '"><b>' + fmtBRL(lucro) + '</b></td></tr></table>';
    h += '<h2>Contratos (' + contratos.length + ')</h2><table><tr><th>No</th><th>Cliente</th><th>Veiculo</th><th>Inicio</th><th>Fim</th><th>Valor</th><th>Status</th></tr>';
    contratos.forEach(function(c) { var cl = clientes.find(function(x) { return x.id == c.cliente_id; }); var ve = veiculos.find(function(x) { return x.id == c.veiculo_id; }); h += '<tr><td>' + numCt(c.id) + '</td><td>' + (cl && cl.nome || "--") + '</td><td>' + (ve && ve.placa || "--") + '</td><td>' + (c.data_inicio || "--") + '</td><td>' + (c.data_fim || "--") + '</td><td>' + fmtBRL(c.valor_total) + '</td><td>' + c.status + '</td></tr>'; });
    h += '</table><scr' + 'ipt>window.print();</scr' + 'ipt></body></html>';
    var w = window.open("", "_blank"); w.document.write(h); w.document.close();
  }

  function imprimirFaturas() {
    var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio de Faturas</title><style>body{font-family:Arial,sans-serif;max-width:850px;margin:30px auto;font-size:13px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #ddd}th{background:#f5f5f7}.tot{font-weight:800;font-size:15px;color:#34C759}@media print{body{margin:0}}</style></head><body>';
    h += buildHeader(empresa);
    h += '<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:800">RELATORIO DE FATURAS</div>';
    if (de || ate) h += '<div style="font-size:13px;color:#666">Periodo: ' + (de || "--") + ' a ' + (ate || "--") + '</div>';
    h += '</div>';
    h += '<table><tr><th>No</th><th>Cliente</th><th>Veiculo</th><th>Retirada</th><th>Devolucao</th><th>Valor</th></tr>';
    faturasFil.forEach(function(c) { var cl = clientes.find(function(x) { return x.id == c.cliente_id; }); var ve = veiculos.find(function(x) { return x.id == c.veiculo_id; }); h += '<tr><td>' + numCt(c.id) + '</td><td>' + (cl && cl.nome || "--") + '</td><td>' + (ve && ve.placa || "--") + ' ' + (ve && ve.modelo || "") + '</td><td>' + (c.data_inicio || "--") + '</td><td>' + (c.data_fim || "--") + '</td><td>' + fmtBRL(c.valor_total) + '</td></tr>'; });
    h += '<tr><td colspan="5" class="tot">TOTAL</td><td class="tot">' + fmtBRL(totalFaturas) + '</td></tr></table>';
    h += '<p style="text-align:center;font-size:10px;color:#aaa;margin-top:20px">AutoGest Pro - ' + new Date().toLocaleString("pt-BR") + '</p>';
    h += '<scr' + 'ipt>window.print();</scr' + 'ipt></body></html>';
    var w = window.open("", "_blank"); w.document.write(h); w.document.close();
  }

  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ fontSize: 24, fontWeight: 800 }}>Relatórios</div>
    <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
      {[["geral","Geral"],["faturas","Faturas"],["veiculos","Por Veículo"]].map(([x,l]) => <button key={x} onClick={() => setTab(x)} style={Object.assign({}, Ghost(tab === x ? C.blue : C.gray), { background: tab === x ? C.blue : "transparent", color: tab === x ? "#fff" : C.gray })}>{l}</button>)}
    </div>

    {tab === "geral" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="💰" label="Receita" val={fmtBRL(receita)} color={C.green} />
        <Stat icon="📋" label="Em aberto" val={fmtBRL(recAtiva)} color={C.blue} />
        <Stat icon="📈" label="Lucro" val={fmtBRL(lucro)} color={lucro >= 0 ? C.green : C.red} />
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="📉" label="Despesas" val={fmtBRL(totalDesp)} color={C.red} />
        <Stat icon="🔧" label="Manutencao" val={fmtBRL(custoMan)} color={C.purple} />
        <Stat icon="⚠️" label="Multas" val={fmtBRL(mTotal)} color={C.orange} />
      </div>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Frota por Status</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
          {porStatus.map(p => <div key={p.label} style={{ textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 6px" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.blue }}>{p.count}</div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 3, textTransform: "capitalize" }}>{p.label}</div>
          </div>)}
        </div>
      </div>
      <button style={Btn(C.orange)} onClick={imprimirGeral}>Imprimir Relatorio Geral</button>
    </div>}

    {tab === "faturas" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={CARD}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.sub, marginBottom: 12 }}>Filtrar por período</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Lbl label="De" flex={1}><input style={FI} type="date" value={de} onChange={e => setDe(e.target.value)} /></Lbl>
          <Lbl label="Até" flex={1}><input style={FI} type="date" value={ate} onChange={e => setAte(e.target.value)} /></Lbl>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><span style={{ fontWeight: 700 }}>{faturasFil.length} fatura(s) </span><span style={{ fontWeight: 800, color: C.green }}>{fmtBRL(totalFaturas)}</span></div>
        <div style={{ display: "flex", gap: 8 }}>
          <button style={Ghost(C.sub)} onClick={() => {
            var rows = [["No","Cliente","Veiculo","Inicio","Fim","Valor","Status","Pagamento"]].concat(faturasFil.map(c => { var cl = clientes.find(x => x.id == c.cliente_id); var ve = veiculos.find(x => x.id == c.veiculo_id); return [numCt(c.id),cl&&cl.nome||"",ve&&ve.placa||"",c.data_inicio||"",c.data_fim||"",c.valor_total||"",c.status||"",c.status_pagamento||""]; }));
            var csv = rows.map(r => r.map(x => '"' + String(x).replace(/"/g,'""') + '"').join(",")).join("\n");
            var a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8,\uFEFF" + encodeURIComponent(csv); a.download = "faturas.csv"; a.click();
          }}>↓ CSV</button>
          <button style={Btn(C.orange)} onClick={imprimirFaturas}>Imprimir</button>
        </div>
      </div>
      <div style={CARD}>
        {faturasFil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma fatura no período</div>}
        {faturasFil.map((c, i) => {
          var cl = clientes.find(x => x.id == c.cliente_id); var ve = veiculos.find(x => x.id == c.veiculo_id);
          return <div key={c.id} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: i < faturasFil.length - 1 ? "1px solid " + C.border : "none", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontWeight: 600 }}>#{numCt(c.id)} — {cl && cl.nome || "--"}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{ve && ve.placa || "--"} {ve && ve.modelo || ""}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{c.data_inicio} → {c.data_fim}</div>
            </div>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontWeight: 700, color: C.green }}>{fmtBRL(c.valor_total)}</div>
              <span style={Badge(c.status_pagamento === "pago" ? C.green : C.orange)}>{c.status_pagamento || "pendente"}</span>
            </div>
          </div>;
        })}
      </div>
    </div>}

    {tab === "veiculos" && (() => {
      var porVeiculo = veiculos.map(v => {
        var cts = contratos.filter(c => c.veiculo_id == v.id);
        var receita = cts.filter(c => c.status === "concluido").reduce((s,c) => s + parseFloat(c.valor_total||0), 0);
        var receitaAtiva = cts.filter(c => c.status === "ativo").reduce((s,c) => s + parseFloat(c.valor_total||0), 0);
        var custo = manutencoes.filter(m => m.veiculo_id == v.id).reduce((s,m) => s + parseFloat(m.custo||0), 0);
        var nMultas = multas.filter(m => { var ct = contratos.find(c => c.id == m.contrato_id); return ct && ct.veiculo_id == v.id; }).length;
        var totalContratos = cts.length;
        var lucro = receita - custo;
        return { v, receita, receitaAtiva, custo, lucro, totalContratos, nMultas };
      }).sort((a,b) => b.receita - a.receita);
      var maxReceita = Math.max(...porVeiculo.map(x => x.receita), 1);
      return <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={{ display: "flex", justifyContent: "flex-end" }}>
          <button style={Ghost(C.sub)} onClick={() => {
            var rows = [["Placa","Modelo","Receita","Em aberto","Custo Manutenção","Lucro","Contratos","Multas"]].concat(porVeiculo.map(x => [x.v.placa,x.v.modelo,x.receita,x.receitaAtiva,x.custo,x.lucro,x.totalContratos,x.nMultas]));
            var csv = rows.map(r => r.map(x => '"' + String(x).replace(/"/g,'""') + '"').join(",")).join("\n");
            var a = document.createElement("a"); a.href = "data:text/csv;charset=utf-8,\uFEFF" + encodeURIComponent(csv); a.download = "centro-custo-veiculos.csv"; a.click();
          }}>↓ CSV</button>
        </div>
        <div style={CARD}>
          {porVeiculo.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhum veículo</div>}
          {porVeiculo.map((x, i) => (
            <div key={x.v.id} style={{ padding: "14px 0", borderBottom: i < porVeiculo.length - 1 ? "1px solid " + C.border : "none" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 8 }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 14 }}>{x.v.placa} <span style={{ fontWeight: 400, color: C.sub }}>— {x.v.marca} {x.v.modelo}</span></div>
                  <div style={{ fontSize: 12, color: C.sub, marginTop: 2 }}>{x.totalContratos} contrato(s) · {x.nMultas} multa(s)</div>
                </div>
                <span style={Badge(x.lucro >= 0 ? C.green : C.red)}>{x.lucro >= 0 ? "+" : ""}{fmtBRL(x.lucro)}</span>
              </div>
              {/* Barra de receita */}
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <div style={{ fontSize: 10, color: C.sub, width: 70, flexShrink: 0 }}>Receita</div>
                <div style={{ flex: 1, background: C.bg, borderRadius: 4, height: 8, overflow: "hidden" }}>
                  <div style={{ height: 8, borderRadius: 4, background: C.green, width: (x.receita / maxReceita * 100) + "%" }} />
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.green, width: 80, textAlign: "right", flexShrink: 0 }}>{fmtBRL(x.receita)}</div>
              </div>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <div style={{ fontSize: 10, color: C.sub, width: 70, flexShrink: 0 }}>Manutenção</div>
                <div style={{ flex: 1, background: C.bg, borderRadius: 4, height: 8, overflow: "hidden" }}>
                  <div style={{ height: 8, borderRadius: 4, background: C.purple, width: (x.custo / maxReceita * 100) + "%" }} />
                </div>
                <div style={{ fontSize: 12, fontWeight: 600, color: C.purple, width: 80, textAlign: "right", flexShrink: 0 }}>{fmtBRL(x.custo)}</div>
              </div>
              {x.receitaAtiva > 0 && <div style={{ fontSize: 11, color: C.orange }}>+ {fmtBRL(x.receitaAtiva)} em aberto</div>}
            </div>
          ))}
        </div>
      </div>;
    })()}
  </div>;
}

const TABS = [
  { id: "inicio", label: "Inicio" }, { id: "frota", label: "Frota" }, { id: "clientes", label: "Clientes" },
  { id: "contratos", label: "Contratos" }, { id: "multas", label: "Multas" }, { id: "manutencao", label: "Manutencao" },
  { id: "financeiro", label: "Financeiro" }, { id: "relatorios", label: "Relatorios" }, { id: "config", label: "Config" }
];
const ICONS = { inicio: "◉", frota: "◻", clientes: "○", contratos: "▤", multas: "△", manutencao: "◈", financeiro: "◇", relatorios: "▦", config: "◎" };

function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [erro, setErro] = useState("");
  const [usarPin, setUsarPin] = useState(false);
  const [carregando, setCarregando] = useState(false);
  const PIN_CORRETO = "1234";
  const RP_ID = location.hostname; // capimglau.github.io

  async function tentarBiometrico() {
    setErro(""); setCarregando(true);
    try {
      if (!window.PublicKeyCredential) { setUsarPin(true); setCarregando(false); return; }
      const credId = localStorage.getItem("autogest_cred_id");
      if (!credId) {
        // Primeira vez: registra
        const cred = await navigator.credentials.create({
          publicKey: {
            challenge: crypto.getRandomValues(new Uint8Array(32)),
            rp: { id: RP_ID, name: "AutoGest Pro" },
            user: { id: new Uint8Array(16), name: "usuario", displayName: "Usuário" },
            pubKeyCredParams: [{ type: "public-key", alg: -7 }, { type: "public-key", alg: -257 }],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required", residentKey: "preferred" },
            timeout: 60000
          }
        });
        localStorage.setItem("autogest_cred_id", btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
        onLogin();
      } else {
        // Já registrado: autentica
        try {
          const rawId = Uint8Array.from(atob(credId), c => c.charCodeAt(0));
          await navigator.credentials.get({
            publicKey: {
              challenge: crypto.getRandomValues(new Uint8Array(32)),
              rpId: RP_ID,
              allowCredentials: [{ type: "public-key", id: rawId }],
              userVerification: "required",
              timeout: 60000
            }
          });
          onLogin();
        } catch(e2) {
          // Credencial inválida/expirada — apaga e tenta registrar de novo
          localStorage.removeItem("autogest_cred_id");
          setErro("Face ID expirou. Toque novamente para registrar.");
        }
      }
    } catch(e) {
      if (e.name === "NotAllowedError") setErro("Cancelado. Tente novamente ou use o PIN.");
      else if (e.name === "NotSupportedError") { setUsarPin(true); }
      else { setErro("Face ID indisponível. Use o PIN."); setUsarPin(true); }
    }
    setCarregando(false);
  }

  function tentarPin() {
    if (pin === PIN_CORRETO) { onLogin(); }
    else { setErro("PIN incorreto."); setPin(""); }
  }

  function resetFaceId() {
    localStorage.removeItem("autogest_cred_id");
    setErro("Face ID redefinido. Toque para registrar novamente.");
  }

  return <div style={{ minHeight: "100vh", background: "#F2F2F7", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
    <div style={{ fontSize: 48, marginBottom: 16 }}>🚗</div>
    <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5, marginBottom: 4 }}>AutoGest Pro</div>
    <div style={{ fontSize: 14, color: "#8E8E93", marginBottom: 40 }}>Estilo Rent a Car</div>

    {!usarPin ? (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, width: "100%", maxWidth: 280 }}>
        <button onClick={tentarBiometrico} disabled={carregando} style={{ width: "100%", background: carregando ? "#C7C7CC" : "#007AFF", color: "#fff", border: "none", borderRadius: 14, padding: "16px 20px", fontSize: 17, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
          {carregando ? "Aguardando..." : "🔐 Entrar com Face ID"}
        </button>
        <button onClick={() => setUsarPin(true)} style={{ background: "none", border: "none", color: "#007AFF", fontSize: 15, cursor: "pointer", fontWeight: 500 }}>Usar PIN</button>
        <button onClick={resetFaceId} style={{ background: "none", border: "none", color: "#8E8E93", fontSize: 12, cursor: "pointer" }}>Redefinir Face ID</button>
        {erro && <div style={{ color: "#FF3B30", fontSize: 13, textAlign: "center" }}>{erro}</div>}
      </div>
    ) : (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14, width: "100%", maxWidth: 280 }}>
        <div style={{ fontSize: 15, color: "#3C3C43", fontWeight: 600 }}>Digite o PIN</div>
        <input
          type="password" inputMode="numeric" maxLength={4}
          value={pin} onChange={e => setPin(e.target.value.replace(/\D/g,""))}
          onKeyDown={e => e.key === "Enter" && tentarPin()}
          placeholder="••••"
          style={{ width: "100%", textAlign: "center", fontSize: 28, letterSpacing: 12, padding: "14px 16px", borderRadius: 14, border: "1.5px solid #E5E5EA", outline: "none", background: "#fff", boxSizing: "border-box" }}
          autoFocus
        />
        <button onClick={tentarPin} style={{ width: "100%", background: "#007AFF", color: "#fff", border: "none", borderRadius: 14, padding: "14px", fontSize: 16, fontWeight: 600, cursor: "pointer" }}>Entrar</button>
        <button onClick={() => { setUsarPin(false); setErro(""); setPin(""); }} style={{ background: "none", border: "none", color: "#007AFF", fontSize: 14, cursor: "pointer" }}>Usar Face ID</button>
        {erro && <div style={{ color: "#FF3B30", fontSize: 13 }}>{erro}</div>}
        <div style={{ fontSize: 12, color: "#8E8E93", textAlign: "center", marginTop: 4 }}>PIN padrão: 1234</div>
      </div>
    )}
  </div>;
}

function App() {
  const [logado, setLogado] = useState(false);
  const [tab, setTab] = useState("inicio");
  const [veiculos, setVeiculos] = useState([]);
  const [clientes, setClientes] = useState([]);
  const [contratos, setContratos] = useState([]);
  const [multas, setMultas] = useState([]);
  const [manutencoes, setManutencoes] = useState([]);
  const [despesas, setDespesas] = useState([]);
  const [receitas, setReceitas] = useState([]);
  const [contas, setContas] = useState([]);
  const [empresa, setEmpresa] = useState({});
  const [toastState, setToastState] = useState({ msg: "", type: "ok" });
  const mobile = useMobile();

  function toast(msg, type) { setToastState({ msg: msg, type: type || "ok" }); setTimeout(() => setToastState({ msg: "", type: "ok" }), 3000); }

  useEffect(() => {
    db.get("veiculos").then(d => setVeiculos(d || []));
    db.get("clientes").then(d => setClientes(d || []));
    db.get("contratos").then(d => setContratos(d || []));
    db.get("multas").then(d => setMultas(d || []));
    db.get("manutencao").then(d => setManutencoes(d || []));
    db.get("despesas").then(d => setDespesas(d || []));
    db.get("receitas").then(d => setReceitas(d || []));
    db.get("contas").then(d => setContas(d || []));
    db.get("config", "limit=1").then(d => { if (d && d[0]) setEmpresa(d[0]); });
  }, []);

  var props = { veiculos, setVeiculos, clientes, setClientes, contratos, setContratos, multas, setMultas, manutencoes, setManutencoes, despesas, setDespesas, receitas, setReceitas, contas, setContas, empresa, toast, setTab };

  function page() {
    if (tab === "inicio") return <Inicio {...props} />;
    if (tab === "frota") return <Frota {...props} />;
    if (tab === "clientes") return <Clientes {...props} />;
    if (tab === "contratos") return <Contratos {...props} />;
    if (tab === "multas") return <Multas {...props} veiculos={veiculos} />;
    if (tab === "manutencao") return <Manutencao {...props} />;
    if (tab === "financeiro") return <Financeiro {...props} />;
    if (tab === "relatorios") return <Relatorios {...props} />;
    if (tab === "config") return <Config empresa={empresa} setEmpresa={setEmpresa} toast={toast} />;
    return null;
  }

  if (!logado) return <LoginScreen onLogin={() => setLogado(true)} />;

  if (mobile) return (
    <div style={{ background: C.bg, minHeight: "100vh", paddingBottom: 82 }}>
      <div style={{ padding: "16px 16px 0" }}>{page()}</div>
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,255,255,.95)", backdropFilter: "blur(20px)", borderTop: "1px solid " + C.border, display: "flex", zIndex: 100, overflowX: "auto" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: "0 0 auto", background: "none", border: "none", padding: "8px 12px 10px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 60 }}>
            <span style={{ fontSize: 16, color: tab === t.id ? C.blue : C.sub, lineHeight: 1 }}>{ICONS[t.id]}</span>
            <span style={{ fontSize: 9, fontWeight: tab === t.id ? 700 : 400, color: tab === t.id ? C.blue : C.sub, whiteSpace: "nowrap" }}>{t.label}</span>
          </button>
        ))}
      </nav>
      <Toast msg={toastState.msg} type={toastState.type} />
    </div>
  );

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: C.bg }}>
      <nav style={{ width: 210, background: "#FFF", borderRight: "1px solid " + C.border, padding: "26px 12px", display: "flex", flexDirection: "column", gap: 3, flexShrink: 0, position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: C.blue, marginBottom: 20, paddingLeft: 10 }}>AutoGest Pro</div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? C.blue + "12" : "transparent", color: tab === t.id ? C.blue : "#3C3C43", border: "none", borderRadius: 8, padding: "9px 12px", fontSize: 13, fontWeight: tab === t.id ? 600 : 400, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 14, color: tab === t.id ? C.blue : C.sub }}>{ICONS[t.id]}</span>{t.label}
          </button>
        ))}
      </nav>
      <main style={{ flex: 1, padding: "28px 24px", overflowY: "auto", maxWidth: 960, minWidth: 0 }}>{page()}</main>
      <Toast msg={toastState.msg} type={toastState.type} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
