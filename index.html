  const [modalTipo, setModalTipo] = useState("despesa");
  const [form, setForm] = useState({});
  const [edit, setEdit] = useState(null);
  const [loading, setLoading] = useState(false);
  const [tab, setTab] = useState("resumo");
  const [filtroMes, setFiltroMes] = useState(new Date().toISOString().slice(0, 7));
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }

  const hoje = new Date().toISOString().split("T")[0];

  async function saveDespesa() {
    if (!form.descricao || !form.valor || !form.data) return toast("Descricao, valor e data obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("despesas", edit, form); setDespesas(p => p.map(d => d.id === edit ? Object.assign({}, d, u) : d)); toast("Atualizado!"); }
      else { const c = await db.post("despesas", form); setDespesas(p => [c].concat(p)); toast("Registrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function saveReceita() {
    if (!form.descricao || !form.valor || !form.data) return toast("Descricao, valor e data obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("receitas", edit, form); setReceitas(p => p.map(r => r.id === edit ? Object.assign({}, r, u) : r)); toast("Atualizado!"); }
      else { const c = await db.post("receitas", form); setReceitas(p => [c].concat(p)); toast("Registrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function saveConta() {
    if (!form.descricao || !form.valor || !form.vencimento) return toast("Descricao, valor e vencimento obrigatorios", "error");
    setLoading(true);
    try {
      if (edit) { const u = await db.patch("contas", edit, form); setContas(p => p.map(c => c.id === edit ? Object.assign({}, c, u) : c)); toast("Atualizado!"); }
      else { const c = await db.post("contas", form); setContas(p => [c].concat(p)); toast("Registrado!"); }
      setModal(false);
    } catch(e) { toast("Erro: " + e.message, "error"); }
    setLoading(false);
  }
  async function removeDespesa(id) { if (!confirm("Excluir?")) return; await db.del("despesas", id); setDespesas(p => p.filter(d => d.id !== id)); toast("Excluido!"); }
  async function removeReceita(id) { if (!confirm("Excluir?")) return; await db.del("receitas", id); setReceitas(p => p.filter(r => r.id !== id)); toast("Excluido!"); }
  async function removeConta(id) { if (!confirm("Excluir?")) return; await db.del("contas", id); setContas(p => p.filter(c => c.id !== id)); toast("Excluido!"); }
  async function pagarConta(c) { await db.patch("contas", c.id, { status: "pago" }); setContas(p => p.map(x => x.id === c.id ? Object.assign({}, x, { status: "pago" }) : x)); toast("Conta paga!"); }

  var receitaContratos = contratos.filter(c => c.status === "concluido").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  var receitaManual = receitas.reduce((s, r) => s + parseFloat(r.valor || 0), 0);
  var totalReceita = receitaContratos + receitaManual;
  var totalDesp = despesas.reduce((s, d) => s + parseFloat(d.valor || 0), 0);
  var totalMan = manutencoes.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  var totalMultasPagas = multas.filter(m => m.status === "pago").reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  var lucro = totalReceita - totalDesp - totalMan;
  var contasPagar = contas.filter(c => c.tipo === "pagar" || !c.tipo);
  var contasPendentes = contasPagar.filter(c => c.status === "pendente");
  var contasVencidas = contasPendentes.filter(c => c.vencimento && c.vencimento < hoje);
  var totalPagar = contasPendentes.reduce((s, c) => s + parseFloat(c.valor || 0), 0);

  var despFiltradas = despesas.filter(d => (d.data || "").slice(0, 7) === filtroMes);
  var recFiltradas = receitas.filter(r => (r.data || "").slice(0, 7) === filtroMes);

  var desByMes = {}; despesas.forEach(function(d) { var mes = (d.data || "").slice(0, 7); if (!desByMes[mes]) desByMes[mes] = 0; desByMes[mes] += parseFloat(d.valor || 0); });
  var recByMes = {}; contratos.filter(c => c.status === "concluido").forEach(function(c) { var mes = (c.data_fim || "").slice(0, 7); if (!recByMes[mes]) recByMes[mes] = 0; recByMes[mes] += parseFloat(c.valor_total || 0); });
  receitas.forEach(function(r) { var mes = (r.data || "").slice(0, 7); if (!recByMes[mes]) recByMes[mes] = 0; recByMes[mes] += parseFloat(r.valor || 0); });
  var meses = Array.from(new Set(Object.keys(desByMes).concat(Object.keys(recByMes)))).sort().reverse().slice(0, 12);

  var mesAtualFin = new Date().toISOString().slice(0, 7);
  var [filtroResumoMes, setFiltroResumoMes] = useState(mesAtualFin);

  // Receitas do mês selecionado (contratos com previsao_pagamento no mês)
  var recMesContratos = contratos.filter(c => c.previsao_pagamento && c.previsao_pagamento.slice(0,7) === filtroResumoMes);
  var recMesPrevista = recMesContratos.reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  var recMesRecebida = recMesContratos.filter(c => c.status_pagamento === "pago").reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  var recMesPendente = recMesContratos.filter(c => c.status_pagamento !== "pago" && c.status_pagamento !== "isento").reduce((s,c) => s+parseFloat(c.valor_total||0),0);
  var recMesManual = receitas.filter(r => (r.data||"").slice(0,7) === filtroResumoMes).reduce((s,r) => s+parseFloat(r.valor||0),0);

  // Despesas do mês selecionado
  var despMes = despesas.filter(d => (d.data||"").slice(0,7) === filtroResumoMes).reduce((s,d) => s+parseFloat(d.valor||0),0);
  var contasMes = contas.filter(c => c.vencimento && c.vencimento.slice(0,7) === filtroResumoMes);
  var contasMesPrevista = contasMes.reduce((s,c) => s+parseFloat(c.valor||0),0);
  var contasMesPaga = contasMes.filter(c => c.status === "pago").reduce((s,c) => s+parseFloat(c.valor||0),0);
  var contasMesPendente = contasMes.filter(c => c.status === "pendente").reduce((s,c) => s+parseFloat(c.valor||0),0);
  var manMes = manutencoes.filter(m => (m.data_entrada||"").slice(0,7) === filtroResumoMes).reduce((s,m) => s+parseFloat(m.custo||0),0);
  var totalDespMes = despMes + contasMesPaga + manMes;

  var saldoMes = (recMesRecebida + recMesManual) - totalDespMes;
  var saldoProjetado = (recMesPrevista + recMesManual) - (contasMesPrevista + despMes + manMes);

  var CATS_DESP = ["Combustivel", "Limpeza", "Impostos", "Salarios", "Aluguel", "Manutencao", "Marketing", "Seguros", "Outros"];
  var CATS_REC = ["Locacao", "Servico", "Multa Cobrada", "Deposito", "Outros"];
  var CATS_CONTA = ["Fornecedor", "Imposto", "Aluguel", "Salario", "Seguro", "Servico", "Outros"];

  function openDesp(d) { setForm(d ? Object.assign({}, d) : { data: new Date().toISOString().split("T")[0], categoria: "Outros" }); setEdit(d ? d.id : null); setModalTipo("despesa"); setModal(true); }
  function openRec(r) { setForm(r ? Object.assign({}, r) : { data: new Date().toISOString().split("T")[0], categoria: "Locacao", forma_pagamento: "Pix" }); setEdit(r ? r.id : null); setModalTipo("receita"); setModal(true); }
  function openConta(c) { setForm(c ? Object.assign({}, c) : { vencimento: "", tipo: "pagar", status: "pendente", categoria: "Fornecedor" }); setEdit(c ? c.id : null); setModalTipo("conta"); setModal(true); }

  var SC_CONTA = { pendente: C.orange, pago: C.green, vencido: C.red, cancelado: C.gray };

  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ fontSize: 24, fontWeight: 800 }}>Financeiro</div>
    <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
      {[["resumo","📊"],["receitas","💰"],["despesas","📉"],["contas","📅"],["fluxo","📈"],["pessoal","🏠"]].map(([x, ic]) =>
        <button key={x} onClick={() => setTab(x)} style={Object.assign({}, Ghost(tab === x ? C.blue : C.gray), { background: tab === x ? C.blue : "transparent", color: tab === x ? "#fff" : C.gray, textTransform: "capitalize" })}>{ic} {x === "pessoal" ? "Orç. Pessoal" : x}</button>
      )}
    </div>

    {tab === "resumo" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
        <input style={Object.assign({}, FI, { width: 170 })} type="month" value={filtroResumoMes} onChange={e => setFiltroResumoMes(e.target.value)} />
        <span style={{ fontSize: 13, color: C.sub }}>Consolidado de {filtroResumoMes}</span>
      </div>

      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Receitas do Mês</div>
        {[
          { label: "Contratos previstos", val: recMesPrevista, color: C.sub },
          { label: "✅ Já recebidos", val: recMesRecebida, color: C.green },
          { label: "⏳ A receber", val: recMesPendente, color: C.orange },
          { label: "➕ Outras receitas lançadas", val: recMesManual, color: C.blue },
          { label: "Total recebido", val: recMesRecebida + recMesManual, color: C.green, bold: true },
        ].map((row, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: i < 4 ? "1px solid " + C.border : "none" }}>
            <span style={{ fontWeight: row.bold ? 800 : 400, fontSize: row.bold ? 15 : 13 }}>{row.label}</span>
            <span style={{ fontWeight: 800, color: row.color }}>{fmtBRL(row.val)}</span>
          </div>
        ))}
      </div>

      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Despesas do Mês</div>
        {[
          { label: "Contas previstas", val: contasMesPrevista, color: C.sub },
          { label: "✅ Contas pagas", val: contasMesPaga, color: C.red },
          { label: "⏳ Contas a pagar", val: contasMesPendente, color: C.orange },
          { label: "Despesas lançadas", val: despMes, color: C.red },
          { label: "Manutenções", val: manMes, color: C.purple },
          { label: "Total saídas realizadas", val: totalDespMes, color: C.red, bold: true },
        ].map((row, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: i < 5 ? "1px solid " + C.border : "none" }}>
            <span style={{ fontWeight: row.bold ? 800 : 400, fontSize: row.bold ? 15 : 13 }}>{row.label}</span>
            <span style={{ fontWeight: 800, color: row.color }}>{fmtBRL(row.val)}</span>
          </div>
        ))}
      </div>

      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Consolidação</div>
        {[
          { label: "Saldo realizado (recebido - pago)", val: saldoMes, bold: true },
          { label: "Saldo projetado (previsto - previsto)", val: saldoProjetado },
        ].map((row, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: i < 1 ? "1px solid " + C.border : "none" }}>
            <span style={{ fontWeight: row.bold ? 800 : 500, fontSize: row.bold ? 15 : 13 }}>{row.label}</span>
            <span style={{ fontWeight: 800, fontSize: row.bold ? 18 : 15, color: row.val >= 0 ? C.green : C.red }}>{fmtBRL(row.val)}</span>
          </div>
        ))}
      </div>

      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>DRE Acumulado (todos os periodos)</div>
        {[
          { label: "Receita de Locacoes", val: receitaContratos, color: C.green },
          { label: "Outras Receitas", val: receitaManual, color: C.green },
          { label: "(-) Despesas Operacionais", val: -totalDesp, color: C.red },
          { label: "(-) Custo de Manutencao", val: -totalMan, color: C.red },
          { label: "= Resultado Liquido", val: lucro, color: lucro >= 0 ? C.green : C.red, bold: true },
        ].map((row, i) => (
          <div key={i} style={{ display: "flex", justifyContent: "space-between", padding: "9px 0", borderBottom: i < 4 ? "1px solid " + C.border : "none" }}>
            <span style={{ fontWeight: row.bold ? 800 : 500, fontSize: row.bold ? 15 : 14 }}>{row.label}</span>
            <span style={{ fontWeight: 800, color: row.color, fontSize: row.bold ? 16 : 14 }}>{fmtBRL(Math.abs(row.val))}</span>
          </div>
        ))}
      </div>
    </div>}

    {tab === "receitas" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input style={Object.assign({}, FI, { width: 160 })} type="month" value={filtroMes} onChange={e => setFiltroMes(e.target.value)} />
          <span style={{ fontWeight: 700, color: C.green }}>{fmtBRL(recFiltradas.reduce((s,r)=>s+parseFloat(r.valor||0),0))}</span>
        </div>
        <button style={Btn(C.green)} onClick={() => openRec(null)}>+ Receita</button>
      </div>
      <div style={CARD}>
        {recFiltradas.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma receita manual neste periodo</div>}
        {recFiltradas.map((r, i) => (
          <div key={r.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < recFiltradas.length - 1 ? "1px solid " + C.border : "none", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontWeight: 600 }}>{r.descricao}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{r.categoria}{r.forma_pagamento && " · " + r.forma_pagamento} · {r.data}</div>
              {r.observacoes && <div style={{ fontSize: 12, color: C.sub }}>{r.observacoes}</div>}
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontWeight: 800, color: C.green }}>{fmtBRL(r.valor)}</span>
              <button style={Ghost()} onClick={() => openRec(r)}>Editar</button>
              <button style={Btn(C.red, true)} onClick={() => removeReceita(r.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>}

    {tab === "despesas" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input style={Object.assign({}, FI, { width: 160 })} type="month" value={filtroMes} onChange={e => setFiltroMes(e.target.value)} />
          <span style={{ fontWeight: 700, color: C.red }}>{fmtBRL(despFiltradas.reduce((s,d)=>s+parseFloat(d.valor||0),0))}</span>
        </div>
        <button style={Btn(C.red)} onClick={() => openDesp(null)}>+ Despesa</button>
      </div>
      <div style={CARD}>
        {despFiltradas.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma despesa neste periodo</div>}
        {despFiltradas.map((d, i) => (
          <div key={d.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: i < despFiltradas.length - 1 ? "1px solid " + C.border : "none", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontWeight: 600 }}>{d.descricao}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{d.categoria} · {d.data}</div>
              {d.observacoes && <div style={{ fontSize: 12, color: C.sub }}>{d.observacoes}</div>}
            </div>
            <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
              <span style={{ fontWeight: 800, color: C.red }}>{fmtBRL(d.valor)}</span>
              <button style={Ghost()} onClick={() => openDesp(d)}>Editar</button>
              <button style={Btn(C.red, true)} onClick={() => removeDespesa(d.id)}>✕</button>
            </div>
          </div>
        ))}
      </div>
    </div>}

    {tab === "contas" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
        <div>
          <span style={{ fontWeight: 700, color: C.orange }}>{fmtBRL(totalPagar)} pendentes</span>
          {contasVencidas.length > 0 && <span style={{ marginLeft: 12, fontWeight: 700, color: C.red }}>{contasVencidas.length} vencida(s)</span>}
        </div>
        <button style={Btn(C.orange)} onClick={() => openConta(null)}>+ Conta</button>
      </div>
      <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
        {["todos","pendente","pago"].map(x => (
          <button key={x} onClick={() => setFiltroMes(x === filtroMes ? "" : x)} style={Object.assign({}, Ghost(filtroMes === x ? C.blue : C.gray), { background: filtroMes === x ? C.blue : "transparent", color: filtroMes === x ? "#fff" : C.gray, textTransform: "capitalize" })}>{x}</button>
        ))}
      </div>
      <div style={CARD}>
        {contas.filter(c => filtroMes === "pendente" || filtroMes === "pago" ? c.status === filtroMes : true).length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma conta</div>}
        {contas.filter(c => filtroMes === "pendente" || filtroMes === "pago" ? c.status === filtroMes : true).map((c, i, arr) => {
          var vencida = c.status === "pendente" && c.vencimento && c.vencimento < hoje;
          return <div key={c.id} style={{ padding: "11px 0", borderBottom: i < arr.length - 1 ? "1px solid " + C.border : "none" }}>
            <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 8 }}>
              <div>
                <div style={{ fontWeight: 600 }}>{c.descricao} {vencida && <span style={{ color: C.red, fontSize: 11, fontWeight: 800 }}>VENCIDA</span>}</div>
                <div style={{ fontSize: 12, color: C.sub }}>{c.categoria} · Venc: <span style={{ color: vencida ? C.red : C.sub, fontWeight: vencida ? 700 : 400 }}>{c.vencimento || "--"}</span></div>
                {c.observacoes && <div style={{ fontSize: 12, color: C.sub }}>{c.observacoes}</div>}
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ fontWeight: 800, fontSize: 16, color: vencida ? C.red : C.orange }}>{fmtBRL(c.valor)}</div>
                <span style={Badge(SC_CONTA[vencida ? "vencido" : c.status] || C.gray)}>{vencida ? "vencida" : c.status}</span>
              </div>
            </div>
            <div style={{ display: "flex", gap: 8, marginTop: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
              {c.status === "pendente" && <button style={Btn(C.green, true)} onClick={() => pagarConta(c)}>Marcar Pago</button>}
              <button style={Ghost()} onClick={() => openConta(c)}>Editar</button>
              <button style={Btn(C.red, true)} onClick={() => removeConta(c.id)}>✕</button>
            </div>
          </div>;
        })}
      </div>
    </div>}

    {tab === "fluxo" && <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Fluxo de Caixa Mensal</div>
      {meses.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 20 }}>Sem dados</div>}
      <div style={{ overflowX: "auto" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
          <thead><tr style={{ background: C.bg }}>
            <th style={{ padding: "8px 12px", textAlign: "left", fontWeight: 700, color: C.sub }}>Mes</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.green }}>Receitas</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.red }}>Despesas</th>
            <th style={{ padding: "8px 12px", textAlign: "right", color: C.blue }}>Saldo</th>
          </tr></thead>
          <tbody>{meses.map(mes => {
            var rec = recByMes[mes] || 0; var desp = desByMes[mes] || 0; var saldo = rec - desp;
            return <tr key={mes} style={{ borderTop: "1px solid " + C.border }}>
              <td style={{ padding: "8px 12px", fontWeight: 600 }}>{mes}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: C.green, fontWeight: 600 }}>{fmtBRL(rec)}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: C.red, fontWeight: 600 }}>{fmtBRL(desp)}</td>
              <td style={{ padding: "8px 12px", textAlign: "right", color: saldo >= 0 ? C.green : C.red, fontWeight: 800 }}>{fmtBRL(saldo)}</td>
            </tr>;
          })}</tbody>
        </table>
      </div>
    </div>}

    {tab === "pessoal" && <OrcamentoPessoal contratos={contratos} despesas={despesas} receitas={receitas} toast={toast} />}

    <Modal open={modal} onClose={() => setModal(false)} title={modalTipo === "despesa" ? (edit ? "Editar Despesa" : "Nova Despesa") : modalTipo === "receita" ? (edit ? "Editar Receita" : "Nova Receita") : (edit ? "Editar Conta" : "Nova Conta")}>
      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {modalTipo === "despesa" && <>
          <Lbl label="Descricao *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
            <Lbl label="Data *" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
          </div>
          <Lbl label="Categoria"><select style={FI} value={form.categoria || "Outros"} onChange={e => F("categoria", e.target.value)}>{CATS_DESP.map(c => <option key={c}>{c}</option>)}</select></Lbl>
          <Lbl label="Observacoes"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
          <button style={Btn(C.red)} onClick={saveDespesa} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </>}
        {modalTipo === "receita" && <>
          <Lbl label="Descricao *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} placeholder="Ex: Locacao avulsa, Servico de higienizacao..." /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
            <Lbl label="Data *" flex={1}><input style={FI} type="date" value={form.data || ""} onChange={e => F("data", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Categoria" flex={1}><select style={FI} value={form.categoria || "Locacao"} onChange={e => F("categoria", e.target.value)}>{CATS_REC.map(c => <option key={c}>{c}</option>)}</select></Lbl>
            <Lbl label="Forma de Pagamento" flex={1}><select style={FI} value={form.forma_pagamento || "Pix"} onChange={e => F("forma_pagamento", e.target.value)}><option>Pix</option><option>Dinheiro</option><option>Cartao Debito</option><option>Cartao Credito</option><option>Transferencia</option><option>Boleto</option></select></Lbl>
          </div>
          <Lbl label="Observacoes"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
          <button style={Btn(C.green)} onClick={saveReceita} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </>}
        {modalTipo === "conta" && <>
          <Lbl label="Descricao *"><input style={FI} value={form.descricao || ""} onChange={e => F("descricao", e.target.value)} placeholder="Ex: Aluguel do galpao, Seguro frota..." /></Lbl>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Valor *" flex={1}><input style={FI} type="number" step="0.01" value={form.valor || ""} onChange={e => F("valor", e.target.value)} /></Lbl>
            <Lbl label="Vencimento *" flex={1}><input style={FI} type="date" value={form.vencimento || ""} onChange={e => F("vencimento", e.target.value)} /></Lbl>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <Lbl label="Categoria" flex={1}><select style={FI} value={form.categoria || "Fornecedor"} onChange={e => F("categoria", e.target.value)}>{CATS_CONTA.map(c => <option key={c}>{c}</option>)}</select></Lbl>
            <Lbl label="Status" flex={1}><select style={FI} value={form.status || "pendente"} onChange={e => F("status", e.target.value)}><option value="pendente">Pendente</option><option value="pago">Pago</option><option value="cancelado">Cancelado</option></select></Lbl>
          </div>
          <Lbl label="Observacoes"><input style={FI} value={form.observacoes || ""} onChange={e => F("observacoes", e.target.value)} /></Lbl>
          <button style={Btn(C.orange)} onClick={saveConta} disabled={loading}>{loading ? "Salvando..." : "Salvar"}</button>
        </>}
      </div>
    </Modal>
  </div>;
}

// ── RELATORIOS ─────────────────────────────────────────────────────────────
function Relatorios({ contratos, veiculos, clientes, multas, manutencoes, despesas, empresa }) {
  const [tab, setTab] = useState("geral");
  const [de, setDe] = useState("");
  const [ate, setAte] = useState("");

  var receita = contratos.filter(c => c.status === "concluido").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  var recAtiva = contratos.filter(c => c.status === "ativo").reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);
  var mTotal = multas.reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  var mPagas = multas.filter(m => m.status === "pago").reduce((s, m) => s + parseFloat(m.valor || 0), 0);
  var custoMan = manutencoes.reduce((s, m) => s + parseFloat(m.custo || 0), 0);
  var totalDesp = despesas.reduce((s, d) => s + parseFloat(d.valor || 0), 0);
  var lucro = receita - totalDesp - custoMan;
  var porStatus = ["disponivel", "alugado", "manutencao", "inativo"].map(st => ({ label: st, count: veiculos.filter(v => v.status === st).length }));

  var faturasFil = contratos.filter(c => {
    if (c.status !== "concluido") return false;
    if (de && c.data_fim && c.data_fim < de) return false;
    if (ate && c.data_fim && c.data_fim > ate) return false;
    return true;
  });
  var totalFaturas = faturasFil.reduce((s, c) => s + parseFloat(c.valor_total || 0), 0);

  function imprimirGeral() {
    var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio Geral</title><style>body{font-family:Arial,sans-serif;max-width:850px;margin:30px auto;font-size:13px}h2{border-bottom:1px solid #ddd;padding-bottom:6px;margin:20px 0 10px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #ddd}th{background:#f5f5f7}.g{color:#34C759;font-weight:800}.r{color:#FF3B30}@media print{body{margin:0}}</style></head><body>';
    h += buildHeader(empresa);
    h += '<h2>Resumo Financeiro</h2><table><tr><th>Indicador</th><th>Valor</th></tr>';
    h += '<tr><td>Receita Total</td><td class="g">' + fmtBRL(receita) + '</td></tr>';
    h += '<tr><td>Em Aberto</td><td>' + fmtBRL(recAtiva) + '</td></tr>';
    h += '<tr><td>Despesas Operacionais</td><td class="r">' + fmtBRL(totalDesp) + '</td></tr>';
    h += '<tr><td>Custo Manutencao</td><td class="r">' + fmtBRL(custoMan) + '</td></tr>';
    h += '<tr><td>Multas Emitidas</td><td>' + fmtBRL(mTotal) + '</td></tr>';
    h += '<tr><td>Multas Pagas</td><td>' + fmtBRL(mPagas) + '</td></tr>';
    h += '<tr><td><b>Lucro Liquido</b></td><td class="' + (lucro >= 0 ? "g" : "r") + '"><b>' + fmtBRL(lucro) + '</b></td></tr></table>';
    h += '<h2>Contratos (' + contratos.length + ')</h2><table><tr><th>No</th><th>Cliente</th><th>Veiculo</th><th>Inicio</th><th>Fim</th><th>Valor</th><th>Status</th></tr>';
    contratos.forEach(function(c) { var cl = clientes.find(function(x) { return x.id == c.cliente_id; }); var ve = veiculos.find(function(x) { return x.id == c.veiculo_id; }); h += '<tr><td>' + numCt(c.id) + '</td><td>' + (cl && cl.nome || "--") + '</td><td>' + (ve && ve.placa || "--") + '</td><td>' + (c.data_inicio || "--") + '</td><td>' + (c.data_fim || "--") + '</td><td>' + fmtBRL(c.valor_total) + '</td><td>' + c.status + '</td></tr>'; });
    h += '</table><scr' + 'ipt>window.print();</scr' + 'ipt></body></html>';
    var w = window.open("", "_blank"); w.document.write(h); w.document.close();
  }

  function imprimirFaturas() {
    var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatorio de Faturas</title><style>body{font-family:Arial,sans-serif;max-width:850px;margin:30px auto;font-size:13px}table{width:100%;border-collapse:collapse}th,td{padding:8px;border:1px solid #ddd}th{background:#f5f5f7}.tot{font-weight:800;font-size:15px;color:#34C759}@media print{body{margin:0}}</style></head><body>';
    h += buildHeader(empresa);
    h += '<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:800">RELATORIO DE FATURAS</div>';
    if (de || ate) h += '<div style="font-size:13px;color:#666">Periodo: ' + (de || "--") + ' a ' + (ate || "--") + '</div>';
    h += '</div>';
    h += '<table><tr><th>No</th><th>Cliente</th><th>Veiculo</th><th>Retirada</th><th>Devolucao</th><th>Valor</th></tr>';
    faturasFil.forEach(function(c) { var cl = clientes.find(function(x) { return x.id == c.cliente_id; }); var ve = veiculos.find(function(x) { return x.id == c.veiculo_id; }); h += '<tr><td>' + numCt(c.id) + '</td><td>' + (cl && cl.nome || "--") + '</td><td>' + (ve && ve.placa || "--") + ' ' + (ve && ve.modelo || "") + '</td><td>' + (c.data_inicio || "--") + '</td><td>' + (c.data_fim || "--") + '</td><td>' + fmtBRL(c.valor_total) + '</td></tr>'; });
    h += '<tr><td colspan="5" class="tot">TOTAL</td><td class="tot">' + fmtBRL(totalFaturas) + '</td></tr></table>';
    h += '<p style="text-align:center;font-size:10px;color:#aaa;margin-top:20px">AutoGest Pro - ' + new Date().toLocaleString("pt-BR") + '</p>';
    h += '<scr' + 'ipt>window.print();</scr' + 'ipt></body></html>';
    var w = window.open("", "_blank"); w.document.write(h); w.document.close();
  }

  return <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
    <div style={{ fontSize: 24, fontWeight: 800 }}>Relatorios</div>
    <div style={{ display: "flex", gap: 8, overflowX: "auto", flexWrap: "nowrap", WebkitOverflowScrolling: "touch", paddingBottom: 2 }}>
      {["geral", "faturas"].map(x => <button key={x} onClick={() => setTab(x)} style={Object.assign({}, Ghost(tab === x ? C.blue : C.gray), { background: tab === x ? C.blue : "transparent", color: tab === x ? "#fff" : C.gray, textTransform: "capitalize" })}>{x}</button>)}
    </div>

    {tab === "geral" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="💰" label="Receita" val={fmtBRL(receita)} color={C.green} />
        <Stat icon="📋" label="Em aberto" val={fmtBRL(recAtiva)} color={C.blue} />
        <Stat icon="📈" label="Lucro" val={fmtBRL(lucro)} color={lucro >= 0 ? C.green : C.red} />
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
        <Stat icon="📉" label="Despesas" val={fmtBRL(totalDesp)} color={C.red} />
        <Stat icon="🔧" label="Manutencao" val={fmtBRL(custoMan)} color={C.purple} />
        <Stat icon="⚠️" label="Multas" val={fmtBRL(mTotal)} color={C.orange} />
      </div>
      <div style={CARD}>
        <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Frota por Status</div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10 }}>
          {porStatus.map(p => <div key={p.label} style={{ textAlign: "center", background: C.bg, borderRadius: 12, padding: "12px 6px" }}>
            <div style={{ fontSize: 22, fontWeight: 800, color: C.blue }}>{p.count}</div>
            <div style={{ fontSize: 11, color: C.sub, marginTop: 3, textTransform: "capitalize" }}>{p.label}</div>
          </div>)}
        </div>
      </div>
      <button style={Btn(C.orange)} onClick={imprimirGeral}>Imprimir Relatorio Geral</button>
    </div>}

    {tab === "faturas" && <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      <div style={CARD}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.sub, marginBottom: 12 }}>Filtrar por periodo</div>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <Lbl label="De" flex={1}><input style={FI} type="date" value={de} onChange={e => setDe(e.target.value)} /></Lbl>
          <Lbl label="Ate" flex={1}><input style={FI} type="date" value={ate} onChange={e => setAte(e.target.value)} /></Lbl>
        </div>
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div><span style={{ fontWeight: 700 }}>{faturasFil.length} fatura(s) </span><span style={{ fontWeight: 800, color: C.green }}>{fmtBRL(totalFaturas)}</span></div>
        <button style={Btn(C.orange)} onClick={imprimirFaturas}>Imprimir</button>
      </div>
      <div style={CARD}>
        {faturasFil.length === 0 && <div style={{ color: C.sub, textAlign: "center", padding: 30 }}>Nenhuma fatura no periodo</div>}
        {faturasFil.map((c, i) => {
          var cl = clientes.find(x => x.id == c.cliente_id); var ve = veiculos.find(x => x.id == c.veiculo_id);
          return <div key={c.id} style={{ display: "flex", justifyContent: "space-between", padding: "10px 0", borderBottom: i < faturasFil.length - 1 ? "1px solid " + C.border : "none", flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontWeight: 600 }}>No {numCt(c.id)} - {cl && cl.nome || "--"}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{ve && ve.placa || "--"} {ve && ve.modelo || ""}</div>
              <div style={{ fontSize: 12, color: C.sub }}>{c.data_inicio} a {c.data_fim}</div>
            </div>
            <div style={{ fontWeight: 800, color: C.green }}>{fmtBRL(c.valor_total)}</div>
          </div>;
        })}
      </div>
    </div>}
  </div>;
}

function Config({ empresa, setEmpresa, toast }) {

  const [configId, setConfigId] = useState(null);

  useEffect(() => { carregar(); }, []);
  function F(k, v) { setForm(p => Object.assign({}, p, { [k]: v })); }

    setLoading(true); setOk(false);
    try {

        <div style={{ display: "flex", gap: 10 }}>

          <Lbl label="Telefone" flex={1}><input style={FI} value={form.telefone || ""} onChange={e => F("telefone", e.target.value)} /></Lbl>

        <Lbl label="Email"><input style={FI} type="email" value={form.email || ""} onChange={e => F("email", e.target.value)} /></Lbl>
        <Lbl label="Endereco"><input style={FI} value={form.endereco || ""} onChange={e => F("endereco", e.target.value)} /></Lbl>
        <div style={{ display: "flex", gap: 10 }}>
          <Lbl label="Cidade" flex={2}><input style={FI} value={form.cidade || ""} onChange={e => F("cidade", e.target.value)} /></Lbl>
          <Lbl label="UF" flex={1}><input style={FI} value={form.estado || ""} onChange={e => F("estado", e.target.value)} /></Lbl>

      </div>
    </div>
    <div style={CARD}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.sub, textTransform: "uppercase", marginBottom: 12 }}>Logo</div>

// ── APP ────────────────────────────────────────────────────────────────────
const TABS = [
  { id: "inicio", label: "Inicio" }, { id: "frota", label: "Frota" }, { id: "clientes", label: "Clientes" },
  { id: "contratos", label: "Contratos" }, { id: "multas", label: "Multas" }, { id: "manutencao", label: "Manutencao" },
  { id: "financeiro", label: "Financeiro" }, { id: "relatorios", label: "Relatorios" }, { id: "config", label: "Config" }
];
const ICONS = { inicio: "⊙", frota: "🚗", clientes: "👤", contratos: "📋", multas: "⚠️", manutencao: "🔧", financeiro: "💳", relatorios: "📊", config: "⚙️" };

function LoginScreen({ onLogin }) {
  const [pin, setPin] = useState("");
  const [erro, setErro] = useState("");
  const [usarPin, setUsarPin] = useState(false);
  const PIN_CORRETO = "1234"; // PIN padrão — trocar nas configurações futuramente

  async function tentarBiometrico() {
    setErro("");
    try {
      if (!window.PublicKeyCredential) { setUsarPin(true); return; }
      // Tenta criar uma credencial local para autenticação biométrica
      const credId = localStorage.getItem("autogest_cred_id");
      if (!credId) {
        // Primeira vez: registra a biometria
        const cred = await navigator.credentials.create({
          publicKey: {
            challenge: crypto.getRandomValues(new Uint8Array(32)),
            rp: { name: "AutoGest Pro" },
            user: { id: new Uint8Array(16), name: "usuario", displayName: "Usuário" },
            pubKeyCredParams: [{ type: "public-key", alg: -7 }],
            authenticatorSelection: { authenticatorAttachment: "platform", userVerification: "required" },
            timeout: 60000
          }
        });
        localStorage.setItem("autogest_cred_id", btoa(String.fromCharCode(...new Uint8Array(cred.rawId))));
        onLogin();
      } else {
        // Já registrado: autentica
        const rawId = Uint8Array.from(atob(credId), c => c.charCodeAt(0));
        await navigator.credentials.get({
          publicKey: {
            challenge: crypto.getRandomValues(new Uint8Array(32)),
            allowCredentials: [{ type: "public-key", id: rawId }],
            userVerification: "required",
            timeout: 60000
          }
        });
        onLogin();
      }
    } catch(e) {
      if (e.name === "NotAllowedError") { setErro("Autenticação cancelada."); }
      else { setUsarPin(true); }
    }
  }

  function tentarPin() {
    if (pin === PIN_CORRETO) { onLogin(); }
    else { setErro("PIN incorreto."); setPin(""); }
  }

  return <div style={{ minHeight: "100vh", background: "#F2F2F7", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 32 }}>
    <div style={{ fontSize: 48, marginBottom: 16 }}>🚗</div>
    <div style={{ fontSize: 26, fontWeight: 800, letterSpacing: -0.5, marginBottom: 4 }}>AutoGest Pro</div>
    <div style={{ fontSize: 14, color: "#8E8E93", marginBottom: 40 }}>Estilo Rent a Car</div>

    {!usarPin ? (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, width: "100%", maxWidth: 280 }}>
        <button onClick={tentarBiometrico} style={{ width: "100%", background: "#007AFF", color: "#fff", border: "none", borderRadius: 14, padding: "16px 20px", fontSize: 17, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", gap: 10 }}>
          <span style={{ fontSize: 22 }}>􀎽</span> Entrar com Face ID
        </button>
        <button onClick={() => setUsarPin(true)} style={{ background: "none", border: "none", color: "#007AFF", fontSize: 15, cursor: "pointer", fontWeight: 500 }}>Usar PIN</button>
        {erro && <div style={{ color: "#FF3B30", fontSize: 13, textAlign: "center" }}>{erro}</div>}
      </div>
    ) : (
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 14, width: "100%", maxWidth: 280 }}>
        <div style={{ fontSize: 15, color: "#3C3C43", fontWeight: 600 }}>Digite o PIN</div>
        <input
          type="password" inputMode="numeric" maxLength={4}
          value={pin} onChange={e => setPin(e.target.value.replace(/\D/g,""))}
          onKeyDown={e => e.key === "Enter" && tentarPin()}
          placeholder="••••"
          style={{ width: "100%", textAlign: "center", fontSize: 28, letterSpacing: 12, padding: "14px 16px", borderRadius: 14, border: "1.5px solid #E5E5EA", outline: "none", background: "#fff", boxSizing: "border-box" }}
          autoFocus
        />
        <button onClick={tentarPin} style={{ width: "100%", background: "#007AFF", color: "#fff", border: "none", borderRadius: 14, padding: "14px", fontSize: 16, fontWeight: 600, cursor: "pointer" }}>Entrar</button>
        <button onClick={() => { setUsarPin(false); setErro(""); setPin(""); }} style={{ background: "none", border: "none", color: "#007AFF", fontSize: 14, cursor: "pointer" }}>Usar Face ID</button>
        {erro && <div style={{ color: "#FF3B30", fontSize: 13 }}>{erro}</div>}
        <div style={{ fontSize: 12, color: "#8E8E93", textAlign: "center", marginTop: 4 }}>PIN padrão: 1234</div>
      </div>
    )}
  </div>;
}

function App() {
  const [logado, setLogado] = useState(false);
  const [tab, setTab] = useState("inicio");
  const [veiculos, setVeiculos] = useState([]);
  const [clientes, setClientes] = useState([]);
  const [contratos, setContratos] = useState([]);
  const [multas, setMultas] = useState([]);
  const [manutencoes, setManutencoes] = useState([]);
  const [despesas, setDespesas] = useState([]);
  const [receitas, setReceitas] = useState([]);
  const [contas, setContas] = useState([]);
  const [empresa, setEmpresa] = useState({});
  const [toastState, setToastState] = useState({ msg: "", type: "ok" });
  const mobile = useMobile();

  function toast(msg, type) { setToastState({ msg: msg, type: type || "ok" }); setTimeout(() => setToastState({ msg: "", type: "ok" }), 3000); }

  useEffect(() => {
    db.get("veiculos").then(d => setVeiculos(d || []));
    db.get("clientes").then(d => setClientes(d || []));
    db.get("contratos").then(d => setContratos(d || []));
    db.get("multas").then(d => setMultas(d || []));
    db.get("manutencao").then(d => setManutencoes(d || []));
    db.get("despesas").then(d => setDespesas(d || []));
    db.get("receitas").then(d => setReceitas(d || []));
    db.get("contas").then(d => setContas(d || []));
    db.get("config", "limit=1").then(d => { if (d && d[0]) setEmpresa(d[0]); });
  }, []);

  var props = { veiculos, setVeiculos, clientes, setClientes, contratos, setContratos, multas, setMultas, manutencoes, setManutencoes, despesas, setDespesas, receitas, setReceitas, contas, setContas, empresa, toast };

  function page() {
    if (tab === "inicio") return <Inicio {...props} />;
    if (tab === "frota") return <Frota {...props} />;
    if (tab === "clientes") return <Clientes {...props} />;
    if (tab === "contratos") return <Contratos {...props} />;
    if (tab === "multas") return <Multas {...props} veiculos={veiculos} />;
    if (tab === "manutencao") return <Manutencao {...props} />;
    if (tab === "financeiro") return <Financeiro {...props} />;
    if (tab === "relatorios") return <Relatorios {...props} />;
    if (tab === "config") return <Config empresa={empresa} setEmpresa={setEmpresa} toast={toast} />;
    return null;
  }

  if (!logado) return <LoginScreen onLogin={() => setLogado(true)} />;

  if (mobile) return (
    <div style={{ background: C.bg, minHeight: "100vh", paddingBottom: 82 }}>
      <div style={{ padding: "16px 16px 0" }}>{page()}</div>
      <nav style={{ position: "fixed", bottom: 0, left: 0, right: 0, background: "rgba(255,255,255,.97)", backdropFilter: "blur(20px)", borderTop: "1px solid " + C.border, display: "flex", zIndex: 100, overflowX: "auto" }}>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ flex: "0 0 auto", background: "none", border: "none", padding: "8px 12px 11px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 3, minWidth: 62 }}>
            <span style={{ fontSize: 24 }}>{ICONS[t.id]}</span>
            <span style={{ fontSize: 9, fontWeight: 600, color: tab === t.id ? C.blue : C.gray, whiteSpace: "nowrap" }}>{t.label}</span>
          </button>
        ))}
      </nav>
      <Toast msg={toastState.msg} type={toastState.type} />
    </div>
  );

  return (
    <div style={{ display: "flex", minHeight: "100vh", background: C.bg }}>
      <nav style={{ width: 210, background: "#FFF", borderRight: "1px solid " + C.border, padding: "26px 12px", display: "flex", flexDirection: "column", gap: 3, flexShrink: 0, position: "sticky", top: 0, height: "100vh", overflowY: "auto" }}>
        <div style={{ fontSize: 16, fontWeight: 800, color: C.blue, marginBottom: 20, paddingLeft: 10 }}>AutoGest Pro</div>
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)} style={{ background: tab === t.id ? C.blue + "18" : "transparent", color: tab === t.id ? C.blue : "#3C3C43", border: "none", borderRadius: 10, padding: "10px 12px", fontSize: 14, fontWeight: tab === t.id ? 700 : 500, cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 16 }}>{ICONS[t.id]}</span>{t.label}
          </button>
        ))}
      </nav>
      <main style={{ flex: 1, padding: "28px 24px", overflowY: "auto", maxWidth: 960, minWidth: 0 }}>{page()}</main>
      <Toast msg={toastState.msg} type={toastState.type} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
